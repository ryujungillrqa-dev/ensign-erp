<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENSIGN ERP — ㈜엔자인 운영관리시스템</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{
  --bg:#f3f5f7; --panel:#ffffff; --line:#dde3e9; --line2:#eef1f4;
  --ink:#1c2733; --ink2:#5b6b7b; --ink3:#92a0ae;
  --brand:#0e5e54; --brand2:#0a4a42; --brand-soft:#e3f0ee;
  --amber:#b97a14; --amber-soft:#fdf3e0;
  --blue:#1f5fa8; --blue-soft:#e7f0fa;
  --red:#b3372f; --red-soft:#fbeae8;
  --green:#2e7d4f; --green-soft:#e6f4ec;
  --radius:10px;
  --mono:'Pretendard Variable',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Pretendard Variable',-apple-system,sans-serif;background:var(--bg);color:var(--ink);font-size:14px;margin:0;padding:0;overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13px;color:var(--ink)}

/* ===== 사이드바 ===== */
#app-screen{display:flex;flex-direction:row;width:100vw;height:100vh}#sidebar{width:180px;min-width:180px;background:#15211f;color:#cfd9d6;display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
#sidebar .logo{padding:20px 18px 14px;border-bottom:1px solid #243430}
#sidebar .logo .nm{font-size:17px;font-weight:800;color:#fff;letter-spacing:.5px}
#sidebar .logo .nm b{color:#5fc7b4}
#sidebar .logo .sub{font-size:11px;color:#7d918c;margin-top:3px}
#nav{flex:1;padding:10px 8px;overflow-y:auto}
#nav .grp{font-size:10px;color:#5e716c;padding:12px 12px 5px;letter-spacing:1.2px;font-weight:700}
#nav a{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;color:#b6c4c0;text-decoration:none;font-size:13.5px;font-weight:500;margin-bottom:2px}
#nav a:hover{background:#1e2e2b;color:#fff}
#nav a.on{background:var(--brand);color:#fff;font-weight:700}
#nav a .ic{width:17px;text-align:center;font-size:14px;opacity:.9}
#sidebar .foot{padding:12px 16px;border-top:1px solid #243430;font-size:11px;color:#5e716c}

/* ===== 본문 ===== */
#main{flex:1;display:flex;flex-direction:column;min-width:0;height:100vh;overflow:hidden}
#topbar{background:var(--panel);border-bottom:1px solid var(--line);padding:0 22px;height:52px;display:flex;align-items:center;gap:14px;flex-shrink:0}
#topbar h1{font-size:16px;font-weight:800}
#topbar .crumb{font-size:12px;color:var(--ink3)}
#topbar .sp{flex:1}
#topbar .today{font-size:12.5px;color:var(--ink2);font-variant-numeric:tabular-nums}
#content{flex:1;overflow-y:auto;padding:18px 20px}

/* ===== 공통 컴포넌트 ===== */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:16px}
.card .hd{padding:13px 16px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.card .hd h2{font-size:14.5px;font-weight:800}
.card .hd .sp{flex:1}
.card .bd{padding:16px}
.card .bd.np{padding:0}

.btn{border:1px solid var(--line);background:#fff;border-radius:7px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--ink)}
.btn:hover{background:var(--line2)}
.btn.pri{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.pri:hover{background:var(--brand2)}
.btn.dgr{color:var(--red);border-color:#e6c4c1}
.btn.dgr:hover{background:var(--red-soft)}
.btn.sm{padding:4px 9px;font-size:12px;border-radius:6px}
.btn:disabled{opacity:.45;cursor:default}

.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:700}
.tag.t1{background:var(--brand-soft);color:var(--brand)}
.tag.t2{background:var(--blue-soft);color:var(--blue)}
.tag.t3{background:var(--amber-soft);color:var(--amber)}
.tag.t4{background:var(--green-soft);color:var(--green)}
.tag.t5{background:#ededf2;color:#5a5a72}
.tag.red{background:var(--red-soft);color:var(--red)}
.tag.gray{background:#eef1f4;color:var(--ink3)}

table.grid{width:100%;border-collapse:collapse;font-size:13px}
table.grid th{background:#f7f9fa;border-bottom:1px solid var(--line);padding:6px 7px;text-align:left;font-size:11.5px;color:var(--ink2);font-weight:700;white-space:nowrap;position:sticky;top:0;z-index:2}
table.grid td{border-bottom:1px solid var(--line2);padding:6px 7px;white-space:nowrap;vertical-align:middle;font-size:13px}
table.grid tr:hover td{background:#f8fafb}
table.grid td.num,table.grid th.num{text-align:right;font-variant-numeric:tabular-nums}
table.grid td.ctr,table.grid th.ctr{text-align:center}
.tbl-wrap{overflow:auto;max-height:calc(100vh - 130px)}
.empty{padding:42px 20px;text-align:center;color:var(--ink3);font-size:13px}
.empty b{display:block;font-size:14px;color:var(--ink2);margin-bottom:5px}

/* 폼 */
.frm{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.frm .fld{display:flex;flex-direction:column;gap:4px}
.frm .fld.w2{grid-column:span 2}
.frm label{font-size:11.5px;font-weight:700;color:var(--ink2)}
.frm input,.frm select,.frm textarea{border:1px solid var(--line);border-radius:7px;padding:7px 9px;background:#fff}
.frm input:focus,.frm select:focus,.frm textarea:focus{outline:2px solid var(--brand-soft);border-color:var(--brand)}
.frm input[readonly]{background:#f5f7f8;color:var(--ink2)}
.frm .hint{font-size:11px;color:var(--ink3)}

/* 모달 */
#modal-ovl{position:fixed;inset:0;background:rgba(15,25,22,.45);display:none;align-items:flex-start;justify-content:center;z-index:50;padding:40px 16px;overflow-y:auto}
#modal-ovl.show{display:flex}
#modal{background:#fff;border-radius:12px;width:100%;max-width:760px;box-shadow:0 18px 50px rgba(0,0,0,.25)}
#modal .mh{padding:15px 18px;border-bottom:1px solid var(--line2);display:flex;align-items:center}
#modal .mh h3{font-size:15px;font-weight:800;flex:1}
#modal .mh .x{border:0;background:0;font-size:18px;color:var(--ink3);padding:2px 6px}
#modal .mb{padding:18px}
#modal .mf{padding:13px 18px;border-top:1px solid var(--line2);display:flex;gap:8px;justify-content:flex-end}

/* 대시보드 */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px}
.kpi .lb{font-size:12px;color:var(--ink2);font-weight:600}
.kpi .vl{font-size:18px;font-weight:800;margin-top:3px;font-variant-numeric:tabular-nums}
.kpi .vl small{font-size:12px;color:var(--ink3);font-weight:600}
.kpi.a{border-top:3px solid var(--brand)}
.kpi.b{border-top:3px solid var(--blue)}
.kpi.c{border-top:3px solid var(--amber)}
.kpi.d{border-top:3px solid var(--green)}
.kpi.e{border-top:3px solid #3a57c9}

/* 더존식 세금계산서 그리드 */
table.dz{width:100%;border-collapse:collapse;font-size:12.5px}
table.dz th{background:#eef3f2;border:1px solid #cfd9d6;padding:7px 8px;font-size:11.5px;color:#33443f;font-weight:700;white-space:nowrap}
table.dz td{border:1px solid var(--line);padding:0;white-space:nowrap}
table.dz td.lbl{background:#f7f9f8;padding:6px 9px;font-weight:700;font-size:11.5px;color:var(--ink2)}
table.dz td.ro{padding:6px 9px;background:#fbfcfc;color:var(--ink2)}
table.dz td input,table.dz td select{width:100%;border:0;padding:6px 8px;background:transparent;font-size:12.5px}
table.dz td input:focus,table.dz td select:focus{outline:2px solid var(--brand);outline-offset:-2px;background:#fff}
table.dz td input.num{text-align:right;font-variant-numeric:tabular-nums}
table.dz tr.cthead td{background:var(--brand-soft);padding:7px 10px;font-weight:800;color:var(--brand2);border-top:2px solid var(--brand)}
table.dz tr.inv-draft td{background:#fffbe6 !important}
table.dz td.num-ro{padding:6px 9px;text-align:right;font-variant-numeric:tabular-nums;background:#fbfcfc;color:var(--ink2);font-weight:600}

.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:0}
.toolbar input[type=search],.toolbar select{border:1px solid var(--line);border-radius:7px;padding:7px 10px;background:#fff}
.toolbar .sp{flex:1}
.sticky-toolbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 0 10px;margin-bottom:4px;border-bottom:1px solid var(--line)}

/* 토스트 */
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1c2733;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;display:none;z-index:99;box-shadow:0 8px 24px rgba(0,0,0,.3)}

/* 매칭 화면 */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:1100px){.match-grid{grid-template-columns:1fr}}
.pick{outline:2px solid var(--brand)!important;background:var(--brand-soft)!important}

@media print{#sidebar,#topbar,.toolbar,.btn{display:none!important}#content{padding:0}}
</style>
</head>
<body>
<div id="login-screen" style="position:fixed;inset:0;background:linear-gradient(135deg,#0e5e54 0%,#1a8a7a 100%);z-index:9999;display:flex;align-items:center;justify-content:center">
  <div id="pin-setup" style="display:none;background:#fff;border-radius:16px;padding:36px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="text-align:center;margin-bottom:24px"><div style="font-size:26px;font-weight:900;color:#0e5e54">EN<span style="color:#4caf7d">sign</span> ERP</div><div style="font-size:13px;color:#7d918c;margin-top:4px">처음 사용 설정</div></div>
    <div id="setup-error" style="display:none;background:#fde8e8;color:#c0392b;padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:14px"></div>
    <div style="margin-bottom:12px"><label style="font-size:12px;color:#5e716c;font-weight:600;display:block;margin-bottom:5px">이름 (인사관리에 등록된 이름)</label><input id="setup-name" placeholder="홍길동" style="width:100%;border:1.5px solid #d1dbd9;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#0e5e54'" onblur="this.style.borderColor='#d1dbd9'"></div>
    <div style="background:#fff3e0;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#e65100;line-height:1.6">⚠ <b>PIN은 설정 후 변경이 불가합니다.</b><br>반드시 기억하기 쉬우면서 타인이 유추하기 어려운 6자리를 설정해 주세요.</div>    <div style="margin-bottom:6px"><label id="setup-pin-label" style="font-size:12px;color:#5e716c;font-weight:600;display:block;margin-bottom:6px">PIN 설정 (6자리)</label><div id="setup-dots" style="display:flex;gap:10px;justify-content:center;margin-bottom:8px"></div></div>
    <div id="confirm-wrap" style="display:none;margin-bottom:14px"><div id="confirm-notice" style="background:#fff8e1;color:#f57f17;padding:8px 12px;border-radius:7px;font-size:12px;text-align:center;margin-bottom:8px;font-weight:600">🔒 PIN을 한 번 더 입력해주세요</div><div id="confirm-dots" style="display:flex;gap:10px;justify-content:center;margin-bottom:8px"></div></div>
    <div id="setup-keypad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px"></div>
    <button onclick="PinAuth.cancelSetup()" style="width:100%;background:#f0f5f3;border:1px solid #d1dbd9;border-radius:8px;padding:10px;font-size:13px;color:#5e716c;cursor:pointer">취소</button>
  </div>
  <div id="pin-login" style="display:none;background:#fff;border-radius:16px;padding:36px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="text-align:center;margin-bottom:20px"><div style="font-size:26px;font-weight:900;color:#0e5e54">EN<span style="color:#4caf7d">sign</span> ERP</div><div id="pin-greeting" style="font-size:15px;color:#2e7d52;font-weight:700;margin-top:8px"></div><div style="font-size:12px;color:#7d918c;margin-top:2px">PIN 6자리를 입력하세요</div></div>
    <div id="pin-error" style="display:none;background:#fde8e8;color:#c0392b;padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:12px;text-align:center"></div>
    <div style="display:flex;gap:12px;justify-content:center;margin-bottom:24px"><div id="pin-dots" style="display:flex;gap:12px"></div></div>
    <div id="login-keypad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px"></div>
    
    <div style="text-align:right;margin-top:4px"><button onclick="PinAuth.showEmailLogin()" style="background:none;border:none;font-size:11px;color:#b0bbb8;cursor:pointer;text-decoration:underline">관리자 로그인</button></div>
  </div>
  <div id="email-login" style="display:none;background:#fff;border-radius:16px;padding:36px 40px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)">
    <div style="text-align:center;margin-bottom:24px"><div style="font-size:26px;font-weight:900;color:#0e5e54">EN<span style="color:#4caf7d">sign</span> ERP</div><div style="font-size:12px;color:#7d918c;margin-top:4px">관리자 로그인</div></div>
    <div id="login-error" style="display:none;background:#fde8e8;color:#c0392b;padding:8px 12px;border-radius:7px;font-size:12px;margin-bottom:14px"></div>
    <div style="margin-bottom:12px"><label style="font-size:12px;color:#5e716c;font-weight:600;display:block;margin-bottom:5px">이메일</label><input id="login-email" type="email" placeholder="이메일 주소" style="width:100%;border:1.5px solid #d1dbd9;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#0e5e54'" onblur="this.style.borderColor='#d1dbd9'" onkeydown="if(event.key==='Enter')document.getElementById('login-pw').focus()"></div>
    <div style="margin-bottom:16px"><label style="font-size:12px;color:#5e716c;font-weight:600;display:block;margin-bottom:5px">비밀번호</label><input id="login-pw" type="password" placeholder="비밀번호" style="width:100%;border:1.5px solid #d1dbd9;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;outline:none" onfocus="this.style.borderColor='#0e5e54'" onblur="this.style.borderColor='#d1dbd9'" onkeydown="if(event.key==='Enter')SupaAuth.login()"></div>
    <button id="login-btn" onclick="SupaAuth.login()" style="width:100%;background:#0e5e54;color:#fff;border:none;border-radius:8px;padding:11px;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:8px">로그인</button>
    <button onclick="PinAuth.showPinLogin()" style="width:100%;background:#f0f5f3;border:1px solid #d1dbd9;border-radius:8px;padding:10px;font-size:12px;color:#7d918c;cursor:pointer">PIN 로그인으로 돌아가기</button>
  </div>
</div>
<div id="app-screen" style="display:none">

/* TOE → 에너지진단 등급 자동산정 (연간 에너지사용량 기준) */
function toeGrade(toe){
  toe = Number(toe)||0;
  if(toe <= 0) return '';
  if(toe < 5000)   return 'C';
  if(toe < 10000)  return 'B';
  if(toe < 20000)  return 'A1';
  if(toe < 50000)  return 'A2';
  if(toe < 100000) return 'A3';
  if(toe < 200000) return 'A4';
  return 'A5';
}

/* 계약번호 자동채번: EN + 대상년도 + 구분코드(2자리) + 순번3자리 */
function nextContractNo(year, typeCode){
  const prefix = 'EN' + year + typeCode;
  let max = 0;
  State.contracts.forEach(c=>{
    if(c.no && c.no.startsWith(prefix)){
      const seq = parseInt(c.no.slice(prefix.length), 10);
      if(!isNaN(seq) && seq > max) max = seq;
    }
  });
  return prefix + String(max+1).padStart(3,'0');
}

function calcBankBalances(){
  const map = {};
  [...State.bank]
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''))
    .forEach(b=>{
      const name = (b.bankName||'직접입력').trim();
      if(b.balance!==''&&b.balance!=null&&Number(b.balance)>=0){
        if(!map[name]) map[name]={balance:0, date:'', count:0};
        map[name].balance = Number(b.balance)||0;
        map[name].date    = b.date||'';
        map[name].count++;
      }
    });
  return map;
}

let dashYear = String(new Date().getFullYear()); // 기본값: 올해
Views.dash = function(){
  const allYears = [...new Set(State.contracts.map(c=>c.year))].sort().reverse();
  // 올해가 데이터에 없으면 전체로 폴백
  if(dashYear && dashYear !== '' && !allYears.includes(dashYear)) dashYear = allYears[0] || '';
  // 계약금액 합계: 계약의 대상년도(dashYear) 기준
  const cts = dashYear ? State.contracts.filter(c=>c.year===dashYear) : State.contracts;
  const totalAmt = cts.reduce((s,c)=>s+(Number(c.supply)||0),0); // 계약금액 = 공급가액(VAT 제외)
  const totalAmtVat = cts.reduce((s,c)=>s+(Number(c.supply)||0)+(Number(c.vat)||0),0); // 계약금액(부가세포함)
  // 세금계산서 발행/미수/입금 합계: 발행일자(issueDate)의 연도 기준 (계약 대상년도와 무관)
  const issued   = State.invoices.filter(v=>v.issueDate && (!dashYear || v.issueDate.slice(0,4)===dashYear));
  const issuedAmt= issued.reduce((s,v)=>s+(Number(v.supply)||0),0); // 공급가액(VAT 제외)
  const issuedAmtVat = issued.reduce((s,v)=>s+(Number(v.supply)||0)+(Number(v.vat)||0),0); // 발행금액(부가세포함)
  const unpaid   = issued.filter(v=>!v.paid);
  const unpaidAmt= unpaid.reduce((s,v)=>s+(Number(v.supply)||0),0); // 공급가액(VAT 제외)
  const unpaidAmtVat = unpaid.reduce((s,v)=>s+(Number(v.supply)||0)+(Number(v.vat)||0),0); // 미수금(부가세포함)
  const paidAmt  = issuedAmt - unpaidAmt;
  const bankBalMap = calcBankBalances();
  const bankBal    = Object.values(bankBalMap).reduce((s,v)=>s+v.balance,0);
  const bankList   = Object.entries(bankBalMap).sort((a,b)=>b[1].balance-a[1].balance);
  const yearLabel= dashYear ? dashYear+'년' : '전체';

  /* 탭 버튼 */
  const tabs = ['전체', ...allYears];
  const tabHtml = tabs.map(y=>{
    const val   = y==='전체' ? '' : y;
    const on    = dashYear===val;
    return `<button onclick="dashYear='${val}';Views.dash()" style="
      padding:7px 16px;border-radius:20px;font-size:13px;font-weight:${on?700:500};
      border:1.5px solid ${on?'var(--brand)':'var(--line)'};
      background:${on?'var(--brand)':'#fff'};
      color:${on?'#fff':'var(--ink2)'};cursor:pointer">${y}</button>`;
  }).join('');

  /* 구분별 */
  const byType = {};
  Object.keys(TYPE_CODES).forEach(k=>byType[k]={cnt:0,amt:0,issuedAmt:0,unpaidAmt:0});
  cts.forEach(c=>{ if(byType[c.typeCode]){ byType[c.typeCode].cnt++; byType[c.typeCode].amt+=(Number(c.supply)||0); } }); // 공급가액(VAT 제외)
  // 사업본부별 계산서 발행금액·미수금: '발행일 기준 연도(issued)'에 속한 세금계산서를 계약의 사업본부로 집계
  const ctIdToType = {};
  State.contracts.forEach(c=>{ ctIdToType[c.id]=c.typeCode; });
  issued.forEach(v=>{
    const tc = ctIdToType[v.contractId];
    if(tc && byType[tc]){
      byType[tc].issuedAmt += (Number(v.supply)||0); // 공급가액(VAT 제외)
      if(!v.paid) byType[tc].unpaidAmt += (Number(v.supply)||0); // 미수금(부가세제외)
    }
  });
  const typeRows = Object.keys(TYPE_CODES).filter(k=>byType[k].cnt>0||true).map(k=>`
    <tr>
      <td><span class="tag ${TYPE_TAG[k]}">${TYPE_CODES[k]}</span></td>
      <td class="ctr">${byType[k].cnt}건</td>
      <td class="num">${fmt.money(byType[k].amt)}</td>
      <td class="num">${fmt.money(byType[k].issuedAmt)}</td>
      <td class="num" style="color:${byType[k].unpaidAmt>0?'var(--red)':'inherit'}">${fmt.money(byType[k].unpaidAmt)}</td>
    </tr>`).join('');

  /* 사업본부별 계약금액 / 발행금액 원형그래프(도넛) */
  const TYPE_COLORS = { '01':'#4caf7d', '02':'#42a5f5', '03':'#ffa726', '04':'#ab47bc', '05':'#90a4ae' };
  function donutChart(title, dataMap, valueKey){
    const keys = Object.keys(TYPE_CODES).filter(k=>dataMap[k][valueKey]>0);
    const total = keys.reduce((s,k)=>s+dataMap[k][valueKey],0);
    const W=220, H=220, cx=W/2, cy=H/2, r=98, rInner=56;
    if(total<=0){
      return `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--ink3);font-size:12px">
        <div style="font-weight:700;margin-bottom:6px">${title}</div>데이터 없음</div>`;
    }
    let angle = -90; // 12시 방향부터 시작
    let paths = '';
    let legend = '';
    keys.forEach(k=>{
      const val = dataMap[k][valueKey];
      const pct = val/total*100;
      const sweep = pct/100*360;
      const a1 = angle*Math.PI/180;
      const a2 = (angle+sweep)*Math.PI/180;
      const x1o=cx+r*Math.cos(a1), y1o=cy+r*Math.sin(a1);
      const x2o=cx+r*Math.cos(a2), y2o=cy+r*Math.sin(a2);
      const x1i=cx+rInner*Math.cos(a1), y1i=cy+rInner*Math.sin(a1);
      const x2i=cx+rInner*Math.cos(a2), y2i=cy+rInner*Math.sin(a2);
      const large = sweep>180?1:0;
      paths += `<path d="M${x1o},${y1o} A${r},${r} 0 ${large} 1 ${x2o},${y2o} L${x2i},${y2i} A${rInner},${rInner} 0 ${large} 0 ${x1i},${y1i} Z" fill="${TYPE_COLORS[k]}" stroke="#fff" stroke-width="1.5"/>`;
      // 비율(%)을 도넛 조각 중간 지점에 직접 표시 (조각이 너무 작으면(5% 미만) 생략해 겹침 방지)
      if(pct>=5){
        const midAngle = (angle+sweep/2)*Math.PI/180;
        const rLabel = (r+rInner)/2;
        const lx = cx+rLabel*Math.cos(midAngle), ly = cy+rLabel*Math.sin(midAngle);
        paths += `<text x="${lx}" y="${ly+3.5}" text-anchor="middle" font-size="11" font-weight="800" fill="#fff" style="paint-order:stroke;stroke:rgba(0,0,0,0.25);stroke-width:2px">${pct.toFixed(0)}%</text>`;
      }
      legend += `<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink2);margin-bottom:6px">
        <span style="width:10px;height:10px;background:${TYPE_COLORS[k]};border-radius:2px;display:inline-block;flex:none"></span>
        <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${TYPE_CODES[k]}</span>
      </div>`;
      angle += sweep;
    });
    return `<div style="display:flex;flex-direction:column;height:100%">
      <div style="font-size:12px;font-weight:700;color:var(--ink);margin-bottom:4px;text-align:center">${title}</div>
      <div style="display:flex;align-items:center;flex:1;gap:10px">
        <svg viewBox="0 0 ${W} ${H}" style="width:170px;height:170px;flex:none">
          ${paths}
          <text x="${cx}" y="${cy-3}" text-anchor="middle" font-size="13" font-weight="800" fill="var(--ink)">${fmt.money(total)}</text>
          <text x="${cx}" y="${cy+14}" text-anchor="middle" font-size="10" fill="var(--ink3)">원</text>
        </svg>
        <div style="flex:1;min-width:0">${legend}</div>
      </div>
    </div>`;
  }
  const ctDonut  = donutChart('계약금액 비율', byType, 'amt');
  const invDonut = donutChart('발행금액 비율', byType, 'issuedAmt');

  /* 년도별 비교: 3개년 그래프로 대체됨 */

  /* 최근 계약 카드는 삭제됨 */

  /* 과거 3개년 데이터 (현재 선택 년도 기준으로 최근 3년) */
  const baseYear = dashYear ? parseInt(dashYear) : new Date().getFullYear();
  const chart3Years = [baseYear-2, baseYear-1, baseYear].map(String);
  const yearStats = chart3Years.map(y=>{
    // 계약금액: 계약의 대상년도(y) 기준, 공급가액(VAT 제외)
    const ycts  = State.contracts.filter(c=>c.year===y);
    const ctAmt = ycts.reduce((s,c)=>s+(Number(c.supply)||0),0);
    // 발행금액: 세금계산서 '발행일자'의 연도(y) 기준 (계약 대상년도와 무관)
    const invs  = State.invoices.filter(v=>v.issueDate && v.issueDate.slice(0,4)===y);
    const invAmt= invs.reduce((s,v)=>s+(Number(v.supply)||0),0); // 공급가액(VAT 제외) — 월별 비교와 합계 일치
    const paid  = invs.filter(v=>v.paid).reduce((s,v)=>s+(Number(v.supply)||0),0); // 공급가액(VAT 제외)
    const unpaid= invAmt - paid;
    return { y, ctAmt, invAmt, paid, unpaid, cnt:ycts.length };
  });

  /* 월별 비교: 올해(baseYear) vs 전년도(baseYear-1), 계약금액(계약일 기준)·발행금액(발행일 기준) */
  const curYear  = String(baseYear);
  const prevYear = String(baseYear-1);
  function monthlyAmtByDate(dateField, items, getAmt, year){
    const arr = Array(12).fill(0);
    items.forEach(it=>{
      const d = it[dateField];
      if(!d || d.slice(0,4)!==year) return;
      const m = parseInt(d.slice(5,7),10)-1;
      if(m>=0 && m<12) arr[m]+=getAmt(it);
    });
    return arr;
  }
  // 계약금액: '최근 3개년 비교'와 동일하게 계약 대상년도(c.year) 기준으로 연도 매칭.
  // 월 배치는 계약체결일(contractDate)이 있으면 그 월, 없으면 1월에 합산 (연도 합계는 항상 3개년 비교와 일치)
  function monthlyCtByYear(year){
    const arr = Array(12).fill(0);
    State.contracts.filter(c=>c.year===year).forEach(c=>{
      const amt = Number(c.supply)||0;
      const d = c.contractDate;
      let m = 0;
      if(d && d.slice(0,4)===year){ const mm = parseInt(d.slice(5,7),10)-1; if(mm>=0&&mm<12) m=mm; }
      arr[m]+=amt;
    });
    return arr;
  }
  const ctMonthCur   = monthlyCtByYear(curYear);  // 공급가액(VAT 제외), 3개년 비교와 합계 일치
  const ctMonthPrev  = monthlyCtByYear(prevYear); // 공급가액(VAT 제외), 3개년 비교와 합계 일치
  const invMonthCur  = monthlyAmtByDate('issueDate', State.invoices, v=>(Number(v.supply)||0), curYear); // 공급가액(VAT 제외)
  const invMonthPrev = monthlyAmtByDate('issueDate', State.invoices, v=>(Number(v.supply)||0), prevYear); // 공급가액(VAT 제외)

  /* 월별 비교 그래프 (계약금액 / 발행금액, 올해 vs 전년도) */
  function monthLineChart(curArr, prevArr, title, curColor, prevColor){
    const W=560, H=200, PL=50, PR=14, PT=22, PB=22;
    const cw=W-PL-PR, ch=H-PT-PB;
    const maxV = Math.max(...curArr, ...prevArr, 1);
    const stepX = cw/11;
    function pt(arr,i){ const x=PL+stepX*i; const y=PT+ch-(arr[i]/maxV*ch); return [x,y]; }
    function pathOf(arr){ return arr.map((_,i)=>{ const [x,y]=pt(arr,i); return (i===0?'M':'L')+x+','+y; }).join(' '); }
    let ylabels='';
    const steps=4;
    for(let i=0;i<=steps;i++){
      const v=maxV/steps*i;
      const y2=PT+ch-(ch*i/steps);
      ylabels+=`<text x="${PL-6}" y="${y2+4}" text-anchor="end" font-size="9" fill="#92a0ae">${(v/100000000).toFixed(1)}억</text>`;
      ylabels+=`<line x1="${PL}" y1="${y2}" x2="${W-PR}" y2="${y2}" stroke="#eef1f4" stroke-width="1"/>`;
    }
    let xlabels='';
    for(let i=0;i<12;i++){
      const [x] = pt(curArr,i);
      xlabels+=`<text x="${x}" y="${H-PB+14}" text-anchor="middle" font-size="9" fill="#5b6b7b">${i+1}월</text>`;
    }
    let dots='';
    [curArr,prevArr].forEach((arr,ai)=>{
      const color = ai===0?curColor:prevColor;
      arr.forEach((v,i)=>{ const [x,y]=pt(arr,i); dots+=`<circle cx="${x}" cy="${y}" r="2.5" fill="${color}"/>`; });
    });
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;min-height:170px">
      <text x="${W/2}" y="13" text-anchor="middle" font-size="11" fill="#1c2733" font-weight="700">${title}</text>
      ${ylabels}
      <path d="${pathOf(prevArr)}" fill="none" stroke="${prevColor}" stroke-width="2" stroke-dasharray="4,3"/>
      <path d="${pathOf(curArr)}" fill="none" stroke="${curColor}" stroke-width="2.5"/>
      ${dots}
      ${xlabels}
    </svg>`;
  }
  const ctMonthChart  = monthLineChart(ctMonthCur, ctMonthPrev, '계약금액 월별 비교 ('+curYear+'년 vs '+prevYear+'년)', '#0e5e54', '#b7c4c1');
  const invMonthChart = monthLineChart(invMonthCur, invMonthPrev, '세금계산서 발행금액 월별 비교 ('+curYear+'년 vs '+prevYear+'년)', '#3a57c9', '#b7c4c1');

  /* 증감율 계산 함수 (statRowsNew 및 월별표에서 공용 사용) */

  /* 증감율 계산 */
  function chgRate(cur, prev){
    if(!prev) return null;
    return ((cur - prev) / prev * 100).toFixed(1);
  }
  function chgBadge(cur, prev){
    const r = chgRate(cur, prev);
    if(r === null) return '';
    const up = Number(r) >= 0;
    return `<span style="color:${up?'var(--red)':'var(--blue)'};font-size:10.5px;font-weight:700">${up?'▲':'▼'}${Math.abs(r)}%</span>`;
  }
  function monthRow(label, curArr, prevArr){
    const cells = curArr.map((cv,i)=>{
      const pv = prevArr[i];
      const chg = pv ? chgBadge(cv, pv) : '';
      return `<td class="num" style="font-size:10.5px;white-space:nowrap">${cv?fmt.money(cv):'-'}<br>${chg}</td>`;
    }).join('');
    return `<tr><td class="lbl" style="white-space:nowrap;font-weight:600">${label}</td>${cells}</tr>`;
  }
  // 가로형 월별표 맨 아래 합계 행 (1~12월 총합 + 전년대비 증감율, 합계 칼럼 수만큼 colspan)
  function monthTotalRow(label, curArr, prevArr){
    const curSum  = curArr.reduce((a,b)=>a+b,0);
    const prevSum = prevArr.reduce((a,b)=>a+b,0);
    const chg = prevSum ? chgBadge(curSum, prevSum) : '';
    return `<tr style="border-top:2px solid var(--line)">
      <td class="lbl" style="font-weight:800;color:var(--ink2)">${label} 합계</td>
      <td class="num" colspan="12" style="font-weight:800;font-size:12px">${fmt.money(curSum)} <span style="font-size:10.5px;color:var(--ink3);font-weight:500">(전년 ${fmt.money(prevSum)})</span> ${chg}</td>
    </tr>`;
  }

  /* 월별 '누적' 배열 생성 (1월부터 해당월까지 합산) */
  function toCumulative(arr){
    const out=[]; let s=0;
    arr.forEach(v=>{ s+=v; out.push(s); });
    return out;
  }
  const ctCumCur    = toCumulative(ctMonthCur);
  const ctCumPrev   = toCumulative(ctMonthPrev);
  const invCumCur   = toCumulative(invMonthCur);
  const invCumPrev  = toCumulative(invMonthPrev);

  /* 세로형(월이 행) 비교표: 금액은 '해당월 실적', 증감율은 '1월~해당월 누적' 기준 */
  const CT_BG  = '#f6faf7';  // 계약금액 영역 파스텔(더 흐린 연그린)
  const INV_BG = '#f6f8fc';  // 발행금액 영역 파스텔(더 흐린 연블루)
  const cumTableRows = [...Array(12)].map((_,i)=>{
    const m = i+1;
    const ctMc=ctMonthCur[i], ctMp=ctMonthPrev[i];   // 해당월 실적
    const ivMc=invMonthCur[i], ivMp=invMonthPrev[i]; // 해당월 실적
    const ctCv=ctCumCur[i],  ctPv=ctCumPrev[i];      // 누적(증감율용)
    const ivCv=invCumCur[i], ivPv=invCumPrev[i];     // 누적(증감율용)
    const ctChg = ctPv ? chgBadge(ctCv, ctPv) : '<span style="color:var(--ink3);font-size:9.5px">-</span>';
    const ivChg = ivPv ? chgBadge(ivCv, ivPv) : '<span style="color:var(--ink3);font-size:9.5px">-</span>';
    const isCurMonth = (baseYear===new Date().getFullYear() && m===new Date().getMonth()+1);
    const hi = isCurMonth ? 'box-shadow:inset 0 0 0 1.5px var(--brand);' : '';
    return `<tr>
      <td class="ctr" style="font-weight:700;font-size:10px;padding:1px 5px;${hi}">${m}월</td>
      <td class="num" style="background:${CT_BG};font-size:10px;padding:1px 5px">${ctMp?fmt.money(ctMp):'-'}</td>
      <td class="num" style="background:${CT_BG};font-size:10px;font-weight:600;padding:1px 5px">${ctMc?fmt.money(ctMc):'-'}</td>
      <td class="num" style="background:${CT_BG};padding:1px 5px">${ctChg}</td>
      <td class="num" style="background:${INV_BG};font-size:10px;padding:1px 5px">${ivMp?fmt.money(ivMp):'-'}</td>
      <td class="num" style="background:${INV_BG};font-size:10px;font-weight:600;padding:1px 5px">${ivMc?fmt.money(ivMc):'-'}</td>
      <td class="num" style="background:${INV_BG};padding:1px 5px">${ivChg}</td>
    </tr>`;
  }).join('');

  // 세로형(누적비교) 표 맨 아래 합계 행
  const cumTotalRow = (function(){
    const ctSum=ctMonthCur.reduce((a,b)=>a+b,0), ctSumP=ctMonthPrev.reduce((a,b)=>a+b,0);
    const ivSum=invMonthCur.reduce((a,b)=>a+b,0), ivSumP=invMonthPrev.reduce((a,b)=>a+b,0);
    const ctChgT = ctSumP ? chgBadge(ctSum, ctSumP) : '<span style="color:var(--ink3);font-size:9.5px">-</span>';
    const ivChgT = ivSumP ? chgBadge(ivSum, ivSumP) : '<span style="color:var(--ink3);font-size:9.5px">-</span>';
    return `<tr style="border-top:2px solid var(--line)">
      <td class="ctr" style="font-weight:800;font-size:10px;padding:1px 5px">합계</td>
      <td class="num" style="background:${CT_BG};font-size:10px;padding:1px 5px">${fmt.money(ctSumP)}</td>
      <td class="num" style="background:${CT_BG};font-size:10px;font-weight:800;padding:1px 5px">${fmt.money(ctSum)}</td>
      <td class="num" style="background:${CT_BG};padding:1px 5px">${ctChgT}</td>
      <td class="num" style="background:${INV_BG};font-size:10px;padding:1px 5px">${fmt.money(ivSumP)}</td>
      <td class="num" style="background:${INV_BG};font-size:10px;font-weight:800;padding:1px 5px">${fmt.money(ivSum)}</td>
      <td class="num" style="background:${INV_BG};padding:1px 5px">${ivChgT}</td>
    </tr>`;
  })();

  /* 전년대비 달성률 막대그래프 (1월~12월, 누적 기준 = 표의 증감율과 동일 데이터)
     100% 이상(전년 달성/초과) = 빨간색, 100% 미만(미달성) = 파란색, 불투명도 30% */
  function achievementChart(title, curCumArr, prevCumArr){
    const W=300, H=360, PL=34, PR=38, PT=2, PB=24; // 하단 여백을 늘려 범례와 명확히 분리
    const rowH = (H-PT-PB)/12;
    const barMaxW = W-PL-PR;
    const RED  = 'rgba(220,53,69,0.3)';
    const BLUE = 'rgba(40,108,223,0.3)';
    const RED_LINE  = 'rgba(220,53,69,0.9)';
    const BLUE_LINE = 'rgba(40,108,223,0.9)';
    let bars = '';
    for(let i=0;i<12;i++){
      const cv = curCumArr[i], pv = prevCumArr[i];
      const pct = pv ? (cv/pv*100) : (cv>0?100:0); // 전년 누적 대비 달성률(%)
      const capped = Math.min(pct, 150); // 막대 길이는 150%에서 클램프(시각적 과도 방지)
      const w = Math.max(barMaxW * (capped/150), 2);
      const isAchieved = pv ? (cv>=pv) : (cv>0);
      const fill = isAchieved ? RED : BLUE;
      const line = isAchieved ? RED_LINE : BLUE_LINE;
      const textColor = isAchieved ? '#dc3545' : '#286cdf';
      const y = PT + i*rowH;
      const cy = y + rowH/2;
      // 막대 사이 간격을 좁혀 12개월이 한 화면에 더 빽빽하게 들어오도록 조정
      const slotH0 = rowH * 0.96;
      const barH0  = slotH0 / 1.12;  // 두께:간격 비율을 더 촘촘하게(간격을 줄임)
      const barH   = barH0 * 0.70;
      const barY   = cy - barH/2;
      bars += `<text x="${PL-6}" y="${cy+4}" text-anchor="end" font-size="10" fill="#5b6b7b">${i+1}월</text>`;
      bars += `<rect x="${PL}" y="${barY}" width="${barMaxW}" height="${barH}" fill="#f3f5f7" rx="3"/>`;
      bars += `<rect x="${PL}" y="${barY}" width="${w}" height="${barH}" fill="${fill}" stroke="${line}" stroke-width="1.2" rx="3"/>`;
      // 막대가 충분히 길면(공간 30px 이상) 막대 안쪽 우측에, 짧으면 막대 바깥 우측에 라벨 표시
      const labelText = pct.toFixed(0)+'%';
      if(w > 30){
        bars += `<text x="${PL+w-6}" y="${cy+4}" text-anchor="end" font-size="9.5" fill="${textColor}" font-weight="700">${labelText}</text>`;
      } else {
        bars += `<text x="${PL+w+5}" y="${cy+4}" text-anchor="start" font-size="9.5" fill="${textColor}" font-weight="700">${labelText}</text>`;
      }
    }
    // 100% 기준선 (라벨은 그래프 하단에 표시해 상단 잘림 방지)
    const x100 = PL + barMaxW * (100/150);
    bars += `<line x1="${x100}" y1="${PT}" x2="${x100}" y2="${H-PB+6}" stroke="#aab5b3" stroke-width="1" stroke-dasharray="3,3"/>`;
    bars += `<text x="${x100}" y="${H-1}" text-anchor="middle" font-size="8" fill="#92a0ae">100%</text>`;
    return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" style="width:100%;height:100%;display:block;margin:0 auto">
      ${bars}
    </svg>`;
  }
  const ctAchChart  = achievementChart('계약금액 달성률 (전년누적 대비)', ctCumCur, ctCumPrev);
  const invAchChart = achievementChart('발행금액 달성률 (전년누적 대비)', invCumCur, invCumPrev);
  const statRowsNew = yearStats.map((s,i)=>{
    const bg = s.y===String(baseYear) ? 'background:var(--brand-soft);' : '';
    const fw = s.y===String(baseYear) ? 'font-weight:700;' : '';
    return `<tr style="${bg}${fw}">
      <td class="ctr" style="${bg}"><b>${s.y}년</b></td>
      <td class="ctr" style="${bg}">${s.cnt}건</td>
      <td class="num" style="${bg}${fw}">${fmt.money(s.ctAmt)}</td>
      <td class="num" style="${bg}${fw}">${fmt.money(s.invAmt)}</td>
    </tr>`;
  }).join('') + (function(){
    // 맨 아래 증감율 행 (최근년도 vs 그 전년도)
    const last = yearStats[yearStats.length-1];
    const prev = yearStats.length>1 ? yearStats[yearStats.length-2] : null;
    const ctChg  = prev ? chgBadge(last.ctAmt,  prev.ctAmt)  : '<span style="color:var(--ink3);font-size:11px">-</span>';
    const invChg = prev ? chgBadge(last.invAmt, prev.invAmt) : '<span style="color:var(--ink3);font-size:11px">-</span>';
    return `<tr style="border-top:2px solid var(--line)">
      <td class="ctr" style="font-weight:700;color:var(--ink2)">증감율</td>
      <td class="ctr" style="color:var(--ink3);font-size:11px">전년대비</td>
      <td class="num">${ctChg}</td>
      <td class="num">${invChg}</td>
    </tr>`;
  })();

  document.getElementById('content').innerHTML = `
    <!-- 년도 탭 -->
    <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
      <span style="font-size:11.5px;color:var(--ink3);margin-right:2px;font-weight:600">대상년도</span>
      ${tabHtml}
    </div>

    <!-- KPI -->
    <div class="kpis" style="grid-template-columns:repeat(4,minmax(0,1fr)) minmax(170px,1.1fr)">
      <div class="kpi a"><div class="lb">${yearLabel} 계약</div><div class="vl">${cts.length}<small> 건</small></div></div>
      <div class="kpi b"><div class="lb">${yearLabel} 계약금액</div><div class="vl">${fmt.money(totalAmt)}<small> 원</small></div>
        <div style="margin-top:4px;font-size:10.5px;color:var(--ink3)">부가세포함 ${fmt.money(totalAmtVat)}원</div></div>
      <div class="kpi e"><div class="lb">${yearLabel} 세금계산서발행금액</div><div class="vl">${fmt.money(issuedAmt)}<small> 원</small></div>
        <div style="margin-top:4px;font-size:10.5px;color:var(--ink3)">부가세포함 ${fmt.money(issuedAmtVat)}원</div></div>
      <div class="kpi c"><div class="lb">${yearLabel} 미수금</div>
        <div class="vl" style="color:${unpaidAmt>0?'var(--red)':'inherit'}">${fmt.money(unpaidAmt)}<small> 원</small></div>
        <div style="margin-top:4px;font-size:10.5px;color:var(--ink3)">부가세포함 ${fmt.money(unpaidAmtVat)}원</div></div>

      <!-- 통장 잔액 합계 (단독 카드) -->
      <div class="kpi d" style="cursor:pointer" onclick="showBankBalModal()">
        <div class="lb" style="display:flex;justify-content:space-between;align-items:center">
          <span>통장 잔액 합계</span>
          <span style="font-size:10px;color:var(--ink3);font-weight:500">▼ 상세</span>

let ctFilter = { q:'', year:'', type:'' };

function _ctRows(){
  const list = State.contracts.filter(c=>{
    if(ctFilter.year && c.year !== ctFilter.year) return false;
    if(ctFilter.type && c.typeCode !== ctFilter.type) return false;
    if(ctFilter.q){
      const q = ctFilter.q.toLowerCase();
      if(!((c.no||'')+(c.name||'')+(c.client||'')+(c.manager||'')).toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(b.no||'').localeCompare(a.no||''));
  return list;
}
function _renderContracts(){
  const list = _ctRows();
  const sumSupply = list.reduce((s,c)=>s+(Number(c.supply)||0),0); // 공급가액(부가세 별도) 합계
  const sumTotal  = list.reduce((s,c)=>s+(Number(c.supply)||0)+(Number(c.vat)||0),0); // 부가세 포함 합계
  const rows = list.map(c=>{
    const total = (Number(c.supply)||0)+(Number(c.vat)||0);
    const invs = contractInvoices(c.id).filter(v=>v.issueDate);
    const paidAmt = invs.filter(v=>v.paid).reduce((s,v)=>s+invoiceTotal(v),0);
    return `<tr>
      <td style="font-size:12px"><b>${esc(c.no)}</b></td>
      <td><span class="tag ${TYPE_TAG[c.typeCode]||'t5'}" style="font-size:11px">${TYPE_CODES[c.typeCode]||''}</span></td>
      <td style="max-width:100px;overflow:hidden;text-overflow:ellipsis" title="${esc(c.client)}">${esc(c.client)}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis" title="${esc(c.name)}">${esc(c.name)}${c.typeCode==='04'&&c.grade?` <span class="tag gray" style="font-size:11px">${esc(c.grade)}등급</span>`:''}</td>
      <td class="ctr">${esc(c.contractDate||'-')}</td>
      <td class="num">${fmt.money(c.supply)}</td>
      <td class="num">${fmt.money(c.vat)}</td>
      <td class="num"><b>${fmt.money(total)}</b></td>
      <td class="num">${fmt.money(paidAmt)}</td>
      <td class="ctr">${esc(c.manager||'-')}</td>
      <td class="ctr">${(c.payKinds&&c.payKinds.length?c.payKinds:INV_KINDS.filter(k=>contractInvoices(c.id).some(v=>v.kind===k))).map(k=>`<span class="tag gray" style="margin:1px">${k}</span>`).join('')}</td>
      <td class="ctr">
        <button class="btn sm" onclick="Contracts.edit('${c.id}')">수정</button>
        <button class="btn sm dgr" onclick="Contracts.del('${c.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="11"><div class="empty"><b>계약이 없습니다</b>우측 상단 [계약 등록] 버튼으로 시작하세요</div></td></tr>`;
  const tb = document.getElementById('ct-tbody');
  const sm = document.getElementById('ct-summary');
  if(tb) tb.innerHTML = rows;
  if(sm) sm.innerHTML = `검색결과 <b>${list.length}</b>건`;
  // 상단 KPI 카드 (대상년도 필터 등에 따라 동적 갱신)
  const kpiBox = document.getElementById('ct-kpis');
  if(kpiBox){
    const yLabel = ctFilter.year ? ctFilter.year+'년 ' : '전체 ';
    kpiBox.innerHTML = `
      <div class="kpi a"><div class="lb">${yLabel}계약건수</div><div class="vl">${list.length}<small> 건</small></div></div>
      <div class="kpi b"><div class="lb">${yLabel}계약금액(부가세포함)</div><div class="vl">${fmt.money(sumTotal)}<small> 원</small></div></div>
      <div class="kpi e"><div class="lb">${yLabel}계약금액(부가세별도)</div><div class="vl">${fmt.money(sumSupply)}<small> 원</small></div></div>`;
  }
}

const Contracts = {
  edit(id){
    const c = id ? contractById(id) : null;
    const year = c ? c.year : String(new Date().getFullYear());
    const body = `
      <div class="frm">
        <div class="fld"><label>대상년도</label><input id="f-year" type="number" value="${esc(c?c.year:year)}" ${c?'readonly':''} onchange="Contracts.previewNo()"></div>

          </select></div>
        <div class="fld"><label>계약번호 (자동채번)</label><input id="f-no" readonly value="${esc(c?c.no:'')}"></div>
        <div class="fld"><label>담당자</label><input id="f-manager" value="${esc(c?c.manager:'')}"></div>

        <div class="fld w2"><label>계약명</label><input id="f-name" value="${esc(c?c.name:'')}"></div>
        <div class="fld"><label>업체명</label><input id="f-client" value="${esc(c?c.client:'')}"></div>
        <div class="fld"><label>공급가액</label><input id="f-supply" class="num" value="${c?fmt.num(c.supply):''}" oninput="Contracts.calcVat()" style="text-align:right"></div>
        <div class="fld"><label>부가세 (자동 10%)</label><input id="f-vat" value="${c?fmt.num(c.vat):''}" style="text-align:right"></div>
        <div class="fld" id="toe-wrap" style="display:${(!c||c.typeCode==='04')?'flex':'none'}">
          <label>연간 에너지사용량 (TOE)</label>
          <input id="f-toe" type="number" value="${esc(c&&c.toe?c.toe:'')}" oninput="Contracts.calcGrade()">
        </div>
        <div class="fld" id="grade-wrap" style="display:${(!c||c.typeCode==='04')?'flex':'none'}">
          <label>진단 등급 (자동산정)</label>
          <input id="f-grade" readonly value="${esc(c?c.grade||'':'')}">
          <span class="hint">C(~5천) B(~1만) A1(~2만) A2(~5만) A3(~10만) A4(~20만) A5(20만↑)</span>
        </div>
        <div class="fld w2">
          <label>결제방식 (세금계산서에 체크한 항목만 생성됩니다)</label>
          <div style="display:flex;gap:14px;padding:7px 2px;flex-wrap:wrap">
            ${INV_KINDS.map(k=>{
              const checked = c ? (c.payKinds ? c.payKinds.includes(k) : contractInvoices(c.id).some(v=>v.kind===k)) : false;
              return `<label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;cursor:pointer"><input type="checkbox" class="f-pay" value="${k}" ${checked?'checked':''}> ${k}</label>`;
            }).join('')}
          </div>
          <span class="hint">예: 일시불 계약은 [전체발행]만, 분할 계약은 [선급금]+[잔금] 등으로 선택</span>
        </div>
        <div class="fld w2" style="border-top:1px dashed var(--line2);padding-top:10px;margin-top:4px">
          <label style="font-size:12.5px;color:var(--ink2);font-weight:700">진단대상업체 담당자정보 <span style="font-size:11px;color:var(--ink3);font-weight:400">(업무화면 비표시, 진단일정 엑셀에만 출력)</span></label>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px">
            <input id="f-site-contact-name" placeholder="성명" value="${esc(c?c.siteContactName||'':'')}">
            <input id="f-site-contact-phone" placeholder="연락처" value="${esc(c?c.siteContactPhone||'':'')}">
            <input id="f-site-contact-email" placeholder="이메일" value="${esc(c?c.siteContactEmail||'':'')}">
            <input id="f-site-address" placeholder="사업장주소" value="${esc(c?c.siteAddress||'':'')}">
          </div>
        </div>
        <div class="fld w2"><label>비고</label><input id="f-memo" value="${esc(c?c.memo||'':'')}"></div>
      </div>`;
    UI.openModal(c ? '계약 수정 — '+c.no : '계약 등록', body, [
      {label:'취소', onClick:UI.closeModal},
      {label:c?'수정 저장':'등록', cls:'pri', onClick:()=>Contracts.save(id)}
    ]);
    if(!c) Contracts.previewNo();
  },
  previewNo(){
    const noEl = document.getElementById('f-no');
    if(!noEl || noEl.dataset.fixed === '1') return;
    const y = document.getElementById('f-year').value;
    const t = document.getElementById('f-type').value;
    if(y && t) noEl.value = nextContractNo(y, t);
  },
  toggleToe(){
    const t = document.getElementById('f-type').value;
    const show = t==='04' ? 'flex' : 'none';
    document.getElementById('toe-wrap').style.display = show;
    document.getElementById('grade-wrap').style.display = show;
  },
  calcVat(){
    const sEl = document.getElementById('f-supply');
    const s = fmt.parseNum(sEl.value);
    sEl.value = s ? fmt.num(s) : '';
    document.getElementById('f-vat').value = s ? fmt.num(Math.round(s*0.1)) : '';
  },
  calcGrade(){
    document.getElementById('f-grade').value = toeGrade(document.getElementById('f-toe').value);
  },
  async save(id){
    const g = id => document.getElementById(id);
    const name = g('f-name').value.trim();
    if(!name){ toast('계약명을 입력하세요'); return; }
    const payKinds = [...document.querySelectorAll('.f-pay:checked')].map(el=>el.value);
    if(!payKinds.length){ toast('결제방식을 1개 이상 선택하세요'); return; }
    const year = g('f-year').value.trim();
    const typeCode = g('f-type').value;
    const data = {
      year, typeCode,
      no: g('f-no').value,
      name,
      client: g('f-client').value.trim(),
      contractDate: g('f-cdate').value,
      manager: g('f-manager').value.trim(),
      supply: fmt.parseNum(g('f-supply').value),
      vat: fmt.parseNum(g('f-vat').value),
      toe: typeCode==='04' ? Number(g('f-toe').value)||0 : 0,
      grade: typeCode==='04' ? toeGrade(g('f-toe').value) : '',
      payKinds,
      siteContactName:  g('f-site-contact-name')?.value.trim()  || '',
      siteContactPhone: g('f-site-contact-phone')?.value.trim() || '',
      siteContactEmail: g('f-site-contact-email')?.value.trim() || '',
      siteAddress:      g('f-site-address')?.value.trim()       || '',
      memo: g('f-memo').value.trim()
    };
    if(id){
      const c = contractById(id);
      // 체크 해제된 결제방식의 계산서 행 처리: 항목별로 삭제 여부를 개별 확인
      const removing = contractInvoices(id).filter(v=>!payKinds.includes(v.kind));
      const keepKinds = []; // 사용자가 '삭제 안 함'을 선택한 항목은 payKinds에 다시 포함
      removing.forEach(v=>{
        const withData = v.issueDate || Number(v.supply) || Number(v.vat) || v.paid;
        const msg = withData
          ? `[${v.kind}] 행에 입력된 내용이 있습니다.\n이 세금계산서 행을 삭제할까요?\n(취소 시 결제방식에 그대로 유지됩니다)`
          : `[${v.kind}] 항목의 세금계산서 행을 삭제할까요?\n(취소 시 결제방식에 그대로 유지됩니다)`;
        if(!confirm(msg)){
          keepKinds.push(v.kind); // 삭제하지 않기로 함 → 결제방식 유지
        }
      });
      const finalPayKinds = [...new Set([...payKinds, ...keepKinds])];
      const finalRemoving = removing.filter(v=>!keepKinds.includes(v.kind));
      State.invoices = State.invoices.filter(v=>!(v.contractId===id && finalRemoving.some(r=>r.kind===v.kind)));
      // 새로 체크된 결제방식 행 추가
      finalPayKinds.forEach(kind=>{
        if(!contractInvoices(id).some(v=>v.kind===kind)){
          State.invoices.push({ id:DB.uid(), contractId:id, kind, planDate:'', issueDate:'', supply:0, vat:0, paid:false, paidDate:'', memo:'' });
        }
      });
      data.payKinds = finalPayKinds;
      Object.assign(c, data);
      toast('계약이 수정되었습니다');
    } else {
      data.no = nextContractNo(year, typeCode); // 저장 직전 재채번(중복 방지)
      data.id = DB.uid();
      State.contracts.push(data);
      // 체크한 결제방식만 세금계산서 행 생성
      payKinds.forEach(kind=>{
        State.invoices.push({ id:DB.uid(), contractId:data.id, kind, planDate:'', issueDate:'', supply:0, vat:0, paid:false, paidDate:'', memo:'' });
      });
      toast('계약 등록 완료 · 계약번호 '+data.no);
    }
    toast('저장 중...');
    try{
      await State.saveAll();
      toast('✅ 저장 완료');
    }catch(e){
      toast('❌ 저장 실패: '+e.message+' (변경사항이 저장되지 않았습니다)');
    }
    UI.closeModal(); Views.contracts();
  },
  async del(id){
    const c = contractById(id);
    if(!c) return;
    if(!confirm(`[${c.no}] ${c.name}\n계약과 연결된 세금계산서 행이 함께 삭제됩니다. 진행할까요?`)) return;
    const delIds = State.invoices.filter(v=>v.contractId===id).map(v=>v.id);
    State.contracts = State.contracts.filter(x=>x.id!==id);
    State.invoices = State.invoices.filter(v=>v.contractId!==id);
    State.bank.forEach(b=>{ const inv = State.invoices.find(v=>v.id===b.matchInvoiceId); if(!inv) b.matchInvoiceId = b.matchInvoiceId && null; });
    try{
      // 삭제는 Supabase에서도 명시적으로 delete (upsert만으로는 row가 안 지워짐)
      await supa.from('contracts').delete().eq('id', id);
      if(delIds.length) await supa.from('invoices').delete().in('id', delIds);
      await State.saveAll();
      toast('✅ 삭제되었습니다');
    }catch(e){
      toast('❌ 삭제 실패: '+e.message);
    }
    Views.contracts();
  },

      'TOE':12000, '결제방식':'선급금/잔금', '비고':'예시 행입니다. 지우고 실제 데이터를 입력하세요'
    }];

    const guide = XLSX.utils.aoa_to_sheet([

    ]);

    XLSX.writeFile(wb, '엔자인_계약등록양식.xlsx');

  importXlsx(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.includes('계약입력') ? '계약입력' : wb.SheetNames[0];
        const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
        const TYPE_BY_NAME = {};
        Object.keys(TYPE_CODES).forEach(k=>{ TYPE_BY_NAME[TYPE_CODES[k]] = k; TYPE_BY_NAME[k] = k; });
        let ok = 0; const errors = [];
        json.forEach((r, i)=>{
          const rowNo = i + 2; // 헤더 다음 행부터
          const keys = Object.keys(r);
          const get = names=>{ const k = keys.find(k=>names.some(n=>k.replace(/\s/g,'').includes(n))); return k!=null ? r[k] : ''; };
          const name = String(get(['계약명'])||'').trim();
          if(!name){ if(keys.some(k=>String(r[k]).trim()!=='')) errors.push(rowNo+'행: 계약명 누락'); return; }
          const year = String(get(['대상년도','대상연도','년도'])||'').replace(/[^0-9]/g,'').slice(0,4);
          if(year.length !== 4){ errors.push(rowNo+'행: 대상년도 오류'); return; }
          const typeRaw = String(get(['구분'])||'').trim();
          const typeCode = TYPE_BY_NAME[typeRaw] || TYPE_BY_NAME[typeRaw.padStart(2,'0')];
          if(!typeCode){ errors.push(rowNo+'행: 구분 인식 불가 ('+typeRaw+')'); return; }
          let cdate = get(['계약일','계약일자']);
          if(cdate instanceof Date) cdate = cdate.toISOString().slice(0,10);
          else cdate = String(cdate).slice(0,10).replace(/[./]/g,'-');
          const supply = fmt.parseNum(get(['공급가액','공급가']));
          let vat = fmt.parseNum(get(['부가세','세액']));
          if(!vat && supply) vat = Math.round(supply*0.1);
          const toe = typeCode==='04' ? fmt.parseNum(get(['TOE','toe','사용량'])) : 0;
          let payKinds = String(get(['결제방식','결제'])||'').split(/[\/,，、]+/).map(s=>s.trim()).filter(k=>INV_KINDS.includes(k));
          if(!payKinds.length) payKinds = ['전체발행'];
          const data = {
            id: DB.uid(), year, typeCode,
            no: nextContractNo(year, typeCode),
            name,
            client: String(get(['업체명','거래처','업체'])||'').trim(),
            contractDate: cdate==='' ? '' : cdate,
            manager: String(get(['담당자'])||'').trim(),
            supply, vat, toe,
            grade: typeCode==='04' ? toeGrade(toe) : '',
            payKinds,
            memo: String(get(['비고','메모'])||'').trim()
          };
          State.contracts.push(data);
          payKinds.forEach(kind=>{
            State.invoices.push({ id:DB.uid(), contractId:data.id, kind, planDate:'', issueDate:'', supply:0, vat:0, paid:false, paidDate:'', memo:'' });
          });
          ok++;
        });
        State.saveAll(); Views.contracts();
        let msg = ok + '건 등록 완료';
        if(errors.length) msg += ' · 건너뜀 ' + errors.length + '건';
        toast(msg);
        if(errors.length) setTimeout(()=>alert('건너뛴 행:\n' + errors.join('\n')), 300);
      }catch(err){ toast('가져오기 실패: 파일 형식을 확인하세요'); }
      input.value = '';
    };
    reader.readAsArrayBuffer(file);
  },
  exportXlsx(){
    const rows = State.contracts.map(c=>({
      '계약번호':c.no, '대상년도':c.year, '구분':TYPE_CODES[c.typeCode]||'', '계약명':c.name, '업체명':c.client,
      '계약일':c.contractDate, '공급가액':Number(c.supply)||0, '부가세':Number(c.vat)||0,
      '합계':(Number(c.supply)||0)+(Number(c.vat)||0), 'TOE':c.toe||'', '등급':c.grade||'',
      '담당자':c.manager, '결제방식':(c.payKinds||[]).join('/'), '비고':c.memo||''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '계약목록');
    XLSX.writeFile(wb, `엔자인_계약목록_${todayStr()}.xlsx`);
  }
};

let invFilter    = { q:'', year:'', typeCode:'', onlyUnpaid:false, ctYear:'' };

function _invHtml(){
  const cts = State.contracts.filter(c=>{
    if(invFilter.ctYear && c.year !== invFilter.ctYear) return false; // 계약 대상년도 필터 (미발행 신규계약 검색용)
    if(invFilter.year){
      // 발행년도 필터: 해당 연도에 발행된 세금계산서가 있는 계약만 표시
      const hasIssueInYear = State.invoices.some(v=>v.contractId===c.id && v.issueDate && v.issueDate.slice(0,4)===invFilter.year);
      if(!hasIssueInYear) return false;
    }
    if(invFilter.typeCode && c.typeCode !== invFilter.typeCode) return false;
    if(invFilter.q){
      const q = invFilter.q.toLowerCase();
      if(!((c.no||'')+(c.name||'')+(c.client||'')).toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(b.no||'').localeCompare(a.no||''));
  let html='', grandIssued=0, grandUnpaid=0, grandIssuedSupply=0, grandUnpaidSupply=0, grandCnt=0;
  cts.forEach(c=>{
    const invs = INV_KINDS.map(k=>contractInvoices(c.id).find(v=>v.kind===k)).filter(Boolean);
    if(invFilter.onlyUnpaid && !invs.some(v=>v.issueDate && !v.paid)) return;
    const ctotal=(Number(c.supply)||0)+(Number(c.vat)||0);
    // 총 발행금액 합계: '세금계산서 발행일' 기준 연도로 집계 (연도 미선택 시 전체발행분 = 발행일이 있는 모든 건)
    const issuedInvs = invs.filter(v=>v.issueDate && (!invFilter.year || v.issueDate.slice(0,4)===invFilter.year));
    const issuedSum = issuedInvs.reduce((s,v)=>s+invoiceTotal(v),0); // 부가세포함
    const issuedSumSupply = issuedInvs.reduce((s,v)=>s+(Number(v.supply)||0),0); // 부가세별도
    const paidSum   = issuedInvs.filter(v=>v.paid).reduce((s,v)=>s+invoiceTotal(v),0); // 부가세포함
    const paidSumSupply = issuedInvs.filter(v=>v.paid).reduce((s,v)=>s+(Number(v.supply)||0),0); // 부가세별도
    grandIssued+=issuedSum; grandUnpaid+=issuedSum-paidSum;
    grandIssuedSupply+=issuedSumSupply; grandUnpaidSupply+=issuedSumSupply-paidSumSupply;
    grandCnt+=issuedInvs.length;
    const bodyRows=invs.map(v=>{
        const tot = invoiceTotal(v);
        return `<tr>
          <td class="lbl">${esc(v.kind)}</td>
          <td><input type="date" id="f-date-${v.id}" value="${esc(v.issueDate||'')}" onchange="Invoices.setField('${v.id}','issueDate',this.value)"></td>
          <td><input class="num" id="f-sup-${v.id}" value="${v.supply?fmt.num(v.supply):''}" oninput="Invoices.onSupplyLive('${v.id}',this)" onchange="Invoices.onSupply('${v.id}',this)"></td>
          <td><input class="num" id="f-vat-${v.id}" value="${v.vat?fmt.num(v.vat):''}" oninput="Invoices.onVatLive('${v.id}',this)" onchange="Invoices.onVat('${v.id}',this)"></td>
          <td class="num-ro" id="f-tot-${v.id}">${tot?fmt.num(tot):''}</td>
          <td style="text-align:center"><input type="checkbox" id="f-paid-${v.id}" ${v.paid?'checked':''} onchange="Invoices.onPaid('${v.id}',this.checked)"></td>
          <td><input type="date" id="f-pdate-${v.id}" value="${esc(v.paidDate||'')}" onchange="Invoices.setField('${v.id}','paidDate',this.value)"></td>
          <td><input id="f-memo-${v.id}" value="${esc(v.memo||'')}" onchange="Invoices.setField('${v.id}','memo',this.value)"></td>
        </tr>`;
      }).join('');
    html+=`
      <table class="dz" style="margin-bottom:14px" id="inv-tbl-${c.id}">
        <tr class="cthead"><td colspan="8">
          <span class="tag ${TYPE_TAG[c.typeCode]||'t5'}" style="margin-right:6px">${TYPE_CODES[c.typeCode]||''}</span>
          <b>${esc(c.no)}</b> · ${esc(c.name)} · ${esc(c.client)}
          <span style="float:right;display:flex;align-items:center;gap:8px">
            <span style="font-weight:600">계약 ${fmt.num(ctotal)}원 ｜ 발행 ${fmt.num(issuedSum)}원 ｜ 입금 ${fmt.num(paidSum)}원 ｜ 미수 <b style="color:${issuedSum-paidSum>0?'var(--red)':'inherit'}">${fmt.num(issuedSum-paidSum)}</b>원</span>
            <button onclick="Invoices.cancelAll('${c.id}')"
              style="padding:5px 13px;border-radius:6px;border:1.5px solid #9ecfbf;background:#e8f4f0;color:#0e5e54;font-size:12px;font-weight:700;cursor:pointer">✕ 취소</button>
            <button onclick="Invoices.saveAll('${c.id}')"
              style="padding:5px 15px;border-radius:6px;border:1.5px solid #0a4a42;background:#0e5e54;color:#fff;font-size:12.5px;font-weight:800;cursor:pointer">💾 저장</button>
          </span>
        </td></tr>
        <tr><th style="width:84px">구분</th><th style="width:140px">발행일</th>
            <th style="width:130px">공급가액</th><th style="width:110px">세액</th><th style="width:120px">합계</th>
            <th style="width:56px">입금</th><th style="width:130px">입금일</th><th>비고</th></tr>
        ${bodyRows}
      </table>`;
  });
  return { html: html||`<div class="card"><div class="empty"><b>표시할 계약이 없습니다</b>계약관리에서 계약 등록 시 체크한 결제방식 행이 자동 생성됩니다</div></div>`, grandIssued, grandUnpaid, grandIssuedSupply, grandUnpaidSupply, grandCnt };
}

  const {html, grandIssued, grandUnpaid, grandIssuedSupply, grandUnpaidSupply, grandCnt} = _invHtml();

  if(wrap) wrap.innerHTML = html;
  if(sm)   sm.innerHTML   = `검색결과 <b>${grandCnt}</b>건`;
  // 상단 KPI 카드 (발행년도 필터 등에 따라 동적 갱신)

    kpiBox.innerHTML = `

      <div class="kpi e"><div class="lb">${yLabel}발행금액(부가세별도)</div><div class="vl">${fmt.money(grandIssuedSupply)}<small> 원</small></div></div>
      <div class="kpi c"><div class="lb">${yLabel}총미수금(부가세포함)</div><div class="vl" style="color:${grandUnpaid>0?'var(--red)':'inherit'}">${fmt.money(grandUnpaid)}<small> 원</small></div></div>

const Invoices = {
  byId(id){ return State.invoices.find(v=>v.id===id); },

  /* ── 즉시 DOM 업데이트 + 저장은 saveAll로 ── */
  setField(id, field, val){
    const v = this.byId(id); if(!v) return;
    v[field] = val;
  },

  /* 실시간 세액·합계 갱신 (oninput) */
  onSupplyLive(id, el){
    // 타이핑 중 쉼표 제거 후 순수 숫자로 파싱
    const raw   = fmt.parseNum(el.value);
    const vatEl = document.getElementById('f-vat-'+id);
    const v     = this.byId(id);
    // 세액: 사용자가 직접 입력한 값 없으면 항상 공급가액의 10%
    const userVat = vatEl ? fmt.parseNum(vatEl.value) : 0;
    const savedVat = Number(v?.vat)||0;
    // 직접 입력 여부: vatEl에 사용자가 타이핑했으면 dataset에 표시
    const manualVat = vatEl?.dataset?.manual === '1';
    if(!manualVat){
      const autoVat = Math.round(raw * 0.1);
      if(vatEl) vatEl.value = autoVat ? fmt.num(autoVat) : '';
      const totEl = document.getElementById('f-tot-'+id);
      if(totEl) totEl.textContent = (raw+autoVat) ? fmt.num(raw+autoVat) : '';
    } else {
      const vat   = fmt.parseNum(vatEl?.value||'');
      const totEl = document.getElementById('f-tot-'+id);
      if(totEl) totEl.textContent = (raw+vat) ? fmt.num(raw+vat) : '';
    }
  },
  onVatLive(id, el){
    // 세액 직접 입력 표시
    el.dataset.manual = '1';
    const raw   = fmt.parseNum(el.value);
    const supEl = document.getElementById('f-sup-'+id);
    const sup   = fmt.parseNum(supEl?.value||'') || Number(this.byId(id)?.supply)||0;
    const totEl = document.getElementById('f-tot-'+id);
    if(totEl) totEl.textContent = (sup+raw) ? fmt.num(sup+raw) : '';
  },
  /* 확정 저장 (onchange - 포커스 이탈 시) */
  onSupply(id, el){
    const v = this.byId(id); if(!v) return;
    const n = fmt.parseNum(el.value);
    v.supply = n;
    el.value = n ? fmt.num(n) : '';
    // 세액: manual 입력 없으면 10% 확정
    const vatEl    = document.getElementById('f-vat-'+id);
    const manualVat = vatEl?.dataset?.manual === '1';
    if(!manualVat){
      const autoVat = Math.round(n * 0.1);
      v.vat = autoVat;
      if(vatEl) vatEl.value = autoVat ? fmt.num(autoVat) : '';
    } else {
      v.vat = fmt.parseNum(vatEl?.value||'');
    }
    const totEl = document.getElementById('f-tot-'+id);
    if(totEl) totEl.textContent = (n+(v.vat||0)) ? fmt.num(n+(v.vat||0)) : '';
  },

  onVat(id, el){
    const v = this.byId(id); if(!v) return;
    const n = fmt.parseNum(el.value);
    v.vat = n;
    el.value  = n ? fmt.num(n) : '';
    el.dataset.manual = n ? '1' : '0';  // 직접 입력 여부 기록
    const supEl = document.getElementById('f-sup-'+id);
    const totEl = document.getElementById('f-tot-'+id);
    if(totEl){
      const sup = fmt.parseNum(supEl?.value||'') || Number(v.supply)||0;
      totEl.textContent = (sup+n) ? fmt.num(sup+n) : '';
    }
  },

  onPaid(id, checked){
    const v = this.byId(id); if(!v) return;
    v.paid = checked;
    const pdEl = document.getElementById('f-pdate-'+id);
    if(checked && !v.paidDate){
      v.paidDate = todayStr();
      if(pdEl) pdEl.value = v.paidDate;
    }
    if(!checked){
      v.paidDate = '';
      if(pdEl) pdEl.value = '';
    }
    // 입금 상태는 즉시 Supabase에 저장 (순차 처리로 경쟁상태 방지)
    Invoices._queueSave();
  },

  // 저장 요청을 순차적으로 처리 (동시 다발 클릭 시 경쟁상태 방지)
  _saveQueue: Promise.resolve(),
  _queueSave(){
    Invoices._saveQueue = Invoices._saveQueue.then(async function(){
      try{
        await State.saveAll();
        toast('✅ 저장됨');
      }catch(e){
        toast('❌ 저장 실패: '+e.message);
      }
    });
    return Invoices._saveQueue;
  },

  async saveAll(contractId){
    const c   = contractById(contractId);
    const invs = contractInvoices(contractId);
    // 현재 DOM 값 → State 반영 (input에 타이핑 중인 값 포함)
    invs.forEach(v=>{
      const supEl  = document.getElementById('f-sup-'+v.id);
      const vatEl  = document.getElementById('f-vat-'+v.id);
      const dateEl = document.getElementById('f-date-'+v.id);
      const pdEl   = document.getElementById('f-pdate-'+v.id);
      const memoEl = document.getElementById('f-memo-'+v.id);
      const paidEl = document.getElementById('f-paid-'+v.id);
      if(supEl)  v.supply    = fmt.parseNum(supEl.value);
      if(vatEl)  v.vat       = fmt.parseNum(vatEl.value);
      if(dateEl) v.issueDate = dateEl.value;
      if(pdEl)   v.paidDate  = pdEl.value;
      if(memoEl) v.memo      = memoEl.value.trim();
      if(paidEl) v.paid      = paidEl.checked; // ← 체크박스 상태 반드시 반영
    });
    // 발행 합계 vs 계약금액 체크
    const ctotal     = (Number(c?.supply)||0)+(Number(c?.vat)||0);
    const issuedSum  = invs.filter(v=>v.issueDate).reduce((s,v)=>s+invoiceTotal(v),0);
    const diff = issuedSum - ctotal;
    if(issuedSum > 0 && diff !== 0){
      const msg = diff > 0
        ? `⚠ 발행 합계(${fmt.money(issuedSum)}원)가 계약금액(${fmt.money(ctotal)}원)보다\n${fmt.money(diff)}원 초과합니다. 저장할까요?`
        : `⚠ 발행 합계(${fmt.money(issuedSum)}원)가 계약금액(${fmt.money(ctotal)}원)보다\n${fmt.money(Math.abs(diff))}원 부족합니다. 저장할까요?`;
      if(!confirm(msg)) return;
    }
    toast('저장 중...');
    try{
      await State.saveAll();
      toast('✅ ['+c?.no+'] 저장 완료');
    }catch(e){
      toast('❌ 저장 실패: '+e.message);
      return;
    }
    _renderInvoices();
  },

  cancelAll(contractId){
    if(!confirm('이 계약의 세금계산서를 초기화합니다.\n발행일·공급가액·세액·입금 정보가 모두 지워집니다. 계속할까요?')) return;
    const c    = contractById(contractId);
    const invs = contractInvoices(contractId);
    // State 초기화
    invs.forEach(v=>{
      v.issueDate = ''; v.supply = 0; v.vat = 0;
      v.paid = false; v.paidDate = ''; v.memo = '';
    });
    State.saveAll();
    // DOM 초기화
    invs.forEach(v=>{
      const supEl  = document.getElementById('f-sup-'+v.id);
      const vatEl  = document.getElementById('f-vat-'+v.id);
      const dateEl = document.getElementById('f-date-'+v.id);
      const pdEl   = document.getElementById('f-pdate-'+v.id);
      const memoEl = document.getElementById('f-memo-'+v.id);
      const totEl  = document.getElementById('f-tot-'+v.id);
      const paidEl = document.getElementById('f-paid-'+v.id);
      if(supEl)  supEl.value       = '';
      if(vatEl)  vatEl.value       = '';
      if(dateEl) dateEl.value      = '';
      if(pdEl)   pdEl.value        = '';
      if(memoEl) memoEl.value      = '';
      if(totEl)  totEl.textContent = '';
      if(paidEl) paidEl.checked    = false;
      if(vatEl)  vatEl.dataset.manual = '0';
    });
    toast('['+c?.no+'] 세금계산서가 초기화되었습니다');
  },

  exportXlsx(){
    const rows = [];
    State.contracts.forEach(c=>{
      contractInvoices(c.id).forEach(v=>{
        rows.push({
          '계약번호':c.no, '계약명':c.name, '업체명':c.client, '구분':v.kind,
          '발행일':v.issueDate||'',
          '공급가액':Number(v.supply)||0, '세액':Number(v.vat)||0, '합계':invoiceTotal(v),
          '입금여부':v.paid?'입금':'미수', '입금일':v.paidDate||'', '비고':v.memo||''
        });
      });
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '세금계산서');
    XLSX.writeFile(wb, `엔자인_세금계산서_${todayStr()}.xlsx`);
  },

  /* 일괄등록 업로드 양식 다운로드 */
  template(){
    const sample = [{
      '계약번호':'EN202401001', '구분':'전체발행', '발행일':'2024-03-15',
      '공급가액':10000000, '세액':1000000,
      '입금여부':'미수', '입금일':'', '비고':'예시 행입니다. 지우고 입력하세요'
    }];
    const guide = XLSX.utils.aoa_to_sheet([
      ['엔자인 ERP 세금계산서 일괄등록 양식 안내'],[''],
      ['열 이름','설명'],
      ['계약번호','필수. 계약관리에 등록된 계약번호와 정확히 일치해야 합니다 (예: EN202401001)'],
      ['구분','필수. 전체발행 / 선급금 / 중도금 / 잔금 중 하나. 해당 계약의 결제방식에 포함된 구분만 인식됩니다'],

      ['입금여부','입금 / 미수 (비우면 미수로 처리)'],
      ['입금일','입금여부가 입금일 때만 입력. YYYY-MM-DD'],
      ['비고','선택'],[''],
      ['※ 계약번호+구분이 일치하는 기존 행이 있으면 덮어씁니다'],
      ['※ 계약번호를 찾을 수 없는 행은 건너뜁니다']
    ]);
    guide['!cols'] = [{wch:12},{wch:70}];
    const ws = XLSX.utils.json_to_sheet(sample);
    ws['!cols'] = [{wch:14},{wch:10},{wch:12},{wch:12},{wch:10},{wch:10},{wch:12},{wch:30}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '세금계산서입력');
    XLSX.utils.book_append_sheet(wb, guide, '작성안내');
    XLSX.writeFile(wb, '엔자인_세금계산서등록양식.xlsx');
  },

  /* 일괄등록 엑셀 업로드 */
  importXlsx(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async e=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.includes('세금계산서입력') ? '세금계산서입력' : wb.SheetNames[0];
        const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
        let ok=0; const errors=[];
        json.forEach((r,i)=>{
          const rowNo = i+2;
          const keys = Object.keys(r);
          const get = names=>{ const k=keys.find(k=>names.some(n=>k.replace(/\s/g,'').includes(n))); return k!=null?String(r[k]||'').trim():''; };
          const ctNo = get(['계약번호']);
          if(!ctNo){ if(keys.some(k=>String(r[k]).trim()!=='')) errors.push(rowNo+'행: 계약번호 누락'); return; }
          const c = State.contracts.find(x=>x.no===ctNo);
          if(!c){ errors.push(rowNo+'행: 계약번호 ['+ctNo+']을 찾을 수 없음'); return; }
          const kind = get(['구분']);
          const v = contractInvoices(c.id).find(x=>x.kind===kind);
          if(!v){ errors.push(rowNo+'행: ['+ctNo+'] 계약에 ['+kind+'] 구분이 없음 (결제방식 확인)'); return; }
          let issueDate = get(['발행일']);
          if(r['발행일'] instanceof Date) issueDate = r['발행일'].toISOString().slice(0,10);
          else issueDate = issueDate.slice(0,10).replace(/[./]/g,'-');
          const supply = fmt.parseNum(get(['공급가액'])||'0');
          let vat = get(['세액']);
          vat = vat ? fmt.parseNum(vat) : Math.round(supply*0.1);
          const paidRaw = get(['입금여부']);
          const paid = paidRaw === '입금';
          let paidDate = get(['입금일']);
          if(r['입금일'] instanceof Date) paidDate = r['입금일'].toISOString().slice(0,10);
          else paidDate = paidDate.slice(0,10).replace(/[./]/g,'-');
          v.issueDate = issueDate.length===10 ? issueDate : '';
          v.supply = supply;
          v.vat = vat;
          v.paid = paid;
          v.paidDate = paid && paidDate.length===10 ? paidDate : (paid ? todayStr() : '');
          v.memo = get(['비고']) || v.memo;
          ok++;
        });
        if(ok===0 && !errors.length){
          toast('처리할 데이터가 없습니다');
          input.value=''; return;
        }
        toast('저장 중...');
        try{
          await State.saveAll();
        }catch(saveErr){
          toast('❌ 저장 실패: '+saveErr.message+' (변경사항이 저장되지 않았습니다)');
          input.value=''; return;
        }
        _renderInvoices();
        let msg = '✅ '+ok+'건 저장 완료';
        if(errors.length) msg += ' · 건너뜀 '+errors.length+'건';
        toast(msg);
        if(errors.length) setTimeout(()=>alert('건너뛴 행:\n'+errors.join('\n')),300);
      }catch(err){ toast('가져오기 실패: 파일 형식을 확인하세요'); console.error(err); }
      input.value='';
    };
    reader.readAsArrayBuffer(file);
  }
};

function _renderBankList(){
  const list = State.bank.filter(b=>{
    if(bankFilter.bankName && (b.bankName||'') !== bankFilter.bankName) return false;
    if(bankFilter.month && (b.date||'').slice(0,7) !== bankFilter.month) return false;
    if(bankFilter.kind==='in' && !(Number(b.deposit)>0)) return false;
    if(bankFilter.kind==='out' && !(Number(b.withdraw)>0)) return false;
    if(bankFilter.q && !((b.desc||'')+(b.memo||'')).toLowerCase().includes(bankFilter.q.toLowerCase())) return false;
    return true;
  }).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const inSum  = list.reduce((s,b)=>s+(Number(b.deposit)||0),0);
  const outSum = list.reduce((s,b)=>s+(Number(b.withdraw)||0),0);
  const rows = list.map(b=>{
    const inv = b.matchInvoiceId ? State.invoices.find(v=>v.id===b.matchInvoiceId) : null;
    const c   = inv ? contractById(inv.contractId) : null;
    const dateStr = (b.date||'').slice(0,10);
    const timeStr = (b.date||'').length > 10 ? (b.date||'').slice(11,16) : '';
    return `<tr>
      <td class="ctr" style="white-space:nowrap">
        <div style="font-size:12.5px">${esc(dateStr)}</div>
        ${timeStr?`<div style="font-size:10.5px;color:var(--ink3)">${esc(timeStr)}</div>`:''}
      </td>
      <td style="font-size:11.5px;color:var(--ink2);white-space:nowrap">${esc(b.bankName||'-')}</td>
      <td>${esc(b.desc)}</td>
      <td class="num" style="color:var(--blue)">${Number(b.deposit)?fmt.num(b.deposit):''}</td>
      <td class="num" style="color:var(--red)">${Number(b.withdraw)?fmt.num(b.withdraw):''}</td>
      <td class="num">${b.balance!==''&&b.balance!=null?fmt.num(b.balance):''}</td>
      <td>${c?`<span class="tag t4">${esc(c.no)} ${esc(inv.kind)}</span>`:(Number(b.deposit)>0?'<span class="tag gray">미매칭</span>':'')}</td>
      <td>${esc(b.memo||'')}</td>
      <td class="ctr">
        <button class="btn sm" onclick="Bank.edit('${b.id}')">수정</button>
        <button class="btn sm dgr" onclick="Bank.del('${b.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="9"><div class="empty"><b>거래내역이 없습니다</b>직접 등록하거나 은행 엑셀 파일을 가져오세요</div></td></tr>`;
  const tb = document.getElementById('bank-tbody');
  const sm = document.getElementById('bank-summary');
  if(tb) tb.innerHTML = rows;
  if(sm) sm.textContent = `${list.length}건 · 입금 ${fmt.num(inSum)} · 출금 ${fmt.num(outSum)}`;
}

const Bank = {
  byId(id){ return State.bank.find(b=>b.id===id); },
  edit(id){
    const b = id ? this.byId(id) : null;
    const body = `
      <div class="frm">
        <div class="fld"><label>거래일</label><input id="b-date" type="date" value="${esc(b?b.date:todayStr())}"></div>
        <div class="fld w2"><label>적요 (거래내용)</label><input id="b-desc" value="${esc(b?b.desc:'')}"></div>
        <div class="fld"><label>입금액</label><input id="b-dep" value="${b&&Number(b.deposit)?fmt.num(b.deposit):''}" style="text-align:right" oninput="this.value=this.value"></div>
        <div class="fld"><label>출금액</label><input id="b-wd" value="${b&&Number(b.withdraw)?fmt.num(b.withdraw):''}" style="text-align:right"></div>
        <div class="fld"><label>잔액</label><input id="b-bal" value="${b&&b.balance!==''&&b.balance!=null?fmt.num(b.balance):''}" style="text-align:right"></div>
        <div class="fld w2"><label>메모</label><input id="b-memo" value="${esc(b?b.memo||'':'')}"></div>
      </div>`;
    UI.openModal(b?'거래 수정':'거래 등록', body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'저장', cls:'pri', onClick:()=>Bank.save(id)}
    ]);
  },
  save(id){
    const g = x=>document.getElementById(x);
    const data = {
      date: g('b-date').value,
      desc: g('b-desc').value.trim(),
      deposit: fmt.parseNum(g('b-dep').value),
      withdraw: fmt.parseNum(g('b-wd').value),
      balance: g('b-bal').value.trim()===''?'':fmt.parseNum(g('b-bal').value),
      memo: g('b-memo').value.trim()
    };
    if(!data.date){ toast('거래일을 입력하세요'); return; }
    if(id){ Object.assign(this.byId(id), data); }
    else { data.id = DB.uid(); data.matchInvoiceId = null; State.bank.push(data); }
    State.bank.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
    State.saveAll(); UI.closeModal(); Views.bank(); toast('저장되었습니다');
  },
  del(id){
    if(!confirm('이 거래를 삭제할까요?')) return;
    State.bank = State.bank.filter(b=>b.id!==id);
    State.saveAll(); _renderBankList(); toast('삭제되었습니다');
  },
  clearAll(){
    const total = State.bank.length;
    if(!total){ toast('삭제할 거래내역이 없습니다'); return; }
    // 은행별 건수 요약
    const summary = {};
    State.bank.forEach(b=>{ const n=b.bankName||'직접입력'; summary[n]=(summary[n]||0)+1; });
    const sumText = Object.entries(summary).map(([k,v])=>`${k} ${v}건`).join(', ');
    if(!confirm(`통장거래 전체 ${total}건을 삭제합니다.\n\n[ ${sumText} ]\n\n입금매칭 정보도 함께 삭제됩니다. 계속할까요?`)) return;
    if(!confirm(`정말 삭제할까요? 삭제 후에는 복구할 수 없습니다.\n(삭제 전 [엑셀 내보내기]로 백업을 권장합니다)`)) return;
    // 계산서 매칭 해제
    State.invoices.forEach(v=>{ v.paid=false; v.paidDate=''; });
    State.bank = [];
    State.saveAll(); Views.bank(); toast(`${total}건 전체 삭제 완료`);
  },
