  _detectBank(keys){
    const h = keys.map(k=>k.replace(/ /g,'')).join('|');
    // 우리은행 — 지급(원) (가장 고유한 열명)
    if(h.includes('지급(원)')) return 'wr';
    // 하나은행 — 의뢰인/수취인 (하나은행 고유, IBK보다 먼저 체크)
    if(h.includes('의뢰인')||h.includes('수취인')) return 'hn';
    // IBK기업은행 — 거래일시 + 거래후잔액 + 번호열(' ') 조합
    // 하나은행과 구별: IBK는 ' '(공백) 열이 첫 번째, 하나은행은 '거래일시'가 첫 번째
    if(h.includes('거래일시')&&(h.includes('거래후잔액')||h.includes('거래후 잔액'))){
      const firstKey = keys[0]||'';
      if(firstKey.trim()===''||firstKey.trim()===' ') return 'ib'; // IBK: 첫 열이 공백(번호)
      return 'ib'; // 기타 경우도 IBK로 처리
    }
    if(h.includes('잔액금액')) return 'ib';
    // KB국민은행 — 보낸분/받는분 또는 입금액(원)+출금액(원) 정확 일치 (신한보다 먼저)
    if(h.includes('보낸분')||h.includes('받는분')) return 'kb';
    if(h.includes('입금액(원)')&&h.includes('출금액(원)')) return 'kb';
    // 신한은행 — 입금액+출금액+내용 조합 (KB와 구별: (원) 없음)
    if(h.includes('입금액')&&!h.includes('입금액(원)')&&h.includes('출금액')&&!h.includes('출금액(원)')&&(h.includes('내용')||h.includes('잔액')||h.includes('적요'))) return 'sh';
    if(h.includes('기재내용')) return 'sh';
    // 우리은행 — 들어온금액/나간금액 (구형식)
    if(h.includes('들어온금액')||h.includes('나간금액')) return 'wr';
    // KB국민은행 (구형식: 맡기신금액/찾으신금액)
    if(h.includes('맡기신금액')||h.includes('찾으신금액')) return 'kb';
    // 하나은행 — 받으신금액+보내신금액 동시에 있어야 함
    if(h.includes('받으신금액')&&h.includes('보내신금액')) return 'hn';
    // NH농협 — 내신금액 또는 거래적요
    if(h.includes('내신금액')||h.includes('거래적요')) return 'nh';
    // 하나은행 — 받으신금액 단독
    if(h.includes('받으신금액')) return 'hn';
    // SC
    if(h.includes('Credit')||h.includes('Debit')) return 'sc';
    // 카카오뱅크
    if(h.includes('거래일시')&&h.includes('상대방')) return 'kk';
    return null;
  },
  _col(r, keys, cands){
    for(const c of cands){
      // 완전 일치 우선
      let k = keys.find(k=>k===c);
      // 공백 제거 후 일치
      if(!k) k = keys.find(k=>k.replace(/ /g,'')===c.replace(/ /g,''));
      // 포함 관계
      if(!k) k = keys.find(k=>k.replace(/ /g,'').includes(c.replace(/ /g,'')));
      if(k!=null && r[k]!==''&&r[k]!=null) return r[k];
    }
    return '';
  },
  importXlsx(input){
    const file = input.files[0]; if(!file) return;
    const presetKey = document.getElementById('bank-preset')?.value||'auto';
    const reader = new FileReader();
    reader.onload = e=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.find(s=>['거래내역','Sheet1','입출금','통장','예금'].some(k=>s.includes(k)))||wb.SheetNames[0];
        const ws2 = wb.Sheets[sheetName];
        // 헤더 위치 자동 감지
        let json;
        let testKeys = [];
        try{
          const testJson0 = XLSX.utils.sheet_to_json(ws2, {defval:'', range:0});
          const firstKey0 = testJson0.length ? Object.keys(testJson0[0])[0]||'' : '';

          // range:2: 3행 헤더 (기업은행)
          const testJson2 = XLSX.utils.sheet_to_json(ws2, {defval:'', range:2});
          const ibkKeys   = testJson2.length ? Object.keys(testJson2[0]) : [];
          const isIBK     = ibkKeys.some(k=>k.trim()==='거래일시') && ibkKeys.some(k=>k.includes('거래후'));

          // range:3: 4행 헤더 (우리은행)
          const testJson3 = XLSX.utils.sheet_to_json(ws2, {defval:'', range:3});
          const wrKeys    = testJson3.length ? Object.keys(testJson3[0]) : [];
          const isWR      = wrKeys.some(k=>k.includes('지급(원)')) ||
                            (wrKeys.some(k=>k.includes('기재내용')) && wrKeys.some(k=>k.includes('거래후')));

          // range:6: 7행 헤더 (하나은행·KB국민은행)
          const testJson6 = XLSX.utils.sheet_to_json(ws2, {defval:'', range:6});
          const r6Keys    = testJson6.length ? Object.keys(testJson6[0]) : [];
          const isHana    = r6Keys.some(k=>k.trim()==='거래일시') && r6Keys.some(k=>k.includes('거래후잔액'));
          const isKB      = r6Keys.some(k=>k.includes('보낸분')||k.includes('받는분')) ||
                            (r6Keys.some(k=>k.includes('입금액(원)')) && r6Keys.some(k=>k.includes('출금액(원)')));

          if(isIBK){
            json = testJson2; testKeys = ibkKeys;
          } else if(isWR){
            json = testJson3; testKeys = wrKeys;
          } else if(isKB){
            json = testJson6; testKeys = r6Keys;
          } else if(isHana){
            json = testJson6; testKeys = r6Keys;
          } else if(firstKey0==='No.'){
            json = testJson3; testKeys = wrKeys;
          } else {
            json = testJson0;
            testKeys = json.length ? Object.keys(json[0]) : [];
          }
        }catch(e){ json = XLSX.utils.sheet_to_json(ws2, {defval:''}); }

        if(!json.length){ toast('데이터가 없습니다'); input.value=''; return; }
        const keys = Object.keys(json[0]);
        const detected = presetKey==='auto' ? this._detectBank(testKeys.length ? testKeys : keys) : presetKey;
        const preset   = detected ? this._PRESETS[detected] : null;
        const bankName = preset ? preset.name : '미확인';
        const DC = preset?.date || ['거래일자','거래일','일자','날짜','거래일시','Transaction Date'];
        const EC = preset?.desc || ['적요','거래내용','내용','기재내용','Description'];
        const PC = preset?.dep  || ['입금','입금금액','입금액','맡기신금액','받으신금액','Credit','들어온금액','받은금액'];
        const WC = preset?.wd   || ['출금','출금금액','출금액','찾으신금액','보내신금액','Debit','나간금액','보낸금액'];
        const BC = preset?.bal  || ['잔액','거래후잔액','잔액금액','Balance','거래후 잔액'];
        // 중복 체크: 기존 데이터 키(날짜+입금+출금+적요) Set 생성
        const existKeys = new Set(
          State.bank.map(b=>`${b.date}|${b.deposit||0}|${b.withdraw||0}|${String(b.desc||'').trim()}`)
        );
        let added=0, skipped=0, duped=0;
        json.forEach(r=>{
          const rk = Object.keys(r);
          // 날짜: Date객체·문자열·거래일시(datetime) 모두 처리
          let dateRaw = this._col(r,rk,DC);
          let date;
          if(dateRaw instanceof Date){
            // Date 객체: 로컬 시간으로 YYYY-MM-DD HH:MM:SS
            const d = dateRaw;
            const pad = n=>String(n).padStart(2,'0');
            date = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
          } else {
            date = String(dateRaw||'').trim();
            // '2026-06-12 13:01:23' 또는 '2026.06.12 13:01:23' 처리
            if(/\d{4}[.\-]\d{2}[.\-]\d{2}[\s T]\d{2}:\d{2}/.test(date)){
              // 날짜+시간 형식 (2026.06.13 01:09:28 → 2026-06-13 01:09:28)
              date = date.replace(/[.]/g,'-').replace(/T/,' ').slice(0,19);
            } else if(/\d{4}[./]\d{2}[./]\d{2}/.test(date)){
              date = date.replace(/\./g,'-').slice(0,10);
            } else if(/\d{4}-\d{2}-\d{2}/.test(date)){
              // 이미 올바른 형식 유지
            } else {
              date = date.slice(0,10).replace(/[./]/g,'-');
            }
          }
          if(!date||date.length<8){skipped++;return;}
          // 합계행 건너뜀 (신한은행 마지막 행 등)
          const firstVal = String(r[rk[0]]||'').trim();
          const secondVal = rk.length>1 ? String(r[rk[1]]||'').trim() : '';
          if(firstVal==='합계'||firstVal==='소계'||firstVal==='합  계'){skipped++;return;}
          if(!firstVal && secondVal.startsWith('총 ')&&secondVal.includes('건')){skipped++;return;}
          const descRaw = this._col(r,rk,EC)||'';
          // 신한은행: 내용(G)+적요(D) 조합
          let desc = String(descRaw).trim();
          if(preset?.extra?.desc2 && !desc){
            desc = String(this._col(r,rk,preset.extra.desc2)||'').trim();
          }
          // 지수 표기 금액 파싱 (3.19E7 → 31900000)
          const parseAmt = v=>{ const n=parseFloat(String(v||'').replace(/,/g,'')); return isNaN(n)?0:Math.round(n); };
          const dep  = parseAmt(this._col(r,rk,PC));
          const wd   = parseAmt(this._col(r,rk,WC));
          const bal  = parseAmt(this._col(r,rk,BC));
          if(!dep&&!wd&&!desc){skipped++;return;}
          // 상대방/수취인 정보를 메모에 자동 추가
          let memo = '';
          const extraCands = preset?.extra?.counterName || preset?.extra?.counterParty || preset?.extra?.counterParty || [];
          if(extraCands.length){
            const cn = String(this._col(r,rk,extraCands)||'').trim();
            if(cn && cn !== desc) memo = cn;
          }
          const dupKey = `${date}|${dep||0}|${wd||0}|${desc}`;
          if(existKeys.has(dupKey)){ duped++; return; }
          existKeys.add(dupKey); // 같은 파일 내 중복도 방지
          State.bank.push({id:DB.uid(),date,desc,deposit:dep,withdraw:wd,balance:bal,bankName,memo,matchInvoiceId:null});
          added++;
        });
        State.bank.sort((a,b)=>(a.date||'').localeCompare(b.date||''));
        State.saveAll(); Views.bank();
        let msg=`[${bankName}] ${added}건 가져왔습니다`;
        if(duped)   msg+=` · 중복 ${duped}건 제외`;
        if(skipped) msg+=` · 빈행 ${skipped}건 건너뜀`;
        toast(msg);
      }catch(err){toast('가져오기 실패: '+err.message);}
      input.value='';
    };
    reader.readAsArrayBuffer(file);
  },
  exportXlsx(){
    const rows = State.bank.map(b=>{
      const inv = b.matchInvoiceId ? State.invoices.find(v=>v.id===b.matchInvoiceId) : null;
      const c = inv ? contractById(inv.contractId) : null;
      return { '거래일':b.date, '은행':b.bankName||'', '적요':b.desc, '입금':Number(b.deposit)||0, '출금':Number(b.withdraw)||0,
               '잔액':b.balance===''?'':Number(b.balance)||0, '매칭계약':c?c.no+' '+inv.kind:'', '메모':b.memo||'' };
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '통장거래');
    XLSX.writeFile(wb, `엔자인_통장거래_${todayStr()}.xlsx`);
  }
};

/* =====================================================
   5) 입금매칭 — 미수 세금계산서 ↔ 미매칭 입금 대사
===================================================== */
let matchSel = { invId:null, bankId:null };

Views.match = function(){
  matchSel = { invId:null, bankId:null };
  renderMatch();
};

function renderMatch(){
  // 좌: 발행됐지만 미입금 상태인 세금계산서 행
  const unpaidInvs = State.invoices.filter(v=>v.issueDate && !v.paid)
    .map(v=>({v, c:contractById(v.contractId)})).filter(x=>x.c)
    .sort((a,b)=>(a.v.issueDate||'').localeCompare(b.v.issueDate||''));
  // 우: 매칭 안 된 입금 거래
  const freeDeps = State.bank.filter(b=>Number(b.deposit)>0 && !b.matchInvoiceId)
    .sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  const selInv = matchSel.invId ? State.invoices.find(v=>v.id===matchSel.invId) : null;
  const selAmt = selInv ? invoiceTotal(selInv) : 0;

  const invRows = unpaidInvs.map(({v,c})=>`
    <tr id="mi-${v.id}" class="${matchSel.invId===v.id?'pick':''}" style="cursor:pointer" onclick="Match.pickInv('${v.id}')">
      <td class="ctr">${esc(v.issueDate)}</td>
      <td><b>${esc(c.no)}</b></td>
      <td>${esc(c.name)}<br><small style="color:var(--ink3)">${esc(c.client)}</small></td>
      <td class="ctr"><span class="tag t3">${esc(v.kind)}</span></td>
      <td class="num"><b>${fmt.num(invoiceTotal(v))}</b></td>
    </tr>`).join('') || '<tr><td colspan="5"><div class="empty">미수금 건이 없습니다 🎉</div></td></tr>';

  const depRows = freeDeps.map(b=>{
    const exact = selInv && Number(b.deposit)===selAmt;
    return `<tr id="mb-${b.id}" class="${matchSel.bankId===b.id?'pick':''}" style="cursor:pointer" onclick="Match.pickBank('${b.id}')">
      <td class="ctr">${esc(b.date)}</td>
      <td>${esc(b.desc)}</td>
      <td class="num"><b style="color:var(--blue)">${fmt.num(b.deposit)}</b>${exact?' <span class="tag t4">금액일치</span>':''}</td>
    </tr>`;
  }).join('') || '<tr><td colspan="3"><div class="empty">미매칭 입금이 없습니다</div></td></tr>';

  const selBank = matchSel.bankId ? State.bank.find(b=>b.id===matchSel.bankId) : null;
  const canMatch = selInv && selBank;
  const diff = canMatch ? Number(selBank.deposit) - selAmt : 0;

  // 기존 매칭 이력
  const matched = State.bank.filter(b=>b.matchInvoiceId).sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,15);
  const histRows = matched.map(b=>{
    const v = State.invoices.find(x=>x.id===b.matchInvoiceId);
    const c = v ? contractById(v.contractId) : null;
    return `<tr>
      <td class="ctr">${esc(b.date)}</td><td>${esc(b.desc)}</td><td class="num">${fmt.num(b.deposit)}</td>
      <td>${c?esc(c.no):'?'} ${v?esc(v.kind):''}</td>
      <td class="ctr"><button class="btn sm dgr" onclick="Match.unlink('${b.id}')">매칭해제</button></td>
    </tr>`;
  }).join('') || '<tr><td colspan="5"><div class="empty">매칭 이력이 없습니다</div></td></tr>';

  document.getElementById('content').innerHTML = `
    <div class="toolbar">
      <span style="font-size:13px;color:var(--ink2)">① 좌측 미수 건 선택 → ② 우측 입금 선택 → ③ 매칭 실행. 금액이 같으면 <span class="tag t4">금액일치</span> 표시.</span>
      <span class="sp"></span>
      ${canMatch ? `<span style="font-size:12.5px;color:${diff===0?'var(--green)':'var(--amber)'}">차액 ${fmt.num(diff)}원</span>`:''}
      <button class="btn pri" ${canMatch?'':'disabled'} onclick="Match.link()">⇄ 매칭 실행</button>
    </div>
    <div class="match-grid">
      <div class="card" style="margin:0"><div class="hd"><h2>미수 세금계산서 (${unpaidInvs.length}건)</h2></div>
        <div class="bd np tbl-wrap" style="max-height:46vh">
          <table class="grid"><thead><tr><th class="ctr">발행일</th><th>계약번호</th><th>계약명/업체명</th><th class="ctr">구분</th><th class="num">금액</th></tr></thead>
          <tbody>${invRows}</tbody></table></div></div>
      <div class="card" style="margin:0"><div class="hd"><h2>미매칭 입금 (${freeDeps.length}건)</h2></div>
        <div class="bd np tbl-wrap" style="max-height:46vh">
          <table class="grid"><thead><tr><th class="ctr">거래일</th><th>적요</th><th class="num">입금액</th></tr></thead>
          <tbody>${depRows}</tbody></table></div></div>
    </div>
    <div class="card" style="margin-top:16px"><div class="hd"><h2>최근 매칭 이력</h2></div>
      <div class="bd np"><table class="grid"><thead><tr><th class="ctr">거래일</th><th>적요</th><th class="num">입금액</th><th>매칭 계약</th><th class="ctr">관리</th></tr></thead>
      <tbody>${histRows}</tbody></table></div></div>`;
}

const Match = {
  pickInv(id){ matchSel.invId = matchSel.invId===id ? null : id; renderMatch(); },
  pickBank(id){ matchSel.bankId = matchSel.bankId===id ? null : id; renderMatch(); },
  link(){
    const v = State.invoices.find(x=>x.id===matchSel.invId);
    const b = State.bank.find(x=>x.id===matchSel.bankId);
    if(!v || !b) return;
    const diff = Number(b.deposit) - invoiceTotal(v);
    if(diff !== 0 && !confirm(`입금액과 계산서 금액이 ${fmt.num(Math.abs(diff))}원 차이납니다.\n그래도 매칭할까요?`)) return;
    b.matchInvoiceId = v.id;
    v.paid = true;
    v.paidDate = b.date;
    State.saveAll();
    matchSel = { invId:null, bankId:null };
    renderMatch(); toast('매칭 완료');
  },
  unlink(bankId){
    const b = State.bank.find(x=>x.id===bankId); if(!b) return;
    const v = State.invoices.find(x=>x.id===b.matchInvoiceId);
    if(v){ v.paid = false; v.paidDate = ''; }
    b.matchInvoiceId = null;
    State.saveAll(); renderMatch(); toast('매칭이 해제되었습니다');
  }
};

/* =====================================================
   6) 적금관리
===================================================== */
Views.savings = function(){
  const cards = State.savings.map(s=>{
    const paidTotal = (s.payments||[]).reduce((x,p)=>x+(Number(p.amount)||0),0);
    const payRows = (s.payments||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map((p,i)=>`
      <tr><td class="ctr">${esc(p.date)}</td><td class="num">${fmt.num(p.amount)}</td>
      <td class="ctr"><button class="btn sm dgr" onclick="Savings.delPay('${s.id}',${(s.payments||[]).indexOf(p)})">삭제</button></td></tr>`).join('')
      || '<tr><td colspan="3"><div class="empty">납입 내역 없음</div></td></tr>';
    return `
    <div class="card">
      <div class="hd">
        <h2>${esc(s.name)} <span class="tag t2">${esc(s.bankName)}</span></h2>
        <span style="font-size:12.5px;color:var(--ink2)">월 ${fmt.num(s.monthly)}원 · ${esc(s.start||'?')} ~ ${esc(s.maturity||'?')}</span>
        <span class="sp"></span>
        <span style="font-size:13px">누적납입 <b>${fmt.num(paidTotal)}</b>원 (${(s.payments||[]).length}회)</span>
        <button class="btn sm pri" onclick="Savings.addPay('${s.id}')">+ 납입 기록</button>
        <button class="btn sm" onclick="Savings.edit('${s.id}')">수정</button>
        <button class="btn sm dgr" onclick="Savings.del('${s.id}')">삭제</button>
      </div>
      <div class="bd np" style="max-height:220px;overflow:auto">
        <table class="grid"><thead><tr><th class="ctr">납입일</th><th class="num">금액</th><th class="ctr">관리</th></tr></thead><tbody>${payRows}</tbody></table>
      </div>
    </div>`;
  }).join('') || `<div class="card"><div class="empty"><b>등록된 적금이 없습니다</b>[적금 등록] 버튼으로 추가하세요</div></div>`;

  document.getElementById('content').innerHTML = `
    <div class="toolbar"><span class="sp"></span><button class="btn pri" onclick="Savings.edit()">+ 적금 등록</button></div>
    ${cards}`;
};

const Savings = {
  byId(id){ return State.savings.find(s=>s.id===id); },
  edit(id){
    const s = id ? this.byId(id) : null;
    const body = `
      <div class="frm">
        <div class="fld w2"><label>적금명</label><input id="s-name" value="${esc(s?s.name:'')}"></div>
        <div class="fld"><label>은행</label><input id="s-bank" value="${esc(s?s.bankName:'')}"></div>
        <div class="fld"><label>월 납입액</label><input id="s-monthly" value="${s?fmt.num(s.monthly):''}" style="text-align:right"></div>
        <div class="fld"><label>시작일</label><input id="s-start" type="date" value="${esc(s?s.start:'')}"></div>
        <div class="fld"><label>만기일</label><input id="s-mat" type="date" value="${esc(s?s.maturity:'')}"></div>
        <div class="fld w2"><label>메모</label><input id="s-memo" value="${esc(s?s.memo||'':'')}"></div>
      </div>`;
    UI.openModal(s?'적금 수정':'적금 등록', body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'저장', cls:'pri', onClick:()=>Savings.save(id)}
    ]);
  },
  save(id){
    const g = x=>document.getElementById(x);
    const name = g('s-name').value.trim();
    if(!name){ toast('적금명을 입력하세요'); return; }
    const data = { name, bankName:g('s-bank').value.trim(), monthly:fmt.parseNum(g('s-monthly').value),
                   start:g('s-start').value, maturity:g('s-mat').value, memo:g('s-memo').value.trim() };
    if(id){ Object.assign(this.byId(id), data); }
    else { data.id = DB.uid(); data.payments = []; State.savings.push(data); }
    State.saveAll(); UI.closeModal(); Views.savings(); toast('저장되었습니다');
  },
  del(id){
    if(!confirm('적금과 납입 내역이 모두 삭제됩니다. 진행할까요?')) return;
    State.savings = State.savings.filter(s=>s.id!==id);
    State.saveAll(); Views.savings(); toast('삭제되었습니다');
  },
  addPay(id){
    const s = this.byId(id); if(!s) return;
    const body = `
      <div class="frm">
        <div class="fld"><label>납입일</label><input id="p-date" type="date" value="${todayStr()}"></div>
        <div class="fld"><label>금액</label><input id="p-amt" value="${fmt.num(s.monthly)}" style="text-align:right"></div>
      </div>`;
    UI.openModal('납입 기록 — '+s.name, body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'기록', cls:'pri', onClick:()=>{
        const date = document.getElementById('p-date').value;
        const amount = fmt.parseNum(document.getElementById('p-amt').value);
        if(!date || !amount){ toast('납입일과 금액을 입력하세요'); return; }
        (s.payments = s.payments||[]).push({date, amount});
        State.saveAll(); UI.closeModal(); Views.savings(); toast('납입이 기록되었습니다');
      }}
    ]);
  },
  delPay(id, idx){
    const s = this.byId(id); if(!s || !s.payments || idx<0) return;
    s.payments.splice(idx,1);
    State.saveAll(); Views.savings();
  }
};

/* =====================================================
   7) 설정 / 백업
===================================================== */

  const st = State.settings;
  const counts = {
    contracts: State.contracts.length,
    invoices: State.invoices.length,
    bank: State.bank.length,

          <tr><td><span class="tag t4">A3</span></td><td>50,000 이상 ~ 100,000 미만</td></tr>
          <tr><td><span class="tag t4">A4</span></td><td>100,000 이상 ~ 200,000 미만</td></tr>
          <tr><td><span class="tag t4">A5</span></td><td>200,000 이상</td></tr>

const Settings = {
  save(){
    State.settings.company = document.getElementById('st-company').value.trim();
    State.settings.ceo = document.getElementById('st-ceo').value.trim();
    State.settings.bizNo = document.getElementById('st-bizno').value.trim();
    State.saveAll(); toast('회사 정보가 저장되었습니다');
  },
  backup(){
    const data = {
      _meta:{ app:'ENSIGN ERP', version:'2.0', exportedAt:new Date().toISOString() },
      contracts:State.contracts, invoices:State.invoices, bank:State.bank, savings:State.savings, settings:State.settings
    };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `엔자인ERP_백업_${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
    toast('백업 파일을 내려받았습니다');
  },
  restore(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e=>{
      try{
        const data = JSON.parse(e.target.result);
        if(!data._meta || data._meta.app!=='ENSIGN ERP'){ 
          if(!confirm('엔자인 ERP 백업 형식이 아닌 것 같습니다. 그래도 복원할까요?')) { input.value=''; return; }
        }
        if(!confirm('현재 데이터를 백업 파일 내용으로 전부 교체합니다. 진행할까요?')){ input.value=''; return; }
        State.contracts = data.contracts||[];
        State.invoices  = data.invoices||[];
        State.bank      = data.bank||[];
        State.savings   = data.savings||[];
        State.settings  = data.settings||State.settings;
        State.saveAll(); route(); toast('복원이 완료되었습니다');
      }catch(err){ toast('복원 실패: JSON 파일을 확인하세요'); }
      input.value = '';
    };
    reader.readAsText(file);
  },
  wipe(){
    if(!confirm('모든 데이터(계약·세금계산서·통장·적금)가 삭제됩니다.\n백업 없이 진행하면 복구할 수 없습니다. 계속할까요?')) return;
    if(!confirm('정말 초기화할까요? 마지막 확인입니다.')) return;
    State.contracts=[]; State.invoices=[]; State.bank=[]; State.savings=[];
    State.saveAll(); route(); toast('초기화되었습니다');
  }
};

/* ===== 부팅 ===== */
document.getElementById('today').textContent = new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric',weekday:'short'});
route();
</script>

<script>
/* ===== SupaAuth — 로그인/로그아웃 ===== */
const SupaAuth = {
  async login(){
    const email=(document.getElementById('login-email')?.value||'').trim();
    const pw=document.getElementById('login-pw')?.value||'';
    const errEl=document.getElementById('login-error');
    const btn=document.getElementById('login-btn');
    errEl.style.display='none';
    if(!email||!pw){errEl.textContent='이메일과 비밀번호를 입력해주세요';errEl.style.display='block';return;}
    btn.textContent='로그인 중...';btn.disabled=true;
    try{
      const {data,error}=await supa.auth.signInWithPassword({email,password:pw});
      if(error) throw error;
      await SupaAuth.onLogin(data.user);
    }catch(e){
      errEl.textContent=(e.message||'').includes('Invalid')?'이메일 또는 비밀번호가 올바르지 않습니다':e.message;
      errEl.style.display='block';
      btn.textContent='로그인';btn.disabled=false;
    }
  },
  async onLogin(user){
    _supaUser=user;
    const {data:prof}=await supa.from('staff_profiles').select('*').eq('email',user.email).maybeSingle();
    _supaProfile=prof||{name:user.email,role:'관리자'};
    SupaAuth.renderUser();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    await supaLoadAll();
    SupaAuth.applyMenus(); // State.auth.roles 로드 완료 후 메뉴 재적용
    startRealtime();route();
    SupaAuth.renderHandoverAlerts(true); // 데이터 로드 완료 후 인수확인 팝업 표시 (로그인 시 1회)
  },
  async onLoginWithProfile(localUser){
    _supaUser={id:localUser.userId,email:localUser.email||''};
    _supaProfile={name:localUser.name,role:localUser.role};
    SupaAuth.renderUser();
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='flex';
    await supaLoadAll();
    SupaAuth.applyMenus(); // State.auth.roles 로드 완료 후 메뉴 재적용 (정확한 권한 매트릭스 기준)
    startRealtime();
    route();
    SupaAuth.renderHandoverAlerts(true); // 데이터 로드 완료 후 인수확인 팝업 표시 (로그인 시 1회)
  },
  applyMenus(){
    const role = _supaProfile?.role||'일반직원';
    // 관리자는 항상 전체 메뉴
    let allowed;
    if(role==='관리자'){
      allowed = AUTH_MENUS.map(m=>m.key);
    } else {
      const perms = (State.auth.roles[role]||{}).perms || {};
      // perms에 등록 안 된 역할은 ROLE_MENUS 기본값 사용 (하위호환)
      const hasMatrix = Object.keys(perms).length>0;
      if(hasMatrix){
        allowed = AUTH_MENUS.filter(m=>(perms[m.key]||'none')!=='none').map(m=>m.key);
      } else {
        allowed = ROLE_MENUS[role]||ROLE_MENUS['일반직원'];
      }
    }
    document.querySelectorAll('#nav a[data-v]').forEach(function(a){
      a.style.display=allowed.includes(a.getAttribute('data-v'))?'':'none';
    });
    const showCF=['bank','match','savings'].some(function(v){return allowed.includes(v);});
    document.querySelectorAll('#nav .grp').forEach(function(grp){
      if(grp.textContent.trim()==='CF') grp.style.display=showCF?'':'none';
    });
  },
  // 현재 로그인 사용자의 menuKey에 대한 권한 레벨 반환: 'rw' | 'r' | 'none'
  getPermLevel(menuKey){
    const role = _supaProfile?.role||'일반직원';
    if(role==='관리자') return 'rw';
    const perms = (State.auth.roles[role]||{}).perms || {};
    if(Object.keys(perms).length>0) return perms[menuKey] || 'none';
    // 매트릭스 미등록 역할: ROLE_MENUS 기본값 기준으로 해당 메뉴가 있으면 rw로 간주(하위호환)
    const allowed = ROLE_MENUS[role]||ROLE_MENUS['일반직원'];
    return allowed.includes(menuKey) ? 'rw' : 'none';
  },
  // 현재 화면(menuKey)이 읽기전용이면 등록/수정/삭제 버튼과 입력요소를 비활성화
  applyReadOnly(menuKey){
    const level = SupaAuth.getPermLevel(menuKey);
    const isReadOnly = level === 'r';
    if(!isReadOnly) return;
    setTimeout(function(){
      const content = document.getElementById('content');
      if(!content) return;
      // 쓰기 동작을 유발하는 버튼들을 비활성화 (수정/삭제/등록/저장/일괄등록/체크박스 등)
      content.querySelectorAll('button, label.btn').forEach(function(btn){
        const text = (btn.textContent||'').trim();
        const onclickAttr = btn.getAttribute('onclick')||'';
        // 본인 확인 행위(장비 인수확인)는 읽기전용 권한이어도 항상 허용
        const isSelfConfirm = /confirmReceive|doConfirmReceive/.test(onclickAttr);
        if(isSelfConfirm) return;
        const isWriteAction = /등록|수정|삭제|저장|일괄|발행|입금|매칭|업로드|초기화|배정|역할|PIN/.test(text)
          || onclickAttr.match(/\.(save|del|edit|create|update|remove|import|upload|reset)\(/i);
        if(isWriteAction){
          btn.disabled = true;
          btn.style.opacity = '0.45';
          btn.style.cursor = 'not-allowed';
          btn.title = '읽기 전용 권한입니다';
          btn.onclick = function(e){ e.preventDefault(); e.stopPropagation(); toast('읽기 전용 권한입니다'); return false; };
        }
      });
      // 체크박스/입력값 변경도 막음 (단, 검색창은 예외)
      content.querySelectorAll('input[type="checkbox"], input[type="file"]').forEach(function(el){
        if(el.closest('.toolbar')) return; // 검색창/필터는 허용
        el.disabled = true;
      });
      // 안내 배너 표시
      if(!document.getElementById('readonly-banner')){
        const banner = document.createElement('div');
        banner.id = 'readonly-banner';
        banner.style.cssText = 'background:#fff3e0;color:#e65100;padding:7px 14px;border-radius:7px;font-size:12.5px;margin-bottom:10px;font-weight:600';
        banner.textContent = '🔒 읽기 전용 권한입니다. 등록/수정/삭제가 제한됩니다.';
        content.insertBefore(banner, content.firstChild);
      }
    }, 50);
  },
  renderUser(){
    const el=document.getElementById('supa-user');if(!el)return;
    const name=_supaProfile?.name||'';
    const role=_supaProfile?.role||'일반직원';
    const roleColor=role==='관리자'?'#5fc7b4':'#90b4e0';
    el.innerHTML='<div style="color:#cfd9d6;font-weight:700;font-size:12.5px;margin-bottom:1px">'+esc(name)+'</div>'
      +'<div style="color:'+roleColor+';font-size:11px;margin-bottom:6px">'+esc(role)+'</div>'
      +'<button onclick="SupaAuth.logout()" style="width:100%;background:transparent;border:1px solid #3a4f4a;color:#7d918c;border-radius:6px;padding:5px;font-size:11px;cursor:pointer">로그아웃</button>';
    SupaAuth.renderHandoverAlerts();
  },

  // 로그인한 사람에게 본인이 인수해야 할(확인 대기중인) 장비 인수인계가 있으면 알림 표시
  renderHandoverAlerts(showPopup){
    const myName = _supaProfile?.name;
    if(!myName) return;
    const pendingList = (State.equip||[]).filter(eq=>
      eq.pendingHandoverId && eq.pendingHolderName === myName
    );
    const old = document.getElementById('handover-alert-banner');
    if(old) old.remove();
    if(!pendingList.length) return;

    const banner = document.createElement('div');
    banner.id = 'handover-alert-banner';
    banner.style.cssText = 'position:fixed;top:14px;right:14px;z-index:9999;max-width:340px;';
    banner.innerHTML = pendingList.map(eq=>{
      const rec = (eq.handoverHistory||[]).find(r=>r.id===eq.pendingHandoverId);
      return '<div style="background:#fff3e0;border:1.5px solid #ffb74d;border-radius:10px;padding:12px 14px;margin-bottom:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);cursor:pointer" onclick="Equip.confirmReceive(\''+eq.id+'\',\''+(rec?rec.id:'')+'\')">'
        + '<div style="font-weight:800;color:#e65100;font-size:13px;margin-bottom:3px">🔔 장비 인수 확인 필요</div>'
        + '<div style="font-size:12.5px;color:var(--ink)">'+esc(eq.equipName)+(eq.equipNo?' ('+esc(eq.equipNo)+')':'')+'</div>'
        + '<div style="font-size:11.5px;color:var(--ink3);margin-top:2px">인계자: '+esc(rec?rec.fromName:'')+' · 클릭하여 확인</div>'
        + '</div>';
    }).join('');
    document.body.appendChild(banner);

    // 로그인 직후 1회 팝업창으로도 안내 (배너를 놓치지 않도록)
    if(showPopup && typeof UI!=='undefined' && UI.openModal){
      const itemsHtml = pendingList.map(eq=>{
        const rec = (eq.handoverHistory||[]).find(r=>r.id===eq.pendingHandoverId);
        return '<div style="border:1px solid var(--line2);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer" onclick="UI.closeModal();Equip.confirmReceive(\''+eq.id+'\',\''+(rec?rec.id:'')+'\')">'
          + '<div style="font-weight:700;font-size:13px;color:var(--ink)">'+esc(eq.equipName)+(eq.equipNo?' ('+esc(eq.equipNo)+')':'')+'</div>'
          + '<div style="font-size:12px;color:var(--ink3);margin-top:2px">인계자: '+esc(rec?rec.fromName:'')+' · 인계일: '+esc(rec?rec.date:'')+'</div>'
          + '<div style="font-size:11.5px;color:var(--brand);margin-top:4px;font-weight:600">클릭하여 인수확인 →</div>'
          + '</div>';
      }).join('');
      const body = '<div style="font-size:13px;color:var(--ink2);margin-bottom:12px">아래 장비의 인수 확인 및 정상작동 여부 확인이 필요합니다.</div>' + itemsHtml;
      setTimeout(function(){
        UI.openModal('🔔 장비 인수 확인 필요 ('+pendingList.length+'건)', body, [
          {label:'나중에 확인', onClick:UI.closeModal}
        ]);
      }, 600); // 화면 전환 직후 바로 띄우면 다른 렌더링과 겹칠 수 있어 약간 지연
    }
  },
  async logout(){
    if(!confirm('로그아웃 하시겠습니까?'))return;
    stopRealtime();
    await supa.auth.signOut();
    localStorage.removeItem('ensign_pin_session');
    _supaUser=null;_supaProfile=null;
    // 로그아웃 시 최신 버전 강제 로드 (캐시 무시)
    location.href = location.pathname + '?t=' + Date.now();
  }
};

/* ===== SupaDB — 데이터 저장/로드 ===== */

  ctTo:function(c){return{id:c.id,no:c.no,year:c.year,type_code:c.typeCode,name:c.name,client:c.client,supply:c.supply||0,vat:c.vat||0,toe:c.toe||null,grade:c.grade||null,pay_kinds:c.payKinds||[],manager:c.manager||null,contract_date:c.contractDate||null,memo:c.memo||null};},
  ctFrom:function(r){return{id:r.id,no:r.no,year:r.year,typeCode:r.type_code,name:r.name,client:r.client,supply:Number(r.supply||0),vat:Number(r.vat||0),toe:r.toe,grade:r.grade,payKinds:r.pay_kinds||[],manager:r.manager,contractDate:r.contract_date,memo:r.memo};},
  invTo:function(v){return{id:v.id,contract_id:v.contractId,kind:v.kind,issue_date:v.issueDate||null,supply:v.supply||0,vat:v.vat||0,paid:v.paid||false,paid_date:v.paidDate||null,memo:v.memo||null};},
  invFrom:function(r){return{id:r.id,contractId:r.contract_id,kind:r.kind,issueDate:_toDateOnly(r.issue_date),supply:Number(r.supply||0),vat:Number(r.vat||0),paid:r.paid,paidDate:_toDateOnly(r.paid_date),memo:r.memo};},
  bankTo:function(b){return{id:b.id,date:b.date,bank_desc:b.desc||'',deposit:b.deposit||0,withdraw:b.withdraw||0,balance:b.balance||0,bank_name:b.bankName||'',memo:b.memo||null,match_invoice_id:b.matchInvoiceId||null};},
  bankFrom:function(r){return{id:r.id,date:r.date,desc:r.bank_desc,deposit:Number(r.deposit||0),withdraw:Number(r.withdraw||0),balance:Number(r.balance||0),bankName:r.bank_name,memo:r.memo,matchInvoiceId:r.match_invoice_id};},
  savTo:function(s){return{id:s.id,name:s.name,bank_name:s.bankName||'',monthly:s.monthly||0,start_date:s.startDate||null,maturity:s.maturity||null,payments:s.payments||[],memo:s.memo||null};},
  savFrom:function(r){return{id:r.id,name:r.name,bankName:r.bank_name,monthly:Number(r.monthly||0),startDate:r.start_date,maturity:r.maturity,payments:r.payments||[],memo:r.memo};},
  hrTo:function(h){return{id:h.id,name:h.name,dept:h.dept||null,position:h.position||null,rank:h.rank||null,join_date:h.joinDate||null,status:h.status||'재직',birth:h.birth||null,email:h.email||null,phone:h.phone||null,memo:h.memo||null};},
  hrFrom:function(r){return{id:r.id,name:r.name,dept:r.dept,position:r.position,rank:r.rank,joinDate:r.join_date,status:r.status||'재직',birth:r.birth,email:r.email,phone:r.phone,memo:r.memo};},
  ediagTo:function(d){return{id:d.id,contract_id:d.contractId,leader:d.leader||null,members:d.members||[],start_date:d.startDate||null,end_date:d.endDate||null,memo:d.memo||null,member_schedules:d.memberSchedules||{},files:d.files||{}};},
  ediagFrom:function(r){return{id:r.id,contractId:r.contract_id,leader:r.leader,members:r.members||[],startDate:r.start_date,endDate:r.end_date,memo:r.memo,memberSchedules:r.member_schedules||{},files:r.files||{}};},
  equipTo:function(e){return{id:e.id,equip_name:e.equipName||'',equip_no:e.equipNo||'',sn:e.sn||'',calibration_history:e.calibrationHistory||'',purchase_year:e.purchaseYear||'',failure_history:e.failureHistory||'',memo:e.memo||'',holder_name:e.holderName||'',holder_since:e.holderSince||'',handover_history:e.handoverHistory||[],pending_handover_id:e.pendingHandoverId||null,pending_holder_name:e.pendingHolderName||null};},
  equipFrom:function(r){return{id:r.id,equipName:r.equip_name,equipNo:r.equip_no,sn:r.sn,calibrationHistory:r.calibration_history,purchaseYear:r.purchase_year,failureHistory:r.failure_history,memo:r.memo,holderName:r.holder_name||'',holderSince:r.holder_since||'',handoverHistory:r.handover_history||[],pendingHandoverId:r.pending_handover_id||null,pendingHolderName:r.pending_holder_name||null};},

async function supaLoadAll(){
  try{
    const results=await Promise.all([
      supa.from('contracts').select('*').order('no',{ascending:false}),
      supa.from('invoices').select('*'),
      supa.from('bank').select('*').order('date',{ascending:true}),
      supa.from('savings').select('*'),
      supa.from('hr').select('*'),
      supa.from('ediag').select('*'),
      supa.from('auth_settings').select('*').eq('id',1).maybeSingle(),
      supa.from('equip').select('*'),
    ]);
    State.contracts=(results[0].data||[]).map(_conv.ctFrom);
    State.invoices=(results[1].data||[]).map(_conv.invFrom);
    State.bank=(results[2].data||[]).map(_conv.bankFrom);
    State.savings=(results[3].data||[]).map(_conv.savFrom);
    State.hr=(results[4].data||[]).map(_conv.hrFrom);
    State.ediag=(results[5].data||[]).map(_conv.ediagFrom);
    State.auth=results[6].data?{roles:results[6].data.roles||{},users:results[6].data.users||{}}:{roles:{},users:{}};
    State.equip=(results[7].data||[]).map(_conv.equipFrom);
    // 팀 기반 필터링 적용
    applyTeamFilter();
  }catch(e){console.error('로드 오류:',e);}
}

// 팀 기반 필터링 적용 역할
const TEAM_FILTER_ROLES = ['진단팀장','일반직원','열람전용'];

function applyTeamFilter(){
  const role = _supaProfile?.role||'일반직원';
  if(!TEAM_FILTER_ROLES.includes(role)) return; // 필터링 불필요

  const myName = _supaProfile?.name||'';
  if(!myName) return;

  // 내가 팀장/팀원으로 등록된 ediag 찾기
  const myEdiag = State.ediag.filter(function(d){
    if(d.leader && d.leader.name===myName) return true;
    if((d.members||[]).some(function(m){ return m.name===myName; })) return true;
    return false;
  });

  // 허용된 계약 ID 목록
  const allowedContractIds = myEdiag.map(function(d){ return d.contractId; });

  // contracts 필터링
  State.contracts = State.contracts.filter(function(c){
    return allowedContractIds.includes(c.id);
  });

  // ediag 필터링
  State.ediag = myEdiag;

  // invoices 필터링
  State.invoices = State.invoices.filter(function(v){
    return allowedContractIds.includes(v.contractId);
  });

  console.log('팀 필터 적용:', myName, '→ 계약', allowedContractIds.length, '건');
}

State.saveAll=async function(){
  if(!_supaUser){
    console.warn('저장 안됨: 로그인 세션 없음(_supaUser=null)');
    throw new Error('로그인 세션이 없습니다. 다시 로그인해주세요.');
  }
  _isSaving=true;
  try{
    var role = _supaProfile?.role||'일반직원';
    var isFiltered = TEAM_FILTER_ROLES.includes(role);
    var jobs=[];
    var labels=[];
    if(State.contracts.length){ jobs.push(supa.from('contracts').upsert(State.contracts.map(_conv.ctTo))); labels.push('contracts'); }
    if(State.invoices.length){  jobs.push(supa.from('invoices').upsert(State.invoices.map(_conv.invTo)));  labels.push('invoices'); }
    if(State.ediag.length){     jobs.push(supa.from('ediag').upsert(State.ediag.map(_conv.ediagTo)));      labels.push('ediag'); }
    if(State.equip.length){     jobs.push(supa.from('equip').upsert(State.equip.map(_conv.equipTo)));      labels.push('equip'); }
    // 메모리(State)에서 삭제된 행이 Supabase에 남아있지 않도록 명시적으로 제거
    // (팀 필터링 대상 사용자는 본인이 못 보는 데이터를 건드릴 수 없으므로 제외)
    if(!isFiltered){
      try{
        var liveInvIds = new Set(State.invoices.map(function(v){return v.id;}));
        var dbInvRes = await supa.from('invoices').select('id');
        var orphanInvIds = (dbInvRes.data||[]).map(function(r){return r.id;}).filter(function(id){return !liveInvIds.has(id);});
        if(orphanInvIds.length) jobs.push(supa.from('invoices').delete().in('id', orphanInvIds));

        var liveCtIds = new Set(State.contracts.map(function(c){return c.id;}));
        var dbCtRes = await supa.from('contracts').select('id');
        var orphanCtIds = (dbCtRes.data||[]).map(function(r){return r.id;}).filter(function(id){return !liveCtIds.has(id);});
        if(orphanCtIds.length) jobs.push(supa.from('contracts').delete().in('id', orphanCtIds));

        // 진단팀 구성(ediag) 삭제도 Supabase에 명시적으로 반영 (팀 구성 삭제 시 다른 사용자 화면에 반영되도록)
        var liveEdiagIds = new Set(State.ediag.map(function(d){return d.id;}));
        var dbEdiagRes = await supa.from('ediag').select('id');
        var orphanEdiagIds = (dbEdiagRes.data||[]).map(function(r){return r.id;}).filter(function(id){return !liveEdiagIds.has(id);});
        if(orphanEdiagIds.length) jobs.push(supa.from('ediag').delete().in('id', orphanEdiagIds));

        var liveEquipIds = new Set(State.equip.map(function(e){return e.id;}));
        var dbEquipRes = await supa.from('equip').select('id');
        var orphanEquipIds = (dbEquipRes.data||[]).map(function(r){return r.id;}).filter(function(id){return !liveEquipIds.has(id);});
        if(orphanEquipIds.length) jobs.push(supa.from('equip').delete().in('id', orphanEquipIds));
      }catch(e){ console.error('고아행 정리 오류:', e); }
    }
    if(!isFiltered){
      if(State.bank.length){    jobs.push(supa.from('bank').upsert(State.bank.map(_conv.bankTo)));         labels.push('bank'); }
      if(State.savings.length){ jobs.push(supa.from('savings').upsert(State.savings.map(_conv.savTo)));    labels.push('savings'); }
      if(State.hr.length){      jobs.push(supa.from('hr').upsert(State.hr.map(_conv.hrTo)));               labels.push('hr'); }
      jobs.push(supa.from('auth_settings').upsert({id:1,roles:State.auth.roles||{},users:State.auth.users||{}})); labels.push('auth_settings');
    }
    var results = await Promise.all(jobs);
    // Supabase는 에러를 throw하지 않고 {error} 객체로 반환하므로 직접 검사 필요
    var errors=[];
    results.forEach(function(r,i){
      if(r && r.error){ errors.push(labels[i]+': '+r.error.message); console.error('저장 오류 ['+labels[i]+']', r.error); }
    });
    if(errors.length){
      throw new Error(errors.join(' / '));
    }
  }catch(e){
    console.error('저장 오류:',e);
    throw e; // 호출한 쪽에서 catch해서 토스트로 표시하도록 재전파
  }
  finally{ setTimeout(function(){_isSaving=false;},500); }
};

async function migrateToSupabase(){
  if(!confirm('현재 화면의 데이터를 Supabase로 이전합니다. 계속할까요?'))return;
  try{
    // State에 있는 현재 데이터를 Supabase로 저장
    var cts=State.contracts, invs=State.invoices, bank=State.bank;
    var sav=State.savings, hr=State.hr, ediag=State.ediag;
    var auth=State.auth||{roles:{},users:{}};
    if(!cts.length&&!hr.length){toast('이전할 데이터가 없습니다');return;}
    toast('이전 중...');
    var jobs=[];
    if(cts.length)   jobs.push(supa.from('contracts').upsert(cts.map(_conv.ctTo)));
    if(invs.length)  jobs.push(supa.from('invoices').upsert(invs.map(_conv.invTo)));
    if(bank.length)  jobs.push(supa.from('bank').upsert(bank.map(_conv.bankTo)));
    if(sav.length)   jobs.push(supa.from('savings').upsert(sav.map(_conv.savTo)));
    if(hr.length)    jobs.push(supa.from('hr').upsert(hr.map(_conv.hrTo)));
    if(ediag.length) jobs.push(supa.from('ediag').upsert(ediag.map(_conv.ediagTo)));
    jobs.push(supa.from('auth_settings').upsert({id:1,roles:auth.roles||{},users:auth.users||{}}));
    var results=await Promise.all(jobs);
    // 오류 확인
    var errors=results.filter(function(r){return r&&r.error;});
    if(errors.length){toast('일부 오류: '+errors[0].error.message);return;}
    // staff_profiles hr 동기화
    if(hr.length){
      await supa.from('staff_profiles').upsert(hr.map(function(h){
        return {id:h.id,name:h.name,email:h.email||null,role:'일반직원'};
      }),{onConflict:'id',ignoreDuplicates:true});
      // 류정일은 관리자로
      await supa.from('staff_profiles').update({role:'관리자'}).eq('name','류정일');
    }
    toast('✅ 이전 완료! 계약 '+cts.length+'건 · 직원 '+hr.length+'명 · 거래 '+bank.length+'건');
  }catch(e){console.error(e);toast('마이그레이션 오류: '+e.message);}
}

/* ===== 실시간 동기화 ===== */
var _realtimeChannel=null;
var _isSaving=false;
function startRealtime(){
  if(_realtimeChannel)return;
  _realtimeChannel=supa.channel('erp-sync')
    .on('postgres_changes',{event:'*',schema:'public',table:'contracts'},function(){_syncAndRender('contracts','contracts',_conv.ctFrom);})
    .on('postgres_changes',{event:'*',schema:'public',table:'invoices'},function(){_syncAndRender('invoices','invoices',_conv.invFrom);})
    .on('postgres_changes',{event:'*',schema:'public',table:'bank'},function(){_syncAndRender('bank','bank',_conv.bankFrom);})
    .on('postgres_changes',{event:'*',schema:'public',table:'savings'},function(){_syncAndRender('savings','savings',_conv.savFrom);})
    .on('postgres_changes',{event:'*',schema:'public',table:'hr'},function(){_syncAndRender('hr','hr',_conv.hrFrom);})
    .on('postgres_changes',{event:'*',schema:'public',table:'ediag'},function(){_syncAndRender('ediag','ediag',_conv.ediagFrom);})
    .subscribe(function(status){
      var badge=document.getElementById('sync-badge');
      if(!badge){badge=document.createElement('div');badge.id='sync-badge';badge.style.cssText='padding:4px 10px;font-size:10.5px;font-weight:600;border-radius:10px;margin:4px 14px;text-align:center';var u=document.getElementById('supa-user');if(u)u.parentNode.insertBefore(badge,u);}
      if(status==='SUBSCRIBED'){badge.textContent='● 실시간 동기화 중';badge.style.background='#1b5e20';badge.style.color='#a5d6a7';}
      else{badge.textContent='○ 동기화 끊김';badge.style.background='#3a0000';badge.style.color='#ef9a9a';setTimeout(function(){_realtimeChannel=null;startRealtime();},5000);}
    });
}
function stopRealtime(){if(_realtimeChannel){supa.removeChannel(_realtimeChannel);_realtimeChannel=null;}}
function _syncAndRender(supaTable,stateKey,fromFn){
  if(_isSaving) return; // 저장 중이면 실시간 갱신 무시 (충돌 방지)
  supa.from(supaTable).select('*').then(function(res){
    if(_isSaving) return; // 저장 완료 후 도착한 응답도 무시
    if(res.data) State[stateKey]=(res.data).map(fromFn);
    clearTimeout(window._rerenderTimer);
    window._rerenderTimer=setTimeout(function(){var h=location.hash.replace('#','')||'contracts';try{if(Views[h])Views[h]();}catch(e){}},300);
  });
}

/* ===== PinAuth — 6자리 PIN 로그인 ===== */
const PinAuth={
  _setupPin:'',_confirmPin:'',_loginPin:'',_step:'setup',_localUser:null,
  async init(){
    try{this._localUser=JSON.parse(localStorage.getItem('ensign_local_user')||'null');}catch(e){}
    var pending=null;
    try{pending=JSON.parse(localStorage.getItem('ensign_pending_user')||'null');}catch(e){}
    if(this._localUser){this.showPinLogin();}
    else if(pending){this._showPendingScreen(pending.name);}
    else{this.showSetup();}
  },
  showSetup(){
    document.getElementById('pin-setup').style.display='block';
    document.getElementById('pin-login').style.display='none';
    document.getElementById('email-login').style.display='none';
    this._setupPin='';this._confirmPin='';this._step='setup';
    this._renderKeypad('setup-keypad','setup');
    this._dots('setup-dots',0);this._dots('confirm-dots',0);
    document.getElementById('setup-error').style.display='none';
    var cw=document.getElementById('confirm-wrap');if(cw)cw.style.display='none';
    var pl=document.getElementById('setup-pin-label');if(pl){pl.textContent='PIN 설정 (6자리)';pl.style.color='#5e716c';}
    setTimeout(function(){var n=document.getElementById('setup-name');if(n)n.focus();},100);
  },
  showPinLogin(){
    document.getElementById('pin-setup').style.display='none';
    document.getElementById('pin-login').style.display='block';
    document.getElementById('email-login').style.display='none';
    this._loginPin='';
    document.getElementById('pin-greeting').textContent='안녕하세요, '+(this._localUser?.name||'')+'님';
    this._renderKeypad('login-keypad','login');
    this._dots('pin-dots',0);
    document.getElementById('pin-error').style.display='none';
  },
  showEmailLogin(){
    document.getElementById('pin-setup').style.display='none';
    document.getElementById('pin-login').style.display='none';
    document.getElementById('email-login').style.display='block';
  },
  _dots(id,n){
    var el=document.getElementById(id);if(!el)return;
    el.innerHTML=Array.from({length:6},function(_,i){return '<div style="width:14px;height:14px;border-radius:50%;border:2px solid '+(i<n?'#0e5e54':'#ccc')+';background:'+(i<n?'#0e5e54':'#fff')+'"></div>';}).join('');
  },
  _renderKeypad(id,mode){
    var el=document.getElementById(id);if(!el)return;
    var keys=['1','2','3','4','5','6','7','8','9','관리자','0','←'];
    el.innerHTML='';
    keys.forEach(function(k){
      var btn=document.createElement('button');
      btn.style.cssText='padding:14px;border:1px solid #e0e0e0;border-radius:10px;cursor:pointer;';
      if(k==='관리자'){btn.style.display='none';}
      else if(k==='←'){btn.textContent='←';btn.style.cssText+='font-size:18px;color:#5e716c;background:#f0f5f3';btn.onclick=function(){PinAuth._del(mode);};}
      else{btn.textContent=k;btn.style.cssText+='font-size:20px;font-weight:700;color:#1a3a30;background:#fff';(function(d){btn.onclick=function(){PinAuth._input(d,mode);};})(k);}
      el.appendChild(btn);
    });
  },
  _input(digit,mode){
    var self=this;
    if(mode==='setup'){
      if(this._step==='setup'){
        if(this._setupPin.length>=6)return;
        this._setupPin+=digit;this._dots('setup-dots',this._setupPin.length);
        if(this._setupPin.length===6) setTimeout(function(){self._step='confirm';document.getElementById('confirm-wrap').style.display='block';document.getElementById('setup-pin-label').textContent='PIN 설정 완료 ✓';document.getElementById('setup-pin-label').style.color='#2e7d32';},200);
      } else {
        if(this._confirmPin.length>=6)return;
        this._confirmPin+=digit;this._dots('confirm-dots',this._confirmPin.length);
        if(this._confirmPin.length===6) setTimeout(function(){self._finishSetup();},200);
      }
    } else if(mode==='switching'){
      if(this._loginPin.length>=6)return;
      this._loginPin+=digit;this._dots('pin-dots',this._loginPin.length);
      if(this._loginPin.length===6) setTimeout(function(){self._verifySwitchPin();},200);
    } else {
      if(this._loginPin.length>=6)return;
      this._loginPin+=digit;this._dots('pin-dots',this._loginPin.length);
      if(this._loginPin.length===6) setTimeout(function(){self._verifyPin();},200);
    }
  },
  _del(mode){
    if(mode==='setup'){
      if(this._step==='setup'){this._setupPin=this._setupPin.slice(0,-1);this._dots('setup-dots',this._setupPin.length);}
      else{this._confirmPin=this._confirmPin.slice(0,-1);this._dots('confirm-dots',this._confirmPin.length);}
    } else {this._loginPin=this._loginPin.slice(0,-1);this._dots('pin-dots',this._loginPin.length);}
  },
  async _finishSetup(){
    var name=(document.getElementById('setup-name')?.value||'').trim();
    var errEl=document.getElementById('setup-error');
    if(!name){errEl.textContent='이름을 입력해주세요';errEl.style.display='block';this._confirmPin='';this._dots('confirm-dots',0);return;}
    if(this._setupPin!==this._confirmPin){errEl.textContent='PIN이 일치하지 않습니다';errEl.style.display='block';this._setupPin='';this._confirmPin='';this._step='setup';this._dots('setup-dots',0);this._dots('confirm-dots',0);return;}
    // hr 테이블에서 직원 확인
    var res=await supa.from('hr').select('id,name,rank,dept').eq('name',name);
    if(!res.data||res.data.length===0){errEl.textContent="'"+name+"' 직원을 찾을 수 없습니다. 인사관리에 등록된 정확한 이름을 입력해주세요";errEl.style.display='block';this._setupPin='';this._confirmPin='';this._step='setup';this._dots('setup-dots',0);this._dots('confirm-dots',0);return;}
    var hr=res.data[0];
    // staff_profiles에서 역할 확인
    var profRes=await supa.from('staff_profiles').select('role,email').eq('name',name);
    var role=(profRes.data&&profRes.data.length>0&&profRes.data[0].role)?profRes.data[0].role:'일반직원';
    var email=(profRes.data&&profRes.data.length>0&&profRes.data[0].email)?profRes.data[0].email:'';

    var localUser={userId:hr.id,name:hr.name,role:role,email:email,rank:hr.rank,dept:hr.dept};
    var pinHash=this._hash(this._setupPin,hr.id);
    // 이 기기에 영구 등록 (한 기기 = 한 사람, "다른 계정으로 로그인" 기능 제거로 승인 절차 불필요)
    localStorage.setItem('ensign_local_user', JSON.stringify(Object.assign({},localUser,{pinHash:pinHash, registeredAt:new Date().toISOString()})));
    localStorage.setItem('ensign_pin_fail','0');
    this._localUser = localUser;
    SupaAuth.onLoginWithProfile(localUser);
  },

    async _verifyPin(){
    var errEl=document.getElementById('pin-error');errEl.style.display='none';
    var stored=JSON.parse(localStorage.getItem('ensign_local_user')||'null');
    var failCount=parseInt(localStorage.getItem('ensign_pin_fail')||'0');
    if(failCount>=5){
      var lockTime=parseInt(localStorage.getItem('ensign_pin_lock')||'0');
      if(Date.now()-lockTime<5*60*1000){var remain=Math.ceil((5*60*1000-(Date.now()-lockTime))/60000);errEl.textContent='PIN 5회 오류. '+remain+'분 후 다시 시도하세요.';errEl.style.display='block';this._loginPin='';this._dots('pin-dots',0);return;}
      else{localStorage.setItem('ensign_pin_fail','0');}
    }
    var pinHash=this._hash(this._loginPin,stored?.userId||'');
    if(stored&&pinHash===stored.pinHash){
      localStorage.setItem('ensign_pin_fail','0');
      // staff_profiles에서 최신 역할 + PIN 초기화 여부 조회
      var profRes=await supa.from('staff_profiles').select('role,email,pin_reset_at').eq('name',stored.name);
      if(profRes.data&&profRes.data.length>0){
        stored.role=profRes.data[0].role||stored.role;
        var resetAt = profRes.data[0].pin_reset_at;
        // registeredAt이 없는 기존 등록자는 0(아주 오래 전)으로 간주해 비교 — pin_reset_at이 있으면 무조건 초기화 대상
        var regAt = stored.registeredAt ? new Date(stored.registeredAt) : new Date(0);
        if(resetAt && new Date(resetAt) > regAt){
          // 관리자가 PIN을 초기화함 → 이 기기의 등록 정보를 지우고 재등록 화면으로
          localStorage.removeItem('ensign_local_user');
          localStorage.removeItem('ensign_pin_session');
          this._localUser = null;
          errEl.textContent = '관리자가 PIN을 초기화했습니다. 다시 등록해주세요.';
          errEl.style.display = 'block';
          setTimeout(function(){ PinAuth.showSetup(); }, 1500);
          return;
        }
      }
      this._localUser=stored;
      // 새로고침 시 PIN 재입력 없이 유지되도록 세션 토큰 저장 (2시간)
      localStorage.setItem('ensign_pin_session', JSON.stringify({user:stored, expires:Date.now()+2*60*60*1000}));
      SupaAuth.onLoginWithProfile(stored);
      // 로그인 시점에도 최신 버전인지 확인
      setTimeout(function(){ if(typeof Updater!=='undefined') Updater.checkAutoReload(); }, 3000);
    } else {
      var newFail=failCount+1;localStorage.setItem('ensign_pin_fail',String(newFail));
      if(newFail>=5) localStorage.setItem('ensign_pin_lock',String(Date.now()));
      errEl.textContent='PIN이 올바르지 않습니다. ('+newFail+'/5회)';errEl.style.display='block';
      var dots=document.getElementById('pin-dots');if(dots){dots.style.transform='translateX(8px)';setTimeout(function(){dots.style.transform='';},100);}
      this._loginPin='';this._dots('pin-dots',0);
    }
  },
  changePin(){
    var body='<div style="margin-bottom:14px">'
      +'<div style="font-size:13px;color:var(--ink2);margin-bottom:14px">새 PIN 6자리를 설정합니다.</div>'
      +'<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:600;color:#5e716c;display:block;margin-bottom:5px">현재 PIN</label>'
      +'<input id="cp-old" type="password" maxlength="6" placeholder="현재 PIN 6자리" style="width:100%;border:1.5px solid #d1dbd9;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;letter-spacing:4px;text-align:center"></div>'
      +'<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:600;color:#5e716c;display:block;margin-bottom:5px">새 PIN</label>'
      +'<input id="cp-new" type="password" maxlength="6" placeholder="새 PIN 6자리" style="width:100%;border:1.5px solid #d1dbd9;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;letter-spacing:4px;text-align:center"></div>'
      +'<div><label style="font-size:12px;font-weight:600;color:#5e716c;display:block;margin-bottom:5px">새 PIN 확인</label>'
      +'<input id="cp-new2" type="password" maxlength="6" placeholder="새 PIN 다시 입력" style="width:100%;border:1.5px solid #d1dbd9;border-radius:8px;padding:9px 12px;font-size:14px;box-sizing:border-box;letter-spacing:4px;text-align:center"></div>'
      +'</div>';
    UI.openModal('🔑 PIN 변경', body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'변경', cls:'pri', onClick:function(){
        var oldPin=(document.getElementById('cp-old')?.value||'').trim();
        var newPin=(document.getElementById('cp-new')?.value||'').trim();
        var newPin2=(document.getElementById('cp-new2')?.value||'').trim();
        if(oldPin.length!==6||newPin.length!==6){toast('PIN은 6자리여야 합니다');return;}
        if(newPin!==newPin2){toast('새 PIN이 일치하지 않습니다');return;}
        var stored=JSON.parse(localStorage.getItem('ensign_local_user')||'null');
        if(!stored){toast('로그인 정보가 없습니다');return;}
        var oldHash=PinAuth._hash(oldPin, stored.userId||'');
        if(oldHash!==stored.pinHash){toast('현재 PIN이 올바르지 않습니다');return;}
        stored.pinHash=PinAuth._hash(newPin, stored.userId||'');
        localStorage.setItem('ensign_local_user', JSON.stringify(stored));
        UI.closeModal();
        toast('✅ PIN이 변경되었습니다');
      }}
    ]);
  },
  cancelSetup(){this.showPinLogin();},

  // 관리자가 직원 PIN을 원격 초기화했을 때, 그 직원의 화면에서 호출되어 등록 화면으로 돌아감
  // (보안: "다른 계정으로 로그인" 기능은 타인 행세 위험으로 제거되었습니다.
  //  PIN 분실 시 관리자에게 요청 → 관리자가 권한관리에서 초기화 → 본인이 다시 이름+PIN 등록)
  switchUser(){localStorage.removeItem('ensign_local_user');localStorage.setItem('ensign_pin_fail','0');this._localUser=null;this.showSetup();},
  _hash:function(pin,salt){var h=0;var s=pin+salt+'ensign2024';for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h=h&h;}return Math.abs(h).toString(36)+s.length.toString(36);}
};

/* ===== 자동 업데이트 ===== */
const Updater={
  _checking:false,
  // 현재 로드된 index.html과 서버의 index.html을 비교해서 변경 감지
  async checkAutoReload(){
    if(Updater._checking) return;
    Updater._checking = true;
    try{
      var res = await fetch(location.pathname + '?_chk=' + Date.now(), {cache:'no-store'});
      if(!res.ok) return;
      var html = await res.text();
      var serverHash = Updater._simpleHash(html);
      var storedHash = sessionStorage.getItem('ensign_page_hash');
      if(!storedHash){
        sessionStorage.setItem('ensign_page_hash', serverHash);
        return;
      }
      if(serverHash !== storedHash){
        // 새 버전 감지 → 작업 중 데이터가 없을 때만 조용히 새로고침, 있으면 안내 후 새로고침
        Updater._showReloadNotice();
      }
    }catch(e){ /* 네트워크 오류 시 무시 */ }
    finally{ Updater._checking = false; }
  },
  _simpleHash(str){
    var h=0; for(var i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h=h&h; }
    return String(h);
  },
  _noticeShown:false,
  _showReloadNotice(){
    if(Updater._noticeShown) return;
    Updater._noticeShown = true;
    var bar = document.createElement('div');
    bar.style.cssText='position:fixed;top:0;left:0;right:0;background:#0e5e54;color:#fff;padding:10px 16px;text-align:center;font-size:13px;font-weight:600;z-index:99999;box-shadow:0 2px 8px rgba(0,0,0,.2)';
    bar.innerHTML='🔄 새 버전이 적용되었습니다. <button onclick="location.href=location.pathname+\'?t=\'+Date.now()" style="margin-left:10px;background:#fff;color:#0e5e54;border:none;border-radius:5px;padding:4px 12px;font-size:12px;font-weight:700;cursor:pointer">지금 새로고침</button>';
    document.body.appendChild(bar);
  },
  async check(silent){
    try{
      var res=await fetch(UPDATE_URL+'?t='+Date.now());
      if(!res.ok) throw new Error('서버 오류');
      var info=await res.json();
      var latest=info.version||'0.0.0';
      var a=latest.split('.').map(Number),b=APP_VERSION.split('.').map(Number);
      var isNewer=false;for(var i=0;i<3;i++){if((a[i]||0)>(b[i]||0)){isNewer=true;break;}if((a[i]||0)<(b[i]||0))break;}
      if(isNewer){
        var changes=(info.changes||[]).map(function(c){return '<li>'+esc(c)+'</li>';}).join('');
        UI.openModal('업데이트 알림','<div style="background:#e8f5e9;border-radius:8px;padding:12px;margin-bottom:12px"><b>새 버전 v'+esc(info.version)+'</b><br>현재: v'+APP_VERSION+'</div>'+(changes?'<ul>'+changes+'</ul>':''),[
          {label:'나중에',onClick:UI.closeModal},
          {label:'⬇ 다운로드',cls:'pri',onClick:function(){window.open(DOWNLOAD_URL);UI.closeModal();}}
        ]);
      } else {if(!silent) toast('최신 버전입니다 (v'+APP_VERSION+')');}
    }catch(e){if(!silent) toast('업데이트 서버에 연결할 수 없습니다');}
  }
};

Views.hr = function(){

/* 재직기간 계산 */
function workPeriod(joinDate, status, leaveDate){
  if(!joinDate) return '-';
  const start = new Date(joinDate);
  const end   = (status==='퇴직' && leaveDate) ? new Date(leaveDate) : new Date();
  const months = (end.getFullYear()-start.getFullYear())*12 + (end.getMonth()-start.getMonth());
  if(months < 0) return '-';
  const y = Math.floor(months/12), m = months%12;
  return y>0 ? `${y}년 ${m}개월` : `${m}개월`;
}

function _renderHr(){
  const list = State.hr.filter(e=>{
    if(hrFilter.dept && e.dept !== hrFilter.dept) return false;
    if(hrFilter.status && e.status !== hrFilter.status) return false;
    if(hrFilter.q){
      const q = hrFilter.q.toLowerCase();
      if(!((e.name||'')+(e.dept||'')+(e.rank||'')+(e.position||'')+(e.phone||'')).toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>{
    const ri = x => HR_RANKS.indexOf(x.rank);
    return ri(b) - ri(a) || (a.name||'').localeCompare(b.name||'');
  });

  // KPI
  const total   = State.hr.filter(e=>e.status==='재직').length;
  const byDept  = {};
  HR_DEPTS.forEach(d=>byDept[d]=0);
  State.hr.filter(e=>e.status==='재직').forEach(e=>{ if(byDept[e.dept]!=null) byDept[e.dept]++; });
  const kpiEl = document.getElementById('hr-kpi');
  if(kpiEl) kpiEl.innerHTML = [
    `<div class="kpi a" style="padding:10px 14px"><div class="lb">전체 재직</div><div class="vl">${total}<small> 명</small></div></div>`,
    ...HR_DEPTS.map(d=>`<div class="kpi" style="padding:10px 14px;border-top:3px solid var(--line)"><div class="lb" style="font-size:11px">${d}</div><div class="vl" style="font-size:16px">${byDept[d]}<small> 명</small></div></div>`)
  ].join('');

  const rows = list.map(e=>`<tr>
    <td><b>${esc(e.name)}</b></td>
    <td>${esc(e.dept||'-')}</td>
    <td>${esc(e.rank||'-')}</td>
    <td>${esc(e.position||'-')}</td>
    <td class="ctr">${esc(e.joinDate||'-')}</td>
    <td class="ctr" style="font-size:12px;color:var(--ink2)">${workPeriod(e.joinDate,e.status,e.leaveDate)}</td>
    <td>${esc(e.phone||'-')}</td>
    <td style="font-size:12px">${esc(e.email||'-')}</td>
    <td class="ctr"><span class="tag ${HR_STATUS_TAG[e.status]||'gray'}">${esc(e.status)}</span></td>
    <td class="ctr">
      <button class="btn sm" onclick="HR.edit('${e.id}')">수정</button>
      <button class="btn sm dgr" onclick="HR.del('${e.id}')">삭제</button>
    </td>
  </tr>`).join('') || `<tr><td colspan="10"><div class="empty"><b>직원이 없습니다</b>[+ 직원 등록] 버튼으로 추가하세요</div></td></tr>`;

  const tb = document.getElementById('hr-tbody');
  const sm = document.getElementById('hr-summary');
  if(tb) tb.innerHTML = rows;
  if(sm) sm.textContent = `표시 ${list.length}명`;
}

  },
  template(){
    const sample = [{
      '이름':'홍길동', '부서':'에너지진단팀', '직급':'대리', '직책':'',

    }];
    const guide = XLSX.utils.aoa_to_sheet([
      ['엔자인 ERP 인사관리 일괄등록 양식 안내'],[''],

      ['직급','대표이사 / 전무 / 상무 / 이사 / 감사 / 부장 / 차장 / 과장 / 대리 / 주임 / 사원 / 전문위원'],
      ['직책','팀장, 본부장 등 자유 입력 (선택)'],
      ['입사일','YYYY-MM-DD 형식'],

      ['생년월일','YYYY-MM-DD 형식 (선택)'],

    ]);
    guide['!cols'] = [{wch:12},{wch:70}];
    const ws = XLSX.utils.json_to_sheet(sample);
    ws['!cols'] = [{wch:8},{wch:14},{wch:8},{wch:8},{wch:12},{wch:8},{wch:12},{wch:12},{wch:14},{wch:22},{wch:30}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '인사입력');
    XLSX.utils.book_append_sheet(wb, guide, '작성안내');
    XLSX.writeFile(wb, '엔자인_인사등록양식.xlsx');
  },
  importXlsx(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = e=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.includes('인사입력') ? '인사입력' : wb.SheetNames[0];
        const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
        let ok=0; const errors=[];
        json.forEach((r,i)=>{
          const rowNo = i+2;
          const keys = Object.keys(r);
          const get = names=>{ const k=keys.find(k=>names.some(n=>k.replace(/\s/g,'').includes(n))); return k!=null?String(r[k]||'').trim():''; };
          const name = get(['이름','성명']);
          if(!name){ if(keys.some(k=>String(r[k]).trim()!=='')) errors.push(rowNo+'행: 이름 누락'); return; }
          let joinDate = get(['입사일','입사날짜']);
          if(r['입사일'] instanceof Date) joinDate = r['입사일'].toISOString().slice(0,10);
          else joinDate = joinDate.slice(0,10).replace(/[./]/g,'-');
          let birth = get(['생년월일','생일']);
          if(r['생년월일'] instanceof Date) birth = r['생년월일'].toISOString().slice(0,10);
          else birth = birth.slice(0,10).replace(/[./]/g,'-');
          let leaveDate = get(['퇴사일','퇴직일']);
          if(r['퇴사일'] instanceof Date) leaveDate = r['퇴사일'].toISOString().slice(0,10);
          else leaveDate = leaveDate.slice(0,10).replace(/[./]/g,'-');
          const statusRaw = get(['재직상태','상태']);
          const status = HR_STATUS.includes(statusRaw) ? statusRaw : '재직';
          const rank = get(['직급']);
          const dept = get(['부서']);
          const data = {
            name, dept, rank,
            position: get(['직책']),
            joinDate:  joinDate.length===10 ? joinDate : '',
            status,
            leaveDate: status==='퇴직' && leaveDate.length===10 ? leaveDate : '',
            birth:     birth.length===10 ? birth : '',
            phone:     get(['연락처','휴대폰','전화']),
            email:     get(['이메일','email','Email']),
            memo:      get(['메모','비고'])
          };
          // 동명이인 주의: 이름+입사일로 매칭
          const exist = State.hr.find(x=>x.name===name && (x.joinDate===data.joinDate || !data.joinDate));
          if(exist){ Object.assign(exist, data); }
          else { data.id = DB.uid(); State.hr.push(data); }
          ok++;
        });
        State.saveAll(); _renderHr();
        let msg = ok+'명 처리 완료';
        if(errors.length) msg += ' · 건너뜀 '+errors.length+'건';
        toast(msg);
        if(errors.length) setTimeout(()=>alert('건너뛴 행:\n'+errors.join('\n')),300);
      }catch(err){ toast('가져오기 실패: 파일 형식을 확인하세요'); console.error(err); }
      input.value='';
    };
    reader.readAsArrayBuffer(file);
  },
  exportXlsx(){
    const rows = State.hr.map(e=>({
      '이름':e.name, '부서':e.dept||'', '직급':e.rank||'', '직책':e.position||'',
      '입사일':e.joinDate||'', '퇴사일':e.leaveDate||'', '재직상태':e.status,
      '재직기간':workPeriod(e.joinDate,e.status,e.leaveDate),
      '생년월일':e.birth||'', '연락처':e.phone||'', '이메일':e.email||'', '메모':e.memo||''
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:8},{wch:12},{wch:8},{wch:8},{wch:12},{wch:12},{wch:8},{wch:10},{wch:12},{wch:14},{wch:24},{wch:20}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '인사명단');
    XLSX.writeFile(wb, `엔자인_인사명단_${todayStr()}.xlsx`);
  }
};
</script>

function authInit(){
