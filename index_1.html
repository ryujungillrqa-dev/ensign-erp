  const roles = Object.keys(State.auth.roles);
  const PERM_LABEL = { rw:'읽기+쓰기', r:'읽기전용', none:'접근불가' };
  const PERM_COLOR = { rw:'var(--green)', r:'var(--blue)', none:'var(--ink3)' };

  // 역할 추가 폼
  const addForm = `
    <div class="card" style="margin-bottom:12px">
      <div class="hd"><h2>역할 관리</h2></div>
      <div class="bd" style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input id="new-role-name" placeholder="새 역할 이름" style="border:1px solid var(--line);border-radius:7px;padding:7px 10px;font-size:13px;width:180px">
        <button class="btn pri" onclick="Auth.addRole()">+ 역할 추가</button>
        <span style="font-size:12px;color:var(--ink3)">역할을 추가하면 기본 권한(읽기전용)으로 생성됩니다</span>
      </div>
    </div>`;

  // 권한 매트릭스 테이블
  const roleHeaders = roles.map(r=>`
    <th class="ctr" style="min-width:110px">
      ${esc(r)}
      ${!AUTH_ROLES_DEFAULT.map(d=>d.name).includes(r)?`<br><button class="btn sm dgr" style="margin-top:4px" onclick="Auth.delRole('${esc(r)}')">삭제</button>`:''}
    </th>`).join('');

  const matrixRows = AUTH_MENUS.map(m=>`
    <tr>
      <td style="font-weight:600;padding:8px 12px;white-space:nowrap">${m.label}</td>
      ${roles.map(r=>{
        const cur = (State.auth.roles[r]?.perms||{})[m.key]||'none';
        return `<td class="ctr" style="padding:6px 8px">
          <select style="font-size:12px;border:1px solid var(--line);border-radius:6px;padding:4px 6px;color:${PERM_COLOR[cur]};font-weight:600"
            onchange="Auth.setPerm('${esc(r)}','${m.key}',this.value)">
            ${Object.keys(PERM_LABEL).map(p=>`<option value="${p}" ${cur===p?'selected':''}>${PERM_LABEL[p]}</option>`).join('')}
          </select>
        </td>`;
      }).join('')}
    </tr>`).join('');

  document.getElementById('auth-content').innerHTML = `
    ${addForm}
    <div class="card"><div class="hd"><h2>메뉴별 접근 권한 매트릭스</h2>
      <span style="font-size:12px;color:var(--ink3);margin-left:8px">변경 즉시 자동 저장됩니다</span>
    </div>
    <div class="bd np tbl-wrap">
      <table class="grid">
        <thead><tr><th style="min-width:100px">메뉴</th>${roleHeaders}</tr></thead>
        <tbody>${matrixRows}</tbody>
      </table>
    </div></div>`;
}

/* ── 직원별 역할 배정 ── */
function _renderAuthUser(){
  const roles   = Object.keys(State.auth.roles);
  const empList = State.hr.filter(e=>e.status==='재직').sort((a,b)=>{
    const ri = x=>HR_RANKS.indexOf(x.rank); return ri(b)-ri(a)||(a.name||'').localeCompare(b.name||'');
  });

  const rows = empList.map(e=>{
    const cur = State.auth.users[e.id]||'';
    return `<tr>
      <td><b>${esc(e.name)}</b></td>
      <td>${esc(e.dept||'-')}</td>
      <td>${esc(e.rank||'-')}</td>
      <td class="ctr">
        <select style="font-size:12px;border:1px solid var(--line);border-radius:6px;padding:5px 8px"
          onchange="Auth.setUserRole('${e.id}',this.value)">
          <option value="">-- 선택 --</option>
          ${['관리자','부관리자','계약담당','진단팀장','자금담당','일반직원']
            .concat(Object.keys(State.auth.roles||{}).filter(r=>!['관리자','부관리자','계약담당','진단팀장','자금담당','일반직원'].includes(r)))
            .map(r=>`<option value="${r}" ${cur===r?'selected':''}>${r}</option>`).join('')}
        </select>
      </td>
      <td class="ctr">${cur?`<span class="tag ${cur==='관리자'?'t1':cur==='열람전용'?'gray':'t4'}">${esc(cur)}</span>`:'<span style="color:var(--ink3);font-size:12px">미배정</span>'}</td>
      <td class="ctr"><button class="btn sm dgr" onclick="Auth.resetPin('${e.id}','${esc(e.name)}')">PIN 초기화</button></td>
    </tr>`;
  }).join('') || `<tr><td colspan="6"><div class="empty"><b>재직 중인 직원이 없습니다</b>인사관리에서 직원을 먼저 등록하세요</div></td></tr>`;

  // 역할별 인원 요약
  const summary = roles.map(r=>{
    const cnt = Object.values(State.auth.users).filter(v=>v===r).length;
    return `<span style="font-size:12.5px;color:var(--ink2);margin-right:12px"><b>${r}</b> ${cnt}명</span>`;
  }).join('');

  document.getElementById('auth-content').innerHTML = `
    <div class="card" style="margin-bottom:12px">
      <div class="hd"><h2>역할별 배정 현황</h2></div>
      <div class="bd">${summary||'<span style="color:var(--ink3)">배정된 역할 없음</span>'}</div>
    </div>
    <div class="card"><div class="hd"><h2>직원별 역할 배정</h2>
      <span style="font-size:12px;color:var(--ink3);margin-left:8px">변경 즉시 자동 저장됩니다</span>
    </div>
    <div class="bd np tbl-wrap">
      <table class="grid">
        <thead><tr><th>이름</th><th>부서</th><th>직급</th><th class="ctr" style="width:160px">역할 선택</th><th class="ctr" style="width:100px">현재 역할</th><th class="ctr" style="width:100px">PIN 관리</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div>`;
}

const Auth = {
  // 직원 PIN 초기화: 해당 직원이 이 기기/타 기기에 등록한 PIN 정보를 지우고,
  // 직원 본인이 다시 "이름+PIN"으로 등록할 수 있는 상태로 되돌림.
  // (PIN은 각 기기 localStorage에 저장되므로, 관리자가 원격으로 직접 지울 수는 없음.
  //  대신 staff_profiles에 초기화 플래그를 남겨, 해당 직원이 로그인 시도 시
  //  자동으로 등록화면으로 안내되도록 처리)
  async resetPin(empId, empName){
    if(!confirm('['+empName+']님의 PIN을 초기화하시겠습니까?\n초기화 후 본인이 다시 이름+PIN으로 등록해야 합니다.')) return;
    const {error} = await supa.from('staff_profiles').update({pin_reset_at:new Date().toISOString()}).eq('name', empName);
    if(error){ toast('초기화 실패: '+error.message); return; }
    toast('✅ '+empName+'님의 PIN이 초기화되었습니다. 본인 기기에서 다시 등록해주세요.');
  },
  setPerm(role, menu, val){
    if(!State.auth.roles[role]) return;
    State.auth.roles[role].perms[menu] = val;
    State.saveAll(); toast(`[${role}] ${menu} 권한 → ${val}`);
  },
  setUserRole(empId, role){
    if(role){ State.auth.users[empId] = role; }
    else     { delete State.auth.users[empId]; }
    State.saveAll();
    // staff_profiles 동시 업데이트
    var hr2 = State.hr.find(function(h){ return h.id===empId; });
    if(hr2 && hr2.name){
      var newRole = role || '일반직원';
      supa.from('staff_profiles').update({role: newRole}).eq('name', hr2.name).then(function(){
        toast(hr2.name + ' 역할 → ' + newRole);
      });
    } else {
      toast('역할이 저장되었습니다');
    }
    // 드롭다운 값만 업데이트 (화면 리렌더 없이)
    var badge = document.querySelector('tr td select[onchange*="' + empId + '"]');
    if(badge) badge.value = role||'';
    var tagEl = badge ? badge.closest('tr').querySelector('td:last-child span') : null;
    if(tagEl){ tagEl.textContent = role||'미배정'; }
  },
  addRole(){
    const inp = document.getElementById('new-role-name');
    const name = (inp?.value||'').trim();
    if(!name){ toast('역할 이름을 입력하세요'); return; }
    if(State.auth.roles[name]){ toast('이미 존재하는 역할입니다'); return; }
    const perms = {};
    AUTH_MENUS.forEach(m=>perms[m.key]='r');
    State.auth.roles[name] = { perms };
    State.saveAll(); Views.auth(); toast(`[${name}] 역할이 추가됐습니다`);
  },
  delRole(name){
    if(AUTH_ROLES_DEFAULT.map(d=>d.name).includes(name)){ toast('기본 역할은 삭제할 수 없습니다'); return; }
    if(!confirm(`[${name}] 역할을 삭제할까요?\n해당 역할을 가진 직원은 미배정 상태가 됩니다.`)) return;
    delete State.auth.roles[name];
    Object.keys(State.auth.users).forEach(id=>{ if(State.auth.users[id]===name) delete State.auth.users[id]; });
    State.saveAll(); Views.auth(); toast(`[${name}] 역할 삭제됨`);
  }
};
</script>
<script>
/* =====================================================
   에너지진단 (ediag)
   - 에너지진단팀(04) 계약 목록 표시
   - 계약별 진단팀 구성: 팀장 1명 + 팀원 최대 3명 (총 4명)
   - 인사관리 재직자 목록에서 선택
   State.ediag = [{id, contractId, leader:{hrId,name}, members:[{hrId,name}], startDate, endDate, memo}]
===================================================== */
let ediagFilter = { q:'', year:'' };

Views.ediag = function(){
  const years = [...new Set(State.contracts.filter(c=>c.typeCode==='04').map(c=>c.year))].sort().reverse();
  document.getElementById('content').innerHTML = `
    <div class="toolbar sticky-toolbar">
      <input type="search" id="ediag-search" placeholder="계약번호·계약명·업체명 검색"
        value="${esc(ediagFilter.q)}" oninput="ediagSearchInput(event)" style="width:240px">
      <select onchange="ediagFilter.year=this.value;_renderEdiag()">
        <option value="">대상년도 전체</option>
        ${years.map(y=>`<option ${ediagFilter.year===y?'selected':''}>${y}</option>`).join('')}
      </select>
      <span class="sp"></span>
      <span id="ediag-summary" style="font-size:12.5px;color:var(--ink2)"></span>
    </div>
    <div id="ediag-list" style="margin-top:4px"></div>`;
  _renderEdiag();
};

/* 한글 IME */
const _ediagIme = { composing:false };
document.addEventListener('compositionstart', e=>{ if(e.target.id==='ediag-search') _ediagIme.composing=true; });
document.addEventListener('compositionend',   e=>{ if(e.target.id==='ediag-search'){ _ediagIme.composing=false; ediagFilter.q=e.target.value; _renderEdiag(); }});
function ediagSearchInput(e){ if(_ediagIme.composing) return; ediagFilter.q=e.target.value; _renderEdiag(); }

function ediagByContract(cid){ return State.ediag.find(d=>d.contractId===cid); }

function _renderEdiag(){
  const list = State.contracts.filter(c=>{
    if(c.typeCode !== '04') return false;
    if(ediagFilter.year && c.year !== ediagFilter.year) return false;
    if(ediagFilter.q){
      const q = ediagFilter.q.toLowerCase();
      if(!((c.no||'')+(c.name||'')+(c.client||'')).toLowerCase().includes(q)) return false;
    }
    return true;
  }).sort((a,b)=>(b.no||'').localeCompare(a.no||''));

  const sm = document.getElementById('ediag-summary');
  if(sm) sm.textContent = `에너지진단팀 계약 ${list.length}건`;

  if(!list.length){
    document.getElementById('ediag-list').innerHTML =
      `<div class="card"><div class="empty"><b>에너지진단팀 계약이 없습니다</b>계약관리에서 사업본부를 [에너지진단팀]으로 등록하면 여기 표시됩니다</div></div>`;
    return;
  }

  const rows = list.map(c=>{
    const d = ediagByContract(c.id);
    const total = (Number(c.supply)||0)+(Number(c.vat)||0);
    const invs  = contractInvoices(c.id).filter(v=>v.issueDate);
    const paid  = invs.filter(v=>v.paid).reduce((s,v)=>s+invoiceTotal(v),0);

    // 진단팀 구성 표시
    const leader  = d?.leader?.name  || '';
    const members = d?.members || [];
    const memberPart = members.length ? members.map(m=>m.name).join(', ') : '';
    const teamTitle2 = leader
      ? '⭐' + leader + (memberPart ? ' / 👥' + memberPart : '')
      : '';
    const teamHtml = leader
      ? `<div title="${esc(teamTitle2)}" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
           ${esc(teamTitle2)}
         </div>`
      : `<span style="color:var(--ink3)">미배정</span>`;

    const period = (d?.startDate||d?.endDate)
      ? `${d.startDate||'?'} ~ ${d.endDate||'?'}`
      : '<span style="color:var(--ink3)">-</span>';

    return `<tr>
      <td><b>${esc(c.no)}</b></td>
      <td style="max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.client)}">${esc(c.client)}</td>
      <td style="max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.name)}">${esc(c.name)}</td>
      <td class="ctr">${esc(c.grade||'-')}</td>
      <td class="num">${fmt.money(total)}</td>
      <td class="ctr">${period}</td>
      <td style="max-width:327px;overflow:hidden">${teamHtml}</td>
      <td class="ctr" style="padding:4px 6px">
        ${Ediag.fileCell(d)}
      </td>
      <td class="ctr">
        <button class="btn sm" onclick="Ediag.uploadModal('${c.id}')">보고서등록</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('ediag-list').innerHTML = `
    <div class="card" style="margin:0"><div class="bd np tbl-wrap">
      <table class="grid" style="table-layout:fixed;width:100%;font-size:13px"><thead><tr>
        <th style="width:100px">계약번호</th>
        <th style="width:230px">업체명</th>
        <th style="width:120px">계약명</th>
        <th class="ctr" style="width:48px">등급</th>
        <th class="num" style="width:100px">계약금액</th>
        <th class="ctr" style="width:218px">진단기간</th>
        <th style="width:327px">진단팀 구성</th>
        <th class="ctr" style="width:90px">보고서</th>
      </tr></thead><tbody>${rows}</tbody></table>
    </div></div>`;
}

const Ediag = {
  editTeam(contractId){
    const c = contractById(contractId);
    if(!c) return;
    const d = ediagByContract(contractId) || { contractId, leader:{hrId:'',name:''}, members:[], startDate:'', endDate:'', memo:'' };
    const empOpts = State.hr.filter(e=>e.status==='재직')
      .sort((a,b)=>HR_RANKS.indexOf(b.rank)-HR_RANKS.indexOf(a.rank))
      .map(e=>`<option value="${e.id}|${esc(e.name)}">${esc(e.name)} (${esc(e.rank||'')}${e.dept?` · ${esc(e.dept)}`:''})</option>`).join('');
    const noEmp = `<option value="">-- 선택 --</option>`;

    // 팀원 5칸
    const memberSelects = [0,1,2,3,4].map(i=>{
      const m = d.members[i];
      return `<div class="fld" ${i===0?'style="grid-column-start:1"':''}>
        <label>팀원 ${i+1}</label>
        <select id="ediag-m${i}">
          ${noEmp}
          ${State.hr.filter(e=>e.status==='재직')
            .sort((a,b)=>HR_RANKS.indexOf(b.rank)-HR_RANKS.indexOf(a.rank))
            .map(e=>`<option value="${e.id}|${esc(e.name)}" ${m&&m.hrId===e.id?'selected':''}>${esc(e.name)} (${esc(e.rank||'')}${e.dept?` · ${esc(e.dept)}`:''})</option>`).join('')}
        </select>
      </div>`;
    }).join('');

    const body = `
      <div style="margin-bottom:12px;padding:10px 14px;background:var(--brand-soft);border-radius:8px">
        <div style="font-size:12px;color:var(--ink2);font-weight:700">${esc(c.no)} · ${esc(c.name)}</div>
        <div style="font-size:12px;color:var(--ink2);margin-top:2px">업체명: ${esc(c.client)} · 등급: ${esc(c.grade||'-')} · 계약금액: ${fmt.money((Number(c.supply)||0)+(Number(c.vat)||0))}원</div>
      </div>
      <div class="frm">
        <!-- 팀장 (상단) -->
        <div class="fld w2" style="padding-bottom:14px;margin-bottom:6px;border-bottom:2px solid var(--line2)">
          <label style="font-size:13px;font-weight:800;color:var(--brand)">👑 팀장 <span style="color:var(--red)">*</span></label>
          <select id="ediag-leader">
            ${noEmp}
            ${State.hr.filter(e=>e.status==='재직')
              .sort((a,b)=>HR_RANKS.indexOf(b.rank)-HR_RANKS.indexOf(a.rank))
              .map(e=>`<option value="${e.id}|${esc(e.name)}" ${d.leader&&d.leader.hrId===e.id?'selected':''}>${esc(e.name)} (${esc(e.rank||'')}${e.dept?' · '+esc(e.dept):''})</option>`).join('')}
          </select>
        </div>
        <!-- 팀원 (중간) -->
        <div class="fld w2" style="margin-bottom:2px;grid-column:1/-1">
          <label style="font-size:13px;font-weight:700;color:var(--ink)">👤 팀원 <span style="font-size:11px;font-weight:400;color:var(--ink3)">최대 5명 (선택)</span></label>
        </div>
        ${memberSelects}
        <!-- 비고 (하단) -->
        <div class="fld w2" style="margin-top:8px;padding-top:14px;border-top:2px solid var(--line2)">
          <label>비고</label>
          <input id="ediag-memo" value="${esc(d.memo||'')}">
        </div>
      </div>`

    const existTeam = ediagByContract(contractId);
    UI.openModal(`진단팀 구성 — ${c.no}`, body, [
      {label:'취소', onClick:UI.closeModal},
      ...(existTeam ? [{label:'팀 구성 삭제', cls:'dgr', onClick:()=>Ediag.delTeam(contractId)}] : []),
      {label:'저장', cls:'pri', onClick:()=>Ediag.saveTeam(contractId)}
    ]);
  },

  async delTeam(contractId){
    const c = contractById(contractId);
    const d = ediagByContract(contractId);
    if(!d){ toast('삭제할 팀 구성이 없습니다'); return; }
    const teamInfo = `팀장: ${d.leader?.name||'-'}, 팀원: ${(d.members||[]).map(m=>m.name).join(', ')||'없음'}`;
    if(!confirm(`[${c?.no||''}] ${c?.name||''}

${teamInfo}

팀 구성을 삭제할까요?
(보고서 파일도 함께 삭제됩니다)`)) return;
    const delId = d.id;
    State.ediag = State.ediag.filter(x=>x.contractId!==contractId);
    toast('삭제 중...');
    try{
      // Supabase에서도 명시적으로 삭제 (다른 사용자 화면에 즉시 반영되도록)
      await supa.from('ediag').delete().eq('id', delId);
      await State.saveAll();
      toast('✅ 팀 구성이 삭제됐습니다');
    }catch(e){
      toast('❌ 삭제 실패: '+e.message);
      return;
    }
    UI.closeModal();
    if(location.hash==='#ediagmail') Views.ediagmail();
    else _renderEdiag();
  },
  async saveTeam(contractId){
    const g = id=>document.getElementById(id);
    const leaderVal = g('ediag-leader')?.value||'';
    if(!leaderVal){ toast('팀장을 선택하세요'); return; }
    const [lId, lName] = leaderVal.split('|');
    const members = [];
    const usedIds = new Set([lId]);
    [0,1,2,3,4].forEach(i=>{
      const val = g(`ediag-m${i}`)?.value||'';
      if(!val) return;
      const [mId, mName] = val.split('|');
      if(usedIds.has(mId)){ toast(`중복 선택: ${mName}은 팀장이거나 이미 팀원입니다`); return; }
      usedIds.add(mId);
      members.push({hrId:mId, name:mName});
    });
    const data_prev = State.ediag.find(d=>d.contractId===contractId);
    const data = {
      contractId,
      leader:    { hrId:lId, name:lName },
      members,
      startDate: (data_prev ? data_prev.startDate : '') || '',
      endDate:   (data_prev ? data_prev.endDate   : '') || '',
      memo:      g('ediag-memo')?.value.trim()||''
    };
    const exist = State.ediag.findIndex(d=>d.contractId===contractId);
    if(exist>=0){ State.ediag[exist] = {...State.ediag[exist], ...data}; }  // files 보존
    else { data.id = DB.uid(); data.files = {}; State.ediag.push(data); }
    toast('저장 중...');
    try{
      await State.saveAll();
      toast(`✅ 팀 구성 저장 완료 · 팀장 ${lName} + 팀원 ${members.length}명`);
    }catch(e){
      toast('❌ 저장 실패: '+e.message);
      return;
    }
    UI.closeModal();
    // 현재 화면에 맞게 리렌더
    if(location.hash==='#ediagmail') Views.ediagmail();
    else _renderEdiag();
  }
};
</script>
<script>
/* 에너지진단 — 파일 업로드 (HWP 보고서 / 엑셀 내부심의) */
Object.assign(Ediag, {

  /* 보고서 셀 HTML */
  fileCell(d){
    if(!d) return `<span style="color:var(--ink3)">미등록</span>`;
    const r = d.files?.report;
    const v = d.files?.review;
    if(!r && !v) return `<span style="color:var(--ink3)">미등록</span>`;
    // 1개만 등록 시 미등록 부분도 배지로 표시
    const rBadge = r
      ? `<span class="tag t4" style="cursor:pointer;font-size:10.5px;white-space:nowrap" onclick="Ediag.downloadFile('${d.contractId}','report')" title="${esc(r.name)}">📄 진단보고서</span>`
      : `<span class="tag gray" style="font-size:10.5px;white-space:nowrap;color:var(--ink3)">📄 미등록</span>`;
    const vBadge = v
      ? `<span class="tag t2" style="cursor:pointer;font-size:10.5px;white-space:nowrap" onclick="Ediag.downloadFile('${d.contractId}','review')" title="${esc(v.name)}">📊 내부심의</span>`
      : `<span class="tag gray" style="font-size:10.5px;white-space:nowrap;color:var(--ink3)">📊 미등록</span>`;
    return `<div style="display:flex;flex-direction:row;gap:4px;align-items:center;flex-wrap:nowrap">${rBadge}${vBadge}</div>`;
  },

  /* 파일 업로드 모달 */
  uploadModal(contractId){
    const c = contractById(contractId);
    const d = ediagByContract(contractId);
    if(!d){ toast('팀 구성을 먼저 저장해주세요'); return; }

    // 임시 보류 파일 (저장 버튼 누르기 전까지 State에 반영 안 함)
    if(!Ediag._pending) Ediag._pending = {};
    Ediag._pending[contractId] = Ediag._pending[contractId] || {};

    const r = Ediag._pending[contractId].report !== undefined
      ? Ediag._pending[contractId].report
      : d.files?.report;
    const v = Ediag._pending[contractId].review !== undefined
      ? Ediag._pending[contractId].review
      : d.files?.review;

    const reportSection = `
      <div class="card" style="margin-bottom:12px">
        <div class="hd"><h2 style="font-size:13px">📄 에너지진단보고서 <span style="font-size:11px;color:var(--ink3);font-weight:400">(HWP 파일)</span></h2></div>
        <div class="bd">
          ${r ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:#f7f9f8;border-radius:7px;border:1px solid var(--line2)">
            <span style="font-size:13px">📄</span>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(r.name)}</div>
              <div style="font-size:11px;color:var(--ink3)">${(r.size/1024).toFixed(1)} KB${r===d.files?.report?' · 저장됨':' · 선택됨 (미저장)'}</div>
            </div>
            ${r===d.files?.report ? `<button class="btn sm" onclick="Ediag.downloadFile('${contractId}','report')">다운로드</button>` : ''}
            <button class="btn sm dgr" onclick="Ediag._clearPending('${contractId}','report')">삭제</button>
          </div>` : `<div style="font-size:12.5px;color:var(--ink3);margin-bottom:8px">아직 선택된 파일이 없습니다</div>`}
          <label class="btn" style="display:inline-flex;align-items:center;gap:6px">
            ${r?'재선택':'파일 선택 (HWP)'}
            <input type="file" accept=".hwp,.hwpx,.pdf,.doc,.docx" style="display:none"
              onchange="Ediag.stagefile('${contractId}','report',this)">
          </label>
          <span style="font-size:11.5px;color:var(--ink3);margin-left:8px">.hwp · .hwpx · .pdf · .doc 허용</span>
        </div>
      </div>`;

    const reviewSection = `
      <div class="card" style="margin-bottom:12px">
        <div class="hd"><h2 style="font-size:13px">📊 내부심의보고서 <span style="font-size:11px;color:var(--ink3);font-weight:400">(엑셀 파일)</span></h2></div>
        <div class="bd">
          ${v ? `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:8px 12px;background:#f7f9f8;border-radius:7px;border:1px solid var(--line2)">
            <span style="font-size:13px">📊</span>
            <div style="flex:1;min-width:0">
              <div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(v.name)}</div>
              <div style="font-size:11px;color:var(--ink3)">${(v.size/1024).toFixed(1)} KB${v===d.files?.review?' · 저장됨':' · 선택됨 (미저장)'}</div>
            </div>
            ${v===d.files?.review ? `<button class="btn sm" onclick="Ediag.downloadFile('${contractId}','review')">다운로드</button>` : ''}
            <button class="btn sm dgr" onclick="Ediag._clearPending('${contractId}','review')">삭제</button>
          </div>` : `<div style="font-size:12.5px;color:var(--ink3);margin-bottom:8px">아직 선택된 파일이 없습니다</div>`}
          <label class="btn" style="display:inline-flex;align-items:center;gap:6px">
            ${v?'재선택':'파일 선택 (엑셀)'}
            <input type="file" accept=".xlsx,.xls,.xlsm,.csv" style="display:none"
              onchange="Ediag.stagefile('${contractId}','review',this)">
          </label>
          <span style="font-size:11.5px;color:var(--ink3);margin-left:8px">.xlsx · .xls · .xlsm 허용</span>
        </div>
      </div>`;

    const body = `
      <div style="margin-bottom:14px;padding:10px 14px;background:var(--brand-soft);border-radius:8px;font-size:12.5px;color:var(--ink2)">
        <b>${esc(c?.no||'')} · ${esc(c?.name||'')}</b>
      </div>
      ${reportSection}
      ${reviewSection}
      <div style="padding:8px 12px;background:var(--amber-soft);border-radius:7px;font-size:12px;color:var(--amber)">
        ⚠ 파일을 선택한 후 반드시 <b>[저장]</b> 버튼을 눌러야 저장됩니다.
      </div>`;

    UI.openModal(`보고서 관리 — ${c?.no||''}`, body, [
      {label:'취소', onClick:()=>{ delete Ediag._pending[contractId]; UI.closeModal(); }},
      {label:'💾 저장', cls:'pri', onClick:()=>Ediag.saveFiles(contractId)}
    ]);
  },

  // 파일 선택 → pending에 임시 저장 (State 미반영)
  stagefile(contractId, kind, input){
    const file = input.files[0]; if(!file) return;
    const MAX = 4 * 1024 * 1024;
    if(file.size > MAX){
      if(!confirm(`파일 크기가 ${(file.size/1024/1024).toFixed(1)}MB입니다.\nlocalStorage 저장 공간이 부족할 수 있습니다. 계속할까요?`)){
        input.value=''; return;
      }
    }
    const reader = new FileReader();
    reader.onload = e=>{
      if(!Ediag._pending) Ediag._pending = {};
      if(!Ediag._pending[contractId]) Ediag._pending[contractId] = {};
      Ediag._pending[contractId][kind] = { name:file.name, size:file.size, type:file.type, data:e.target.result };
      toast(`파일 선택됨: ${file.name} (저장 버튼을 눌러 확정하세요)`);
      Ediag.uploadModal(contractId); // 모달 새로고침
    };
    reader.readAsDataURL(file);
    input.value='';
  },

  // pending 파일 취소 (삭제 버튼)
  _clearPending(contractId, kind){
    if(!Ediag._pending) Ediag._pending = {};
    if(!Ediag._pending[contractId]) Ediag._pending[contractId] = {};
    const d = ediagByContract(contractId);
    // 이미 저장된 파일이면 삭제 확인
    if(d?.files?.[kind]){
      if(!confirm('파일을 삭제할까요? 저장 버튼을 눌러야 반영됩니다.')) return;
    }
    Ediag._pending[contractId][kind] = null; // null = 삭제 예정
    Ediag.uploadModal(contractId);
  },

  // [저장] 버튼 → pending을 State에 반영
  saveFiles(contractId){
    const d = ediagByContract(contractId);
    if(!d){ toast('진단팀 정보가 없습니다'); return; }
    const pending = Ediag._pending?.[contractId] || {};
    if(!Object.keys(pending).length){ toast('변경된 파일이 없습니다'); UI.closeModal(); return; }
    if(!d.files) d.files = {};
    try{
      ['report','review'].forEach(kind=>{
        if(!(kind in pending)) return;
        if(pending[kind] === null){
          delete d.files[kind]; // 삭제
        } else {
          d.files[kind] = pending[kind]; // 저장
        }
      });
      State.saveAll();
      delete Ediag._pending[contractId];
      UI.closeModal();
      _renderEdiag();
      toast('보고서가 저장되었습니다');
    } catch(err){
      if(err.name==='QuotaExceededError'||String(err).includes('quota')){
        toast('저장 공간 초과. 더 작은 파일을 사용하거나 기존 파일을 삭제하세요');
      } else {
        toast('저장 실패: '+err.message);
      }
    }
  },



  downloadFile(contractId, kind){
    const d = ediagByContract(contractId);
    const f = d?.files?.[kind];
    if(!f){ toast('파일이 없습니다'); return; }
    const a = document.createElement('a');
    a.href = f.data;
    a.download = f.name;
    a.click();
  },

  deleteFile(contractId, kind){
    const d = ediagByContract(contractId);
    if(!d?.files?.[kind]) return;
    const label = kind==='report' ? '에너지진단보고서' : '내부심의보고서';
    if(!confirm(`[${label}] 파일을 삭제할까요?\n삭제 후 복구할 수 없습니다.`)) return;
    delete d.files[kind];
    State.saveAll();
    toast('파일이 삭제됐습니다');
    Ediag.uploadModal(contractId);
    _renderEdiag();
  }
});
</script>
<script>
/* =====================================================
   진단일정등록 — 에너지진단 일정 등록 + 팀장 메일 발송
===================================================== */
let ediagMailFilter = { q:'', year:'' };
function ediagMailSearchInput(e){
  if(_ime['ediagmail']) return;
  ediagMailFilter.q = e.target.value;
  // 목록만 갱신 (전체 재렌더 없이)
  const allContracts = State.contracts.filter(c=>c.typeCode==='04').sort((a,b)=>(b.no||'').localeCompare(a.no||''));
  const q2 = ediagMailFilter.q.toLowerCase();
  const yr = ediagMailFilter.year;
  const filtered = allContracts.filter(c=>{
    if(yr&&(c.year||'')!==yr) return false;
    return !q2||((c.no||'')+(c.name||'')+(c.client||'')).toLowerCase().includes(q2);
  });
  // 행 숨기기/보이기 (DOM 유지)
  allContracts.forEach(c=>{
    const row = document.getElementById('erow-'+c.id);
    if(!row) return;
    const yearOk = !yr||(c.year||'')===yr;
    const textOk = !q2||((c.no||'')+(c.name||'')+(c.client||'')).toLowerCase().includes(q2);
    row.style.display = (yearOk&&textOk) ? '' : 'none';
  });
  const countEl = document.getElementById('ediagmail-count');
  if(countEl) countEl.textContent = `${filtered.length} / ${allContracts.length}건`;
}
Views.ediagmail = function(q){
  if(q!==undefined) ediagMailFilter.q=q;
  // 에너지진단팀(04) 계약
  const allContracts = State.contracts
    .filter(c=>c.typeCode==='04')
    .sort((a,b)=>(b.no||'').localeCompare(a.no||''));
  const ediagContracts = allContracts.filter(c=>{
    if(ediagMailFilter.year && (c.year||'')!==ediagMailFilter.year) return false;
    if(!ediagMailFilter.q) return true;
    const q2=ediagMailFilter.q.toLowerCase();
    return ((c.no||'')+(c.name||'')+(c.client||'')).toLowerCase().includes(q2);
  });

  const rows = ediagContracts.map(c=>{
    const d    = State.ediag.find(e=>e.contractId===c.id);
    const ctotal=(Number(c.supply)||0)+(Number(c.vat)||0);
    const leader = d?.leader;
    const members = d?.members||[];
    const leaderHr = leader ? State.hr.find(h=>h.id===leader.hrId) : null;
    const leaderEmail = leaderHr?.email||'';
    const hasTeam = !!leader;
    const teamStr = hasTeam
      ? `${leader.name} 팀장` + (members.length ? ' / ' + members.map(m=>m.name).join(', ') : '')
      : '<span style="color:var(--ink3);font-size:12px">팀 미구성</span>';
    const periodStr = d?.startDate
      ? `${d.startDate}${d.endDate?' ~ '+d.endDate:''}`
      : '<span style="color:var(--ink3);font-size:12px">미등록</span>';

    return `<tr id="erow-${c.id}">
      <td><span class="tag t4" style="font-size:11px">${esc(c.no)}</span></td>
      <td style="font-size:12.5px;max-width:168px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.client)}">${esc(c.client)}</td>
      <td style="font-size:12.5px;max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(c.name)}">${esc(c.name)}</td>
      <td class="ctr" style="font-size:12px">${esc(c.grade||'-')}</td>
      <td class="num" style="font-size:12.5px">${fmt.money(ctotal)}<small> 원</small></td>
      <td style="font-size:12.5px">${teamStr}</td>
      <td style="font-size:12px">${periodStr}</td>
      <td class="ctr">
        ${hasTeam
          ? `<button class="btn sm" style="background:#3a57c9;color:#fff;border-color:#2a47b9" onclick="EdiagMail.editSchedule('${c.id}')">📅 일정 등록</button>`
          : `<button class="btn sm pri" onclick="Ediag.editTeam('${c.id}')">팀 구성</button>`}
      </td>
      <td class="ctr">
        ${hasTeam
          ? `<button class="btn sm" style="background:#e3f2fd;color:#1565c0;border-color:#90caf9" onclick="EdiagMail.exportExcel('${c.id}')">📥 엑셀</button>`
          : `<span style="color:var(--ink3);font-size:12px">-</span>`}
      </td>
    </tr>`;
  }).join('') || `<tr><td colspan="8"><div class="empty"><b>에너지진단팀 계약이 없습니다</b></div></td></tr>`;

  document.getElementById('content').innerHTML = `
    <div class="toolbar sticky-toolbar">
      <input type="search" id="ediagmail-search" placeholder="계약번호·업체명·계약명 검색"
        value="${esc(ediagMailFilter.q)}"
        oninput="ediagMailSearchInput(event)"
        style="width:220px">
      <select onchange="ediagMailFilter.year=this.value;Views.ediagmail()" style="border:1px solid var(--line);border-radius:7px;padding:7px 10px;background:#fff;font-size:13px">
        <option value="">대상년도 전체</option>
        ${[...new Set(allContracts.map(c=>c.year||'').filter(Boolean))].sort().reverse()
          .map(y=>`<option value="${y}" ${ediagMailFilter.year===y?'selected':''}>${y}년</option>`).join('')}
      </select>
      <span class="sp"></span>
      <span id="ediagmail-count" style="font-size:13px;color:var(--ink2)">${ediagContracts.length} / ${allContracts.length}건</span>
      <button class="btn" onclick="EdiagMail.exportAllExcel()" style="background:#1565c0;color:#fff;border-color:#0d47a1">📥 전체 엑셀 다운로드</button>
      <span style="font-size:12px;color:var(--ink3)">· 개별 다운로드는 행 우측 📥 엑셀 버튼</span>
    </div>
    <div class="card" style="margin:0"><div class="bd np tbl-wrap">
      <table class="grid">
        <thead><tr>
          <th style="width:110px">계약번호</th>
          <th style="width:168px">업체명</th>
          <th style="width:96px">계약명</th>
          <th class="ctr" style="width:52px">등급</th>
          <th class="num" style="width:110px">계약금액</th>
          <th style="width:150px">진단팀</th>
          <th style="width:160px">진단기간</th>
          <th class="ctr" style="width:90px">일정</th>
          <th class="ctr" style="width:80px">엑셀</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div>`;
};

/* 날짜 구간 겹침 판별 — EdiagMail 밖 독립 함수 (this 바인딩 불필요) */
function _ediagOverlaps(s1, e1, s2, e2){
  const a1=s1||e1, b1=e1||s1, a2=s2||e2, b2=e2||s2;
  if(!a1||!a2) return false;
  return a1<=b2 && a2<=b1;
}

window.EdiagMail = {
  /* 일정 등록 모달 */
  editSchedule(contractId, tab){
    var c = contractById(contractId);
    var d = State.ediag.find(function(x){ return x.contractId===contractId; });
    if(!d){ toast('팀 구성을 먼저 완료해주세요'); return; }

    // 구성원 목록 (팀장 + 팀원)
    var members = [];
    if(d.leader && d.leader.hrId) members.push({hrId:d.leader.hrId, name:d.leader.name, role:'팀장'});
    (d.members||[]).forEach(function(m){ members.push({hrId:m.hrId, name:m.name, role:'팀원'}); });
    if(!members.length){ toast('팀 구성원이 없습니다'); return; }

    EdiagMail._calTab = tab || EdiagMail._calTab || 'site'; // 'site'=현장진단, 'report'=보고서작성
    EdiagMail._calContractId = contractId;
    EdiagMail._calYear  = EdiagMail._calYear  || new Date().getFullYear();
    EdiagMail._calMonth = EdiagMail._calMonth || (new Date().getMonth()+1);

    var ms = d.memberSchedules || {};
    // 기존 데이터를 날짜배열 구조로 정규화 (이전 startDate~endDate 방식과의 하위호환)
    members.forEach(function(m){
      if(!ms[m.hrId]) ms[m.hrId] = {};
      if(!ms[m.hrId].siteDates)   ms[m.hrId].siteDates   = ms[m.hrId].siteDates   || [];
      if(!ms[m.hrId].reportDates) ms[m.hrId].reportDates = ms[m.hrId].reportDates || [];
    });
    d.memberSchedules = ms;

    var ROLE_COLOR = { '팀장':'#2e7d32', '팀원':'#1565c0' };

    var modalBody = ''
      + '<div style="padding:10px 14px;background:var(--brand-soft);border-radius:8px;font-size:13px;margin-bottom:12px">'
      + '<b>' + esc(c?c.no:'') + ' · ' + esc(c?c.name:'') + ' · ' + esc(c?c.client:'') + '</b>'
      + '<span style="float:right;color:var(--ink2)">' + esc(c&&c.grade?c.grade+' 등급':'') + '</span>'
      + '</div>'

      // 범례 (한 달력에서 현장진단·보고서작성 모두 한눈에 확인/체크)
      + '<div style="display:flex;align-items:center;gap:16px;padding:9px 12px;background:#f7f9f8;border-radius:8px;margin-bottom:10px;font-size:12.5px;font-weight:600">'
      + '<span style="display:flex;align-items:center;gap:5px;color:#d32f2f"><input type="checkbox" checked disabled style="width:12px;height:12px;accent-color:#d32f2f">📍 현장진단</span>'
      + '<span style="display:flex;align-items:center;gap:5px;color:#1565c0"><input type="checkbox" checked disabled style="width:12px;height:12px;accent-color:#1565c0">📝 보고서작성</span>'
      + '<span style="color:var(--ink3);font-size:11.5px;font-weight:400">— 두 일정은 서로 독립적으로 체크됩니다</span>'
      + '</div>'

      + '<div id="cal-container"></div>'

      // 구성원별 투입일수 요약
      + '<div id="member-summary" style="margin-top:10px"></div>'

      // 비고
      + '<div style="margin-top:10px"><div style="font-size:12px;color:var(--ink2);margin-bottom:4px">비고</div>'
      + '<textarea id="em-memo" rows="2" style="width:100%;border:1px solid var(--line);border-radius:7px;padding:8px;font-size:13px;resize:vertical">' + esc(d.memo||'') + '</textarea></div>'

      // 버튼
      + '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">'
      + '<button onclick="UI.closeModal()" style="padding:7px 16px;border:1px solid var(--line);border-radius:7px;background:#fff;cursor:pointer;font-size:13px">취소</button>'
      + '<button onclick="UI.closeModal();Ediag.editTeam(\'' + contractId + '\')" style="padding:7px 16px;border:1.5px solid #3a57c9;border-radius:7px;background:#f0f4ff;color:#3a57c9;font-weight:700;cursor:pointer;font-size:13px">' + (d.leader?'팀 수정':'팀 구성') + '</button>'
      + '<button onclick="EdiagMail.saveSchedule(\'' + contractId + '\')" style="padding:7px 18px;border:1.5px solid #0a4a42;border-radius:7px;background:#0e5e54;color:#fff;font-weight:800;cursor:pointer;font-size:13px">💾 일정 저장</button>'
      + '</div>';

    UI.openModal('일정 등록 — ' + esc(c?c.no:''), modalBody, []);
    EdiagMail._renderCalendar();
  },

  _switchCalTab(tab){
    EdiagMail._calTab = tab;
    EdiagMail.editSchedule(EdiagMail._calContractId, tab);
  },

  // 달력 렌더링 (해당 탭의 일정만 표시, 날짜칸 안에 구성원 체크박스)
  _renderCalendar(){
    var contractId = EdiagMail._calContractId;
    var d = State.ediag.find(function(x){ return x.contractId===contractId; });
    if(!d) return;
    var members = [];
    if(d.leader && d.leader.hrId) members.push({hrId:d.leader.hrId, name:d.leader.name, role:'팀장'});
    (d.members||[]).forEach(function(m){ members.push({hrId:m.hrId, name:m.name, role:'팀원'}); });
    var ms = d.memberSchedules || {};
    var color = '#0e5e54';

    var y = EdiagMail._calYear, m = EdiagMail._calMonth;
    var firstDay = new Date(y, m-1, 1);
    var lastDate = new Date(y, m, 0).getDate();
    var startWeekday = firstDay.getDay(); // 0=일

    function pad(n){ return n<10 ? '0'+n : ''+n; }
    function dateStr(day){ return y+'-'+pad(m)+'-'+pad(day); }

    var weekdayRow = ['일','월','화','수','목','금','토'].map(function(w,i){
      var c = i===0 ? '#d32f2f' : (i===6 ? '#1565c0' : 'var(--ink2)');
      return '<div style="text-align:center;font-size:11px;font-weight:700;color:'+c+';padding:4px 0">'+w+'</div>';
    }).join('');

    var cells = '';
    for(var i=0;i<startWeekday;i++) cells += '<div></div>';
    for(var day=1; day<=lastDate; day++){
      var ds = dateStr(day);
      var siteAllChecked = members.length>0 && members.every(function(mem){
        var arr = (ms[mem.hrId] && ms[mem.hrId].siteDates) || [];
        return arr.indexOf(ds) !== -1;
      });
      var reportAllChecked = members.length>0 && members.every(function(mem){
        var arr = (ms[mem.hrId] && ms[mem.hrId].reportDates) || [];
        return arr.indexOf(ds) !== -1;
      });
      // 각 구성원 줄에 현장진단(빨강)·보고서작성(파랑) 체크박스를 함께 표시 (탭 전환과 무관하게 항상 둘 다 보임)
      var checks = members.map(function(mem){
        var siteArr = (ms[mem.hrId] && ms[mem.hrId].siteDates) || [];
        var reportArr = (ms[mem.hrId] && ms[mem.hrId].reportDates) || [];
        var siteChecked = siteArr.indexOf(ds) !== -1;
        var reportChecked = reportArr.indexOf(ds) !== -1;
        return '<div style="display:flex;align-items:center;gap:4px;font-size:9.5px;white-space:nowrap;overflow:hidden;margin-bottom:1px">'
          + '<input type="checkbox" class="cal-chk-site-'+ds+'" data-field="site" data-hr="'+mem.hrId+'" data-date="'+ds+'" onchange="EdiagMail._toggleDate(this)" '+(siteChecked?'checked':'')+' style="width:12px;height:12px;cursor:pointer;flex:none;accent-color:#d32f2f">'
          + '<input type="checkbox" class="cal-chk-report-'+ds+'" data-field="report" data-hr="'+mem.hrId+'" data-date="'+ds+'" onchange="EdiagMail._toggleDate(this)" '+(reportChecked?'checked':'')+' style="width:12px;height:12px;cursor:pointer;flex:none;accent-color:#1565c0">'
          + '<span style="overflow:hidden;text-overflow:ellipsis;color:var(--ink)">'+esc(mem.name)+'</span></div>';
      }).join('');
      var allLabel = '<div style="display:flex;align-items:center;gap:4px;font-size:9px;color:var(--ink3);cursor:pointer;border-bottom:1px dashed var(--line2);padding-bottom:2px;margin-bottom:2px;font-weight:700">'
        + '<input type="checkbox" data-field="site" data-date="'+ds+'" onchange="EdiagMail._toggleAllDate(this)" '+(siteAllChecked?'checked':'')+' style="width:12px;height:12px;cursor:pointer;flex:none;accent-color:#d32f2f">'
        + '<input type="checkbox" data-field="report" data-date="'+ds+'" onchange="EdiagMail._toggleAllDate(this)" '+(reportAllChecked?'checked':'')+' style="width:12px;height:12px;cursor:pointer;flex:none;accent-color:#1565c0">'
        + '<span>전체</span></div>';
      cells += '<div style="border:1px solid var(--line2);border-radius:6px;padding:4px;min-height:'+(20+members.length*16)+'px;background:#fff">'
        + '<div style="font-size:11px;font-weight:700;color:var(--ink2);margin-bottom:3px">'+day+'</div>'
        + allLabel
        + checks
        + '</div>';
    }

    var html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">'
      + '<button onclick="EdiagMail._calNav(-1)" style="border:1px solid var(--line);border-radius:6px;background:#fff;padding:4px 10px;cursor:pointer;font-size:13px">◀</button>'
      + '<div style="font-weight:800;font-size:14px;color:'+color+'">'+y+'년 '+m+'월</div>'
      + '<button onclick="EdiagMail._calNav(1)" style="border:1px solid var(--line);border-radius:6px;background:#fff;padding:4px 10px;cursor:pointer;font-size:13px">▶</button>'
      + '</div>'
      + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:2px">'+weekdayRow+'</div>'
      + '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;max-height:360px;overflow-y:auto">'+cells+'</div>';

    document.getElementById('cal-container').innerHTML = html;
    EdiagMail._renderMemberSummary();
  },

  _calNav(delta){
    EdiagMail._calMonth += delta;
    if(EdiagMail._calMonth > 12){ EdiagMail._calMonth = 1; EdiagMail._calYear++; }
    if(EdiagMail._calMonth < 1){ EdiagMail._calMonth = 12; EdiagMail._calYear--; }
    EdiagMail._renderCalendar();
  },

  // 체크박스 토글: 메모리(d.memberSchedules)에 날짜 추가/제거
  _toggleDate(el){
    var hrId = el.getAttribute('data-hr');
    var ds   = el.getAttribute('data-date');
    var clickedField = el.getAttribute('data-field'); // 'site' 또는 'report'
    var d = State.ediag.find(function(x){ return x.contractId===EdiagMail._calContractId; });
    if(!d) return;
    var ms = d.memberSchedules || (d.memberSchedules = {});
    if(!ms[hrId]) ms[hrId] = {siteDates:[], reportDates:[]};
    var field = clickedField==='site' ? 'siteDates' : 'reportDates';
    var arr = ms[hrId][field] || (ms[hrId][field] = []);
    var idx = arr.indexOf(ds);
    // 현장진단·보고서작성은 완전히 독립적으로 체크/해제 (서로 영향 없음)
    if(el.checked){
      if(idx===-1) arr.push(ds);
    } else {
      if(idx!==-1) arr.splice(idx,1);
    }
    EdiagMail._renderMemberSummary();
  },

  // 날짜별 "전체" 체크박스: 그 날의 모든 구성원 체크박스를 일괄 토글 (상호배타 동일 적용)
  _toggleAllDate(allEl){
    var ds = allEl.getAttribute('data-date');
    var field = allEl.getAttribute('data-field'); // 'site' 또는 'report'
    var checked = allEl.checked;
    var checkboxes = document.querySelectorAll('.cal-chk-'+field+'-'+ds);
    checkboxes.forEach(function(cb){
      if(cb.checked !== checked){
        cb.checked = checked;
        EdiagMail._toggleDate(cb);
      }
    });
  },

  // 구성원별 투입일수 요약 (현재 탭 기준, 이름 옆에 (n일) 표시)
  _renderMemberSummary(){
    var d = State.ediag.find(function(x){ return x.contractId===EdiagMail._calContractId; });
    if(!d) return;
    var members = [];
    if(d.leader && d.leader.hrId) members.push({hrId:d.leader.hrId, name:d.leader.name, role:'팀장'});
    (d.members||[]).forEach(function(m){ members.push({hrId:m.hrId, name:m.name, role:'팀원'}); });
    var ms = d.memberSchedules || {};

    var rows = members.map(function(mem){
      var siteArr = (ms[mem.hrId] && ms[mem.hrId].siteDates) || [];
      var reportArr = (ms[mem.hrId] && ms[mem.hrId].reportDates) || [];
      var roleTag = mem.role==='팀장'
        ? '<span style="background:#e8f5e9;color:#2e7d32;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:700">팀장</span>'
        : '<span style="background:#e3f2fd;color:#1565c0;padding:1px 6px;border-radius:4px;font-size:11px;font-weight:700">팀원</span>';
      return '<div style="display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12.5px">'
        + roleTag + ' <b>'+esc(mem.name)+'</b>'
        + ' — <span style="color:#d32f2f">📍현장진단 <b>('+siteArr.length+'일)</b></span>'
        + ' · <span style="color:#1565c0">📝보고서작성 <b>('+reportArr.length+'일)</b></span>'
        + '</div>';
    }).join('');
    document.getElementById('member-summary').innerHTML =
      '<div style="border-top:1px solid var(--line2);padding-top:8px">'+rows+'</div>';
  },



  async saveSchedule(contractId){
    const c  = contractById(contractId);
    const me = State.ediag.find(e=>e.contractId===contractId);
    if(!me){ toast('팀 구성이 필요합니다'); return; }
    const memo = (document.getElementById('em-memo')?.value||'').trim();
    me.memo = memo;

    // 팀원 ID 수집 (팀장 포함)
    const myIds = [];
    if(me.leader && me.leader.hrId) myIds.push(me.leader.hrId);
    (me.members||[]).forEach(function(m){ if(m && m.hrId) myIds.push(m.hrId); });
    if(myIds.length === 0){ toast('팀 구성원이 없습니다'); return; }

    // 이름 맵
    const nameMap = {};
    (State.hr||[]).forEach(function(h){ if(h && h.id) nameMap[h.id] = h.name||h.id; });

    const ms = me.memberSchedules || {};

    // 겹침 검사: 날짜 배열 기준 (현장진단/보고서작성 모두 검사)
    var conflicts = [];
    (State.ediag||[]).forEach(function(other){
      if(other.contractId === contractId) return;
      var otherIds = [];
      if(other.leader && other.leader.hrId) otherIds.push(other.leader.hrId);
      (other.members||[]).forEach(function(m){ if(m && m.hrId) otherIds.push(m.hrId); });
      var otherMs = other.memberSchedules || {};
      var oc = contractById(other.contractId);
      myIds.forEach(function(myId){
        if(otherIds.indexOf(myId) === -1) return;
        ['siteDates','reportDates'].forEach(function(field){
          var myArr = (ms[myId] && ms[myId][field]) || [];
          var otherArr = (otherMs[myId] && otherMs[myId][field]) || [];
          var overlap = myArr.filter(function(d){ return otherArr.indexOf(d) !== -1; });
          if(overlap.length){
            var label = field==='siteDates' ? '현장진단' : '보고서작성';
            conflicts.push('[' + (oc?oc.no:'?') + '] ' + (oc?oc.name:'?')
              + ' / ' + (nameMap[myId]||myId) + ' ' + label + ' 일정 겹침 (' + overlap.join(', ') + ')');
          }
        });
      });
    });

    if(conflicts.length > 0){
      window.alert('⚠ 일정 겹침 - 저장 불가\n\n하루라도 겹치는 팀원이 있어 저장할 수 없습니다.\n\n' + conflicts.join('\n'));
      return;
    }

    // 전체 기간(startDate/endDate)을 모든 구성원의 날짜 중 최소/최대로 자동 계산 (목록 화면 표시용)
    var allDates = [];
    myIds.forEach(function(hrId){
      var s = ms[hrId] || {};
      allDates = allDates.concat(s.siteDates||[], s.reportDates||[]);
    });
    allDates.sort();
    me.startDate = allDates.length ? allDates[0] : '';
    me.endDate   = allDates.length ? allDates[allDates.length-1] : '';

    toast('저장 중...');
    try{
      await State.saveAll();
      toast('✅ [' + (c?c.no:'') + '] 진단일정이 저장되었습니다');
    }catch(e){
      toast('❌ 저장 실패: '+e.message);
      return;
    }
    UI.closeModal();
    Views.ediagmail();
  },

    /* 메일 발송 (mailto) */
  exportExcel(contractId){
    // 이 업체의 팀구성 + 일정 엑셀 다운로드
    const c = contractById(contractId);
    const d = State.ediag.find(function(x){ return x.contractId===contractId; });
    if(!d||!d.leader){ toast('팀 구성이 필요합니다'); return; }
    EdiagMail.exportAllExcel(contractId);
  },

  exportAllExcel(filterContractId){
    // filterContractId: 특정 계약만, undefined면 전체
    var rows = [];
    var targets = filterContractId
      ? State.ediag.filter(function(d){ return d.contractId===filterContractId; })
      : State.ediag;

    targets.forEach(function(d){
      var c = contractById(d.contractId);
      if(!c) return;
      if(!d.leader) return;

      var ctotal = (Number(c.supply)||0)+(Number(c.vat)||0);
      var ms = d.memberSchedules||{};

      function fmtDates(arr){
        var sorted = (arr||[]).slice().sort();
        if(!sorted.length) return '';
        var first = sorted[0], last = sorted[sorted.length-1];
        return first===last ? first : (first + ' ~ ' + last);
      }

      // 팀장 행
      var leaderHr = State.hr.find(function(h){ return h.id===d.leader.hrId; });
      var leaderMs = ms[d.leader.hrId] || {};
      rows.push({
        '계약번호': c.no||'',
        '업체명':   c.client||'',
        '계약명':   c.name||'',
        '등급':     c.grade||'',
        '계약금액': ctotal,
        '구분':     '팀장',
        '이름':     d.leader.name||'',
        '직급':     leaderHr ? (leaderHr.rank||'') : '',
        '핸드폰':   leaderHr ? (leaderHr.phone||'') : '',
        '이메일':   leaderHr ? (leaderHr.email||'') : '',
        '진단대상_담당자성명': c.siteContactName||'',
        '진단대상_담당자연락처': c.siteContactPhone||'',
        '진단대상_담당자이메일': c.siteContactEmail||'',
        '진단대상_사업장주소': c.siteAddress||'',
        '현장진단일정(일수)': leaderMs.siteDates&&leaderMs.siteDates.length ? (fmtDates(leaderMs.siteDates) + ' (' + leaderMs.siteDates.length + '일)') : '',
        '보고서작성일정(일수)': leaderMs.reportDates&&leaderMs.reportDates.length ? (fmtDates(leaderMs.reportDates) + ' (' + leaderMs.reportDates.length + '일)') : '',
        '비고':     d.memo||''
      });

      // 팀원 행
      (d.members||[]).forEach(function(m){
        var mHr = State.hr.find(function(h){ return h.id===m.hrId; });
        var mMs = ms[m.hrId] || {};
        rows.push({
          '계약번호': c.no||'',
          '업체명':   c.client||'',
          '계약명':   c.name||'',
          '등급':     c.grade||'',
          '계약금액': ctotal,
          '구분':     '팀원',
          '이름':     m.name||'',
          '직급':     mHr ? (mHr.rank||'') : '',
          '핸드폰':   mHr ? (mHr.phone||'') : '',
          '이메일':   mHr ? (mHr.email||'') : '',
          '진단대상_담당자성명': c.siteContactName||'',
          '진단대상_담당자연락처': c.siteContactPhone||'',
          '진단대상_담당자이메일': c.siteContactEmail||'',
          '진단대상_사업장주소': c.siteAddress||'',
          '현장진단일정(일수)': mMs.siteDates&&mMs.siteDates.length ? (fmtDates(mMs.siteDates) + ' (' + mMs.siteDates.length + '일)') : '',
          '보고서작성일정(일수)': mMs.reportDates&&mMs.reportDates.length ? (fmtDates(mMs.reportDates) + ' (' + mMs.reportDates.length + '일)') : '',
          '비고':     d.memo||''
        });
      });
    });

    if(!rows.length){ toast('다운로드할 데이터가 없습니다'); return; }

    var ws = XLSX.utils.json_to_sheet(rows);
    // 열 너비 설정
    ws['!cols'] = [
      {wch:14},{wch:20},{wch:20},{wch:6},{wch:14},
      {wch:6},{wch:10},{wch:8},{wch:14},{wch:24},
      {wch:10},{wch:14},{wch:22},{wch:30},
      {wch:40},{wch:40},{wch:20}
    ];
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '진단일정');
    var fname = filterContractId
      ? '진단일정_' + (contractById(filterContractId)?.no||'') + '_' + todayStr() + '.xlsx'
      : '진단일정_전체_' + todayStr() + '.xlsx';
    XLSX.writeFile(wb, fname);
    toast('엑셀 다운로드 완료');
  }
};

(async function(){

      await SupaAuth.onLoginWithProfile(pinSession.user);
      return;
    }
    localStorage.removeItem('ensign_pin_session');

    // 3) 둘 다 없으면 PIN 로그인 화면
    await PinAuth.init();
  }catch(e){console.error('초기화 오류:',e);PinAuth.init();}

      sessionStorage.setItem('ensign_page_hash', Updater._simpleHash(html0));

})();

document.addEventListener('compositionstart', e=>{ if(e.target.id==='equip-search') _equipIme.composing=true; });
document.addEventListener('compositionend',   e=>{ if(e.target.id==='equip-search'){ _equipIme.composing=false; equipFilter.q=e.target.value; _renderEquip(); }});
function equipSearchInput(e){ if(_equipIme.composing) return; equipFilter.q=e.target.value; _renderEquip(); }

function _equipRows(){
  return (State.equip||[]).filter(eq=>{
    if(!equipFilter.q) return true;
    const q = equipFilter.q.toLowerCase();
    return ((eq.equipName||'')+(eq.equipNo||'')+(eq.sn||'')).toLowerCase().includes(q);
  }).sort((a,b)=>(a.equipName||'').localeCompare(b.equipName||''));
}

function _renderEquip(){
  const extra = document.getElementById('equip-toolbar-extra');
  if(extra){
    extra.innerHTML = `
      <input type="search" id="equip-search" placeholder="장비명·장비번호·SN 검색"
        value="${esc(equipFilter.q)}" oninput="equipSearchInput(event)" style="width:240px">
      <span id="equip-summary" style="font-size:12.5px;color:var(--ink2)"></span>
      <button class="btn" onclick="Equip.template()">업로드 양식</button>
      <label class="btn">엑셀 일괄등록<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="Equip.importXlsx(this)"></label>
      <button class="btn" onclick="Equip.exportXlsx()">엑셀 내보내기</button>
      <button class="btn pri" onclick="Equip.edit()">+ 장비 등록</button>`;
  }
  const list = _equipRows();
  const sm = document.getElementById('equip-summary');
  if(sm) sm.textContent = `장비 ${list.length}건`;

  if(!list.length){
    document.getElementById('equip-list').innerHTML =
      `<div class="card"><div class="empty"><b>등록된 장비가 없습니다</b>우측 상단 [장비 등록] 버튼으로 시작하세요</div></div>`;
    return;
  }

  const rows = list.map(eq=>{
    let holderTag = eq.holderName
      ? `<span class="tag t2">👤 ${esc(eq.holderName)}</span>`
      : `<span style="color:var(--ink3);font-size:12px">미배정(보관중)</span>`;
    if(eq.pendingHandoverId){
      holderTag += `<br><span class="tag t4" style="margin-top:3px">⏳ ${esc(eq.pendingHolderName)} 인수확인 대기</span>`;
    }
    const histCount = (eq.handoverHistory||[]).length;
    const myName = _supaProfile?.name;
    const isMyPending = eq.pendingHandoverId && eq.pendingHolderName === myName;
    const pendingRec = isMyPending ? (eq.handoverHistory||[]).find(r=>r.id===eq.pendingHandoverId) : null;
    const confirmBtn = isMyPending
      ? `<button class="btn sm pri" style="background:#e65100;border-color:#e65100" onclick="Equip.confirmReceive('${eq.id}','${pendingRec?pendingRec.id:''}')">✅ 인수확인</button>`
      : '';
    return `<tr>
      <td><b>${esc(eq.equipName||'')}</b></td>
      <td>${esc(eq.equipNo||'-')}</td>
      <td>${esc(eq.sn||'-')}</td>
      <td>${holderTag}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(eq.calibrationHistory||'')}">${esc(eq.calibrationHistory||'-')}</td>
      <td class="ctr">${esc(eq.purchaseYear||'-')}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(eq.failureHistory||'')}">${esc(eq.failureHistory||'-')}</td>
      <td class="ctr">
        ${confirmBtn}
        <button class="btn sm" style="background:#fff3e0;border-color:#ffcc80;color:#e65100" onclick="Equip.handover('${eq.id}')">🔄 인수인계</button>
        <button class="btn sm" onclick="Equip.history('${eq.id}')">이력${histCount?'('+histCount+')':''}</button>
        <button class="btn sm" onclick="Equip.edit('${eq.id}')">수정</button>
        <button class="btn sm dgr" onclick="Equip.del('${eq.id}')">삭제</button>
      </td>
    </tr>`;
  }).join('');

  document.getElementById('equip-list').innerHTML = `
    <div class="card" style="margin:0"><div class="bd np tbl-wrap">
      <table class="grid">
        <thead><tr>
          <th>장비명</th><th style="width:110px">장비번호</th><th style="width:130px">SN</th>
          <th style="width:120px">현재 보유자</th>
          <th style="width:150px">검교정이력</th><th class="ctr" style="width:80px">구입년도</th>
          <th style="width:150px">고장이력</th>
          <th class="ctr" style="width:230px">관리</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div></div>`;
}

/* 개인별 보유현황: 직원별로 현재 들고 있는 장비 목록 */
function _renderEquipByPerson(){
  const extra = document.getElementById('equip-toolbar-extra');
  if(extra) extra.innerHTML = `<span style="font-size:12.5px;color:var(--ink2)">직원별로 현재 보유 중인 장비를 모아서 보여줍니다</span>`;

  const list = State.equip||[];
  const byPerson = {};
  list.forEach(eq=>{
    if(!eq.holderName) return;
    if(!byPerson[eq.holderName]) byPerson[eq.holderName] = [];
    byPerson[eq.holderName].push(eq);
  });
  // 인수확인 대기중인 장비도, 인수받을 사람의 카드에 함께 표시 (확인 버튼 포함)
  const byPersonPending = {};
  list.forEach(eq=>{
    if(!eq.pendingHandoverId || !eq.pendingHolderName) return;
    if(!byPersonPending[eq.pendingHolderName]) byPersonPending[eq.pendingHolderName] = [];
    byPersonPending[eq.pendingHolderName].push(eq);
  });
  const names = [...new Set([...Object.keys(byPerson), ...Object.keys(byPersonPending)])].sort();

  if(!names.length){
    document.getElementById('equip-list').innerHTML =
      `<div class="card"><div class="empty"><b>현재 보유자가 배정된 장비가 없습니다</b>장비목록에서 [인수인계] 버튼으로 보유자를 지정하세요</div></div>`;
    return;
  }

  const cards = names.map(name=>{
    const pendingItems = (byPersonPending[name]||[]).map(eq=>{
      const rec = (eq.handoverHistory||[]).find(r=>r.id===eq.pendingHandoverId);
      return `
      <tr style="background:#fff8e1">
        <td><b>${esc(eq.equipName||'')}</b></td>
        <td>${esc(eq.equipNo||'-')}</td>
        <td>${esc(eq.sn||'-')}</td>
        <td><span class="tag t4">⏳ 인수확인 대기</span></td>
        <td class="ctr"><button class="btn sm pri" style="background:#e65100;border-color:#e65100" onclick="Equip.confirmReceive('${eq.id}','${rec?rec.id:''}')">✅ 인수확인</button></td>
      </tr>`;
    }).join('');
    const items = (byPerson[name]||[]).map(eq=>`
      <tr>
        <td><b>${esc(eq.equipName||'')}</b></td>
        <td>${esc(eq.equipNo||'-')}</td>
        <td>${esc(eq.sn||'-')}</td>
        <td style="font-size:12px;color:var(--ink3)">${esc(eq.holderSince||'-')} 인수</td>
        <td class="ctr"><button class="btn sm" style="background:#fff3e0;border-color:#ffcc80;color:#e65100" onclick="Equip.handover('${eq.id}')">🔄 인수인계</button></td>
      </tr>`).join('');
    const total = (byPerson[name]||[]).length + (byPersonPending[name]||[]).length;
    return `<div class="card">
      <div class="hd"><h2>👤 ${esc(name)} <span style="font-size:12px;color:var(--ink3);font-weight:500">보유 장비 ${total}건</span></h2></div>
      <div class="bd np"><table class="grid">
        <thead><tr><th>장비명</th><th style="width:110px">장비번호</th><th style="width:130px">SN</th><th style="width:140px">상태</th><th class="ctr" style="width:120px">관리</th></tr></thead>
        <tbody>${pendingItems}${items}</tbody>
      </table></div>
    </div>`;
  }).join('');

  document.getElementById('equip-list').innerHTML = cards;
}

const Equip = {
  edit(id){
    const eq = id ? (State.equip||[]).find(e=>e.id===id) : null;
    const body = `
      <div class="frm">
        <div class="fld"><label>장비명 <span style="color:var(--red)">*</span></label>
          <input id="eq-name" value="${esc(eq?eq.equipName||'':'')}" placeholder="예: 열화상카메라"></div>
        <div class="fld"><label>장비번호</label>
          <input id="eq-no" value="${esc(eq?eq.equipNo||'':'')}" placeholder="예: EQ-001"></div>
        <div class="fld"><label>SN (시리얼번호)</label>
          <input id="eq-sn" value="${esc(eq?eq.sn||'':'')}"></div>
        <div class="fld"><label>구입년도</label>
          <input id="eq-year" value="${esc(eq?eq.purchaseYear||'':'')}" placeholder="예: 2023"></div>
        <div class="fld w2"><label>검교정이력</label>
          <textarea id="eq-cal" rows="2" style="width:100%;resize:vertical" placeholder="예: 2024-03-15 검교정 완료 (○○계측)">${esc(eq?eq.calibrationHistory||'':'')}</textarea></div>
        <div class="fld w2"><label>고장이력</label>
          <textarea id="eq-fail" rows="2" style="width:100%;resize:vertical" placeholder="예: 2023-11 배터리 불량 수리">${esc(eq?eq.failureHistory||'':'')}</textarea></div>
        <div class="fld w2"><label>비고</label>
          <input id="eq-memo" value="${esc(eq?eq.memo||'':'')}"></div>
      </div>`;
    UI.openModal(eq ? '장비 수정 — '+eq.equipName : '장비 등록', body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'저장', cls:'pri', onClick:()=>Equip.save(id)}
    ]);
  },

  async save(id){
    const g = i=>document.getElementById(i);
    const equipName = g('eq-name').value.trim();
    if(!equipName){ toast('장비명을 입력하세요'); return; }
    const data = {
      equipName,
      equipNo: g('eq-no').value.trim(),
      sn: g('eq-sn').value.trim(),
      purchaseYear: g('eq-year').value.trim(),
      calibrationHistory: g('eq-cal').value.trim(),
      failureHistory: g('eq-fail').value.trim(),
      memo: g('eq-memo').value.trim()
    };
    if(!State.equip) State.equip = [];
    if(id){
      const idx = State.equip.findIndex(e=>e.id===id);
      if(idx>=0) State.equip[idx] = {...State.equip[idx], ...data};
    } else {
      data.id = DB.uid();
      State.equip.push(data);
    }
    toast('저장 중...');
    try{
      await State.saveAll();
      toast('✅ 장비 정보가 저장되었습니다');
    }catch(e){
      toast('❌ 저장 실패: '+e.message);
      return;
    }
    UI.closeModal();
    _renderEquip();
  },

  async del(id){
    const eq = (State.equip||[]).find(e=>e.id===id);
    if(!eq) return;
    if(!confirm(`[${eq.equipName}] 장비 정보를 삭제할까요?`)) return;
    State.equip = State.equip.filter(e=>e.id!==id);
    toast('삭제 중...');
    try{
      await supa.from('equip').delete().eq('id', id);
      await State.saveAll();
      toast('✅ 삭제되었습니다');
    }catch(e){
      toast('❌ 삭제 실패: '+e.message);
      return;
    }
    if(equipTab==='list') _renderEquip(); else _renderEquipByPerson();
  },

  /* 인수인계 모달: 현재 보유자 → 새 보유자에게 장비를 넘김 */
  handover(id){
    const eq = (State.equip||[]).find(e=>e.id===id);
    if(!eq) return;
    const staff = (State.hr||[]).filter(h=>h.status==='재직'||!h.status).sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    const today = todayStr();
    const body = `
      <div style="padding:10px 14px;background:var(--brand-soft);border-radius:8px;font-size:13px;margin-bottom:14px">
        <b>${esc(eq.equipName)}</b> ${eq.equipNo?'('+esc(eq.equipNo)+')':''}<br>
        <span style="color:var(--ink2)">현재 보유자: ${eq.holderName?esc(eq.holderName):'미배정(보관중)'}</span>
      </div>
      <div class="frm">
        <div class="fld"><label>인수자 (새 보유자) <span style="color:var(--red)">*</span></label>
          <select id="ho-name">
            <option value="">선택하세요</option>
            <option value="__return__">↩ 반납 (미배정/보관중으로 변경)</option>
            ${staff.map(h=>`<option value="${esc(h.name)}">${esc(h.name)} (${esc(h.dept||'')} ${esc(h.rank||'')})</option>`).join('')}
          </select>
        </div>
        <div class="fld"><label>인수일자</label><input type="date" id="ho-date" value="${today}"></div>
        <div class="fld w2"><label>비고</label><input id="ho-memo" placeholder="예: 정기 검교정 위탁 등"></div>
      </div>`;
    UI.openModal('인수인계 — '+esc(eq.equipName), body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'인수인계 처리', cls:'pri', onClick:()=>Equip.doHandover(id)}
    ]);
  },

  async doHandover(id){
    const g = i=>document.getElementById(i);
    const eq = (State.equip||[]).find(e=>e.id===id);
    if(!eq) return;
    const newHolderRaw = g('ho-name').value;
    if(!newHolderRaw){ toast('인수자를 선택하세요'); return; }
    const date = g('ho-date').value || todayStr();
    const memo = g('ho-memo').value.trim();
    const isReturn = newHolderRaw === '__return__';
    const newHolder = isReturn ? '' : newHolderRaw;
    const prevHolder = eq.holderName || '';

    if(!eq.handoverHistory) eq.handoverHistory = [];
    const record = {
      id: DB.uid(),
      fromName: prevHolder || '(미배정)',
      toName: isReturn ? '(반납/보관중)' : newHolder,
      date,
      memo,
      // 인수자 확인 절차: 등록 직후엔 '대기중', 인수자가 직접 확인해야 '확인완료'로 바뀜
      confirmStatus: isReturn ? 'auto' : 'pending', // 'pending'=확인대기, 'confirmed'=확인완료, 'auto'=반납이라 확인불필요
      confirmedAt: null,
      workingOk: null,      // 정상작동 여부 (true/false), 확인 시 입력
      workingNote: ''
    };
    eq.handoverHistory.push(record);

    if(isReturn){
      // 반납은 별도 확인 절차 없이 즉시 미배정 처리
      eq.holderName = '';
      eq.holderSince = '';
    } else {
      // 인수자 확인 전까지는 보유자를 즉시 바꾸지 않고 '인계 대기중'으로 표시
      eq.pendingHandoverId = record.id;
      eq.pendingHolderName = newHolder;
    }

    toast('처리 중...');
    try{
      await State.saveAll();
      toast(isReturn ? '✅ 반납 처리되었습니다' : '✅ '+newHolder+'님에게 인수인계 등록 완료 (로그인 시 확인 알림이 표시됩니다)');
    }catch(e){
      toast('❌ 처리 실패: '+e.message);
      return;
    }
    UI.closeModal();
    if(equipTab==='list') _renderEquip(); else _renderEquipByPerson();
  },

  /* 인수자가 본인 화면에서 확인: 수령확인 + 정상작동여부 체크 */
  confirmReceive(equipId, recordId){
    const eq = (State.equip||[]).find(e=>e.id===equipId);
    if(!eq){ toast('❌ 장비 정보를 찾을 수 없습니다'); console.error('confirmReceive: equip not found', equipId); return; }
    let rec = (eq.handoverHistory||[]).find(r=>r.id===recordId);
    if(!rec){
      // recordId가 비어있거나 못 찾은 경우, pendingHandoverId 기준으로 한 번 더 시도 (하위호환 + 방어)
      rec = (eq.handoverHistory||[]).find(r=>r.id===eq.pendingHandoverId);
    }
    if(!rec){
      // 그래도 못 찾으면, '대기중(pending)' 상태인 가장 최근 이력을 사용 (최후 방어)
      rec = (eq.handoverHistory||[]).slice().reverse().find(r=>r.confirmStatus==='pending');
    }
    if(!rec){
      toast('❌ 인수인계 이력을 찾을 수 없습니다. 관리자에게 문의해주세요.');
      console.error('confirmReceive: record not found', {equipId, recordId, eq});
      return;
    }
    const body = `
      <div style="padding:10px 14px;background:var(--brand-soft);border-radius:8px;font-size:13px;margin-bottom:14px">
        <b>${esc(eq.equipName)}</b> ${eq.equipNo?'('+esc(eq.equipNo)+')':''} 을(를) 인수합니다.<br>
        <span style="color:var(--ink2)">인계자: ${esc(rec.fromName)} · 인계일: ${esc(rec.date)}</span>
      </div>
      <div class="frm">
        <div class="fld w2">
          <label>장비 정상작동 여부 <span style="color:var(--red)">*</span></label>
          <div style="display:flex;gap:14px;margin-top:4px">
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="working-ok" value="true" checked> 정상 작동함</label>
            <label style="display:flex;align-items:center;gap:5px;cursor:pointer"><input type="radio" name="working-ok" value="false"> 이상 있음</label>
          </div>
        </div>
        <div class="fld w2"><label>확인 비고 (이상 있을 경우 내용 기재)</label>
          <textarea id="cf-note" rows="2" style="width:100%;resize:vertical" placeholder="예: 배터리 잔량 부족, 케이스 파손 등"></textarea></div>
      </div>`;
    UI.openModal('인수 확인 — '+esc(eq.equipName), body, [
      {label:'취소', onClick:UI.closeModal},
      {label:'✅ 수령 확인 완료', cls:'pri', onClick:()=>Equip.doConfirmReceive(equipId, recordId)}
    ]);
  },

  async doConfirmReceive(equipId, recordId){
    const eq = (State.equip||[]).find(e=>e.id===equipId);
    if(!eq){ toast('❌ 장비 정보를 찾을 수 없습니다'); return; }
    let rec = (eq.handoverHistory||[]).find(r=>r.id===recordId);
    if(!rec) rec = (eq.handoverHistory||[]).find(r=>r.id===eq.pendingHandoverId);
    if(!rec) rec = (eq.handoverHistory||[]).slice().reverse().find(r=>r.confirmStatus==='pending');
    if(!rec){ toast('❌ 인수인계 이력을 찾을 수 없습니다'); return; }
    const workingOk = (document.querySelector('input[name="working-ok"]:checked')||{}).value === 'true';
    const note = (document.getElementById('cf-note')||{}).value?.trim() || '';

    rec.confirmStatus = 'confirmed';
    rec.confirmedAt = new Date().toISOString();
    rec.workingOk = workingOk;
    rec.workingNote = note;

    // 확인이 완료된 시점에 비로소 보유자 확정
    eq.holderName = eq.pendingHolderName || rec.toName;
    eq.holderSince = rec.date;
    delete eq.pendingHandoverId;
    delete eq.pendingHolderName;

    toast('처리 중...');
    try{
      await State.saveAll();
      toast(workingOk ? '✅ 인수 확인 완료 (정상 작동)' : '⚠ 인수 확인 완료 (이상 있음으로 기록됨)');
    }catch(e){
      toast('❌ 처리 실패: '+e.message);
      return;
    }
    UI.closeModal();
    SupaAuth.renderHandoverAlerts();
    if(typeof Views!=='undefined' && location.hash==='#equip'){
      if(equipTab==='list') _renderEquip(); else _renderEquipByPerson();
    }
  },

  /* 인수인계 이력 보기 */
  history(id){
    const eq = (State.equip||[]).find(e=>e.id===id);
    if(!eq) return;
    const hist = (eq.handoverHistory||[]).slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    const rows = hist.length
      ? hist.map(h=>{
          let statusTag;
          if(h.confirmStatus==='confirmed'){
            statusTag = h.workingOk
              ? '<span class="tag t2">✅ 확인완료(정상)</span>'
              : '<span class="tag" style="background:#ffebee;color:#c62828">⚠ 확인완료(이상있음)</span>';
          } else if(h.confirmStatus==='pending'){
            statusTag = '<span class="tag t4">⏳ 확인대기중</span>';
          } else {
            statusTag = '<span class="tag gray">반납</span>';
          }
          const note = h.workingNote ? '<div style="font-size:11px;color:#c62828;margin-top:2px">'+esc(h.workingNote)+'</div>' : '';
          return `<tr>
            <td style="font-size:12px">${esc(h.date||'-')}</td>
            <td>${esc(h.fromName||'-')} → <b>${esc(h.toName||'-')}</b>${note}</td>
            <td class="ctr">${statusTag}</td>
            <td style="font-size:12px;color:var(--ink3)">${esc(h.memo||'')}</td>
          </tr>`;
        }).join('')
      : `<tr><td colspan="4"><div class="empty">인수인계 이력이 없습니다</div></td></tr>`;
    const body = `
      <div style="margin-bottom:10px;font-size:13px;color:var(--ink2)">
        <b>${esc(eq.equipName)}</b> ${eq.equipNo?'('+esc(eq.equipNo)+')':''} · 현재 보유자: ${eq.holderName?esc(eq.holderName):'미배정(보관중)'}
      </div>
      <table class="grid" style="font-size:13px">
        <thead><tr><th style="width:100px">일자</th><th>인계 내역</th><th class="ctr" style="width:140px">확인상태</th><th>비고</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    UI.openModal('인수인계 이력 — '+esc(eq.equipName), body, [
      {label:'닫기', cls:'pri', onClick:UI.closeModal}
    ]);
  },

  /* 업로드 양식 다운로드 */
  template(){
    const sample = [{
      '장비명':'열화상카메라', '장비번호':'EQ-001', 'SN':'SN12345',
      '검교정이력':'2024-03-15 검교정 완료 (○○계측)', '구입년도':'2023',
      '고장이력':'', '비고':'예시 행입니다. 지우고 입력하세요'
    }];
    const guide = XLSX.utils.aoa_to_sheet([
      ['엔자인 ERP 진단장비현황 일괄등록 양식 안내'],[''],
      ['열 이름','설명'],
      ['장비명','필수 입력'],
      ['장비번호','선택 입력. 예: EQ-001'],
      ['SN','시리얼번호, 선택 입력'],
      ['검교정이력','선택 입력. 자유 텍스트'],
      ['구입년도','선택 입력. 예: 2023'],
      ['고장이력','선택 입력. 자유 텍스트'],
      ['비고','선택 입력'],[''],
      ['※ 장비명+SN이 모두 일치하는 기존 행이 있으면 덮어씁니다 (없으면 신규 등록)']
    ]);
    guide['!cols'] = [{wch:12},{wch:70}];
    const ws = XLSX.utils.json_to_sheet(sample);
    ws['!cols'] = [{wch:18},{wch:14},{wch:16},{wch:30},{wch:10},{wch:30},{wch:24}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '장비입력');
    XLSX.utils.book_append_sheet(wb, guide, '작성안내');
    XLSX.writeFile(wb, '엔자인_진단장비현황등록양식.xlsx');
  },

  /* 일괄등록 엑셀 업로드 */
  importXlsx(input){
    const file = input.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = async e=>{
      try{
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array', cellDates:true});
        const sheetName = wb.SheetNames.includes('장비입력') ? '장비입력' : wb.SheetNames[0];
        const json = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], {defval:''});
        if(!State.equip) State.equip = [];
        let ok=0, skip=0;
        json.forEach(r=>{
          const keys = Object.keys(r);
          const get = names=>{ const k=keys.find(k=>names.some(n=>k.replace(/\s/g,'').includes(n))); return k!=null?String(r[k]||'').trim():''; };
          const equipName = get(['장비명']);
          if(!equipName){ if(keys.some(k=>String(r[k]).trim()!=='')) skip++; return; }
          const sn = get(['SN','시리얼']);
          const data = {
            equipName,
            equipNo: get(['장비번호']),
            sn,
            calibrationHistory: get(['검교정이력','검교정']),
            purchaseYear: get(['구입년도','구입년','년도']),
            failureHistory: get(['고장이력','고장']),
            memo: get(['비고','메모'])
          };
          const existIdx = State.equip.findIndex(e=>e.equipName===equipName && (e.sn||'')===sn);
          if(existIdx>=0){ State.equip[existIdx] = {...State.equip[existIdx], ...data}; }
          else { data.id = DB.uid(); State.equip.push(data); }
          ok++;
        });
        if(ok===0){ toast('처리할 데이터가 없습니다'); input.value=''; return; }
        toast('저장 중...');
        try{
          await State.saveAll();
          toast('✅ '+ok+'건 저장 완료'+(skip?' · 건너뜀 '+skip+'건':''));
        }catch(saveErr){
          toast('❌ 저장 실패: '+saveErr.message);
          input.value=''; return;
        }
        _renderEquip();
      }catch(err){ toast('가져오기 실패: 파일 형식을 확인하세요'); console.error(err); }
      input.value='';
    };
    reader.readAsArrayBuffer(file);
  },

  /* 엑셀 내보내기 */
  exportXlsx(){
    const rows = (State.equip||[]).map(eq=>({
      '장비명': eq.equipName||'', '장비번호': eq.equipNo||'', 'SN': eq.sn||'',
      '검교정이력': eq.calibrationHistory||'', '구입년도': eq.purchaseYear||'',
      '고장이력': eq.failureHistory||'', '비고': eq.memo||''
    }));
    if(!rows.length){ toast('내보낼 데이터가 없습니다'); return; }
    const ws = XLSX.utils.json_to_sheet(rows);
    ws['!cols'] = [{wch:18},{wch:14},{wch:16},{wch:30},{wch:10},{wch:30},{wch:24}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '진단장비현황');
    XLSX.writeFile(wb, `엔자인_진단장비현황_${todayStr()}.xlsx`);
  }
};
</script>
